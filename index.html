<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GestEq — Gestão de Equipamentos Municipais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --azul: #1B3A6B;
    --azul-medio: #2D5FA6;
    --azul-claro: #4A90D9;
    --verde: #2A7A4B;
    --verde-claro: #E8F5EE;
    --vermelho: #C0392B;
    --vermelho-claro: #FDECEA;
    --amarelo: #D4820A;
    --amarelo-claro: #FEF3E2;
    --cinza-escuro: #1A1A2E;
    --cinza: #4A4A6A;
    --cinza-medio: #8A8AAA;
    --cinza-claro: #F0F2F8;
    --branco: #FFFFFF;
    --borda: #DDE2F0;
    --sombra: 0 2px 12px rgba(27,58,107,0.10);
    --sombra-forte: 0 8px 32px rgba(27,58,107,0.18);
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cinza-claro);
    color: var(--cinza-escuro);
    min-height: 100vh;
    font-size: 14px;
  }

  h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }

  /* ===== LOGIN ===== */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--azul) 0%, var(--azul-medio) 60%, var(--azul-claro) 100%);
    padding: 20px;
  }
  .login-card {
    background: var(--branco);
    border-radius: var(--radius-lg);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--sombra-forte);
    text-align: center;
  }
  .login-logo {
    width: 64px; height: 64px;
    background: var(--azul);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
  }
  .login-card h1 { font-size: 22px; color: var(--azul); margin-bottom: 4px; }
  .login-card p { color: var(--cinza-medio); font-size: 13px; margin-bottom: 32px; }
  .login-card input {
    width: 100%; padding: 14px 16px;
    border: 2px solid var(--borda); border-radius: var(--radius);
    font-size: 18px; letter-spacing: 6px; text-align: center;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    color: var(--azul); outline: none; transition: border-color 0.2s;
    text-transform: uppercase;
  }
  .login-card input:focus { border-color: var(--azul-claro); }
  .login-card input::placeholder { letter-spacing: 2px; font-size: 14px; color: var(--cinza-medio); font-weight: 400; }
  .btn-login {
    width: 100%; margin-top: 16px; padding: 14px;
    background: var(--azul); color: #fff;
    border: none; border-radius: var(--radius); cursor: pointer;
    font-size: 15px; font-weight: 600; font-family: 'Space Grotesk', sans-serif;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-login:hover { background: var(--azul-medio); transform: translateY(-1px); }
  .login-error { color: var(--vermelho); font-size: 13px; margin-top: 12px; }

  /* ===== LAYOUT ===== */
  .app-layout { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--azul);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100; overflow-y: auto;
    transition: transform 0.3s;
  }
  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .sidebar-header .logo-row { display: flex; align-items: center; gap: 12px; }
  .sidebar-header .logo-icon {
    width: 40px; height: 40px; background: rgba(255,255,255,0.15);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .sidebar-header h2 { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.2; }
  .sidebar-header span { color: rgba(255,255,255,0.5); font-size: 11px; }
  .sidebar-user {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-user .user-name { color: #fff; font-size: 13px; font-weight: 600; }
  .sidebar-user .user-role {
    display: inline-block; margin-top: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .role-admin { background: #F39C12; color: #000; }
  .role-supervisor { background: #8E44AD; color: #fff; }
  .role-responsavel { background: #27AE60; color: #fff; }
  .role-funcionario { background: #2980B9; color: #fff; }

  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-section { padding: 8px 20px 4px; color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; color: rgba(255,255,255,0.75);
    cursor: pointer; transition: all 0.15s; font-size: 13px;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: var(--azul-claro); font-weight: 600; }
  .nav-item .nav-icon { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }
  .nav-sub { padding-left: 32px; }
  .nav-sub .nav-item { font-size: 12px; padding: 8px 20px 8px 8px; }

  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
  .btn-sair {
    width: 100%; padding: 10px; background: rgba(255,255,255,0.08);
    border: none; border-radius: 8px; color: rgba(255,255,255,0.7);
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-sair:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* MAIN */
  .main-content {
    margin-left: 260px;
    flex: 1; padding: 28px;
    min-height: 100vh;
  }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .page-header h1 { font-size: 22px; color: var(--azul); }
  .page-header p { color: var(--cinza-medio); font-size: 13px; margin-top: 2px; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; }
  .card {
    background: var(--branco); border-radius: var(--radius-lg);
    padding: 20px; box-shadow: var(--sombra);
    border: 1px solid var(--borda); transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover { box-shadow: var(--sombra-forte); transform: translateY(-2px); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .card-icon { font-size: 24px; }
  .card-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-ativo { background: var(--verde-claro); color: var(--verde); }
  .badge-sazonal { background: var(--amarelo-claro); color: var(--amarelo); }
  .card h3 { font-size: 15px; color: var(--azul); margin-bottom: 4px; }
  .card-local { color: var(--cinza-medio); font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .card-responsavel { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--borda); font-size: 12px; color: var(--cinza); }
  .card-responsavel strong { color: var(--azul); }
  .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  /* BOTÕES */
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--azul); color: #fff; }
  .btn-primary:hover { background: var(--azul-medio); }
  .btn-secondary { background: var(--cinza-claro); color: var(--cinza); border: 1px solid var(--borda); }
  .btn-secondary:hover { background: var(--borda); }
  .btn-success { background: var(--verde); color: #fff; }
  .btn-success:hover { background: #1e5c38; }
  .btn-danger { background: var(--vermelho); color: #fff; }
  .btn-danger:hover { background: #922b21; }
  .btn-warning { background: var(--amarelo); color: #fff; }
  .btn-warning:hover { background: #b8700a; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .btn-outline { background: transparent; border: 1.5px solid var(--azul); color: var(--azul); }
  .btn-outline:hover { background: var(--azul); color: #fff; }

  /* TABELAS */
  .table-wrap { background: var(--branco); border-radius: var(--radius-lg); box-shadow: var(--sombra); border: 1px solid var(--borda); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--cinza-claro); color: var(--cinza); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--borda); }
  tbody td { padding: 12px 16px; border-bottom: 1px solid var(--borda); font-size: 13px; color: var(--cinza-escuro); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f8f9fd; }

  /* FORMS */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--cinza); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--borda);
    border-radius: 8px; font-size: 13px; font-family: 'Inter', sans-serif;
    color: var(--cinza-escuro); outline: none; transition: border-color 0.2s;
    background: var(--branco);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--azul-claro); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px; backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--branco); border-radius: var(--radius-lg);
    padding: 28px; width: 100%; max-width: 560px;
    box-shadow: var(--sombra-forte); max-height: 90vh; overflow-y: auto;
  }
  .modal-lg { max-width: 760px; }
  .modal h2 { font-size: 18px; color: var(--azul); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--borda); }

  /* STATUS BADGES */
  .status { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
  .status-pendente { background: var(--amarelo-claro); color: var(--amarelo); }
  .status-reforco { background: #EDE7F6; color: #6A1B9A; }
  .status-concluido { background: var(--verde-claro); color: var(--verde); }
  .status-confirmada { background: var(--verde-claro); color: var(--verde); }
  .status-cancelada { background: var(--vermelho-claro); color: var(--vermelho); }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--borda); margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--cinza-medio); border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.15s; border-radius: 4px 4px 0 0;
    white-space: nowrap;
  }
  .tab:hover { color: var(--azul); background: var(--cinza-claro); }
  .tab.active { color: var(--azul); border-bottom-color: var(--azul); background: #EEF3FF; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--branco); border-radius: var(--radius); padding: 16px;
    border: 1px solid var(--borda); box-shadow: var(--sombra);
  }
  .stat-card .stat-num { font-size: 28px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: var(--azul); }
  .stat-card .stat-label { font-size: 11px; color: var(--cinza-medio); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* CALENDAR */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-header h3 { font-size: 16px; color: var(--azul); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--cinza-medio); padding: 6px 0; text-transform: uppercase; }
  .cal-day {
    background: var(--branco); border: 1px solid var(--borda); border-radius: 8px;
    padding: 8px 6px; min-height: 80px; cursor: pointer; transition: all 0.15s;
  }
  .cal-day:hover { border-color: var(--azul-claro); background: #EEF3FF; }
  .cal-day.other-month { opacity: 0.4; }
  .cal-day.today { border-color: var(--azul); background: #EEF3FF; }
  .cal-day-num { font-size: 12px; font-weight: 700; color: var(--cinza); margin-bottom: 4px; }
  .cal-day.today .cal-day-num { color: var(--azul); }
  .cal-event {
    background: var(--azul-claro); color: #fff; border-radius: 4px;
    padding: 2px 5px; font-size: 10px; margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cal-event.campo { background: var(--azul); }
  .cal-event.sala { background: var(--verde); }
  .cal-event.ceavm { background: var(--amarelo); color: #000; }

  /* CHECKLIST */
  .checklist-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid var(--borda); border-radius: 8px;
    margin-bottom: 8px; background: var(--branco); transition: all 0.15s;
  }
  .checklist-item.ok { border-color: var(--verde); background: var(--verde-claro); }
  .checklist-item.nok { border-color: var(--vermelho); background: var(--vermelho-claro); }
  .check-toggle { display: flex; gap: 6px; }
  .check-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--borda);
    cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: var(--branco);
  }
  .check-btn.sim { border-color: var(--verde); color: var(--verde); }
  .check-btn.sim.active { background: var(--verde); color: #fff; }
  .check-btn.nao { border-color: var(--vermelho); color: var(--vermelho); }
  .check-btn.nao.active { background: var(--vermelho); color: #fff; }

  /* WATER PARAMS */
  .param-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid var(--borda); border-radius: 8px;
    margin-bottom: 8px; background: var(--branco);
  }
  .param-name { flex: 1; font-weight: 600; font-size: 13px; }
  .param-range { font-size: 11px; color: var(--cinza-medio); }
  .param-input { width: 100px; padding: 6px 10px; border: 1.5px solid var(--borda); border-radius: 6px; font-size: 14px; font-weight: 700; text-align: center; }
  .param-status { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .param-ok { background: var(--verde-claro); color: var(--verde); }
  .param-nok { background: var(--vermelho-claro); color: var(--vermelho); }

  /* ALERT */
  .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .alert-info { background: #EEF3FF; color: var(--azul); border: 1px solid #C7D7F5; }
  .alert-success { background: var(--verde-claro); color: var(--verde); border: 1px solid #A8D5B8; }
  .alert-warning { background: var(--amarelo-claro); color: var(--amarelo); border: 1px solid #F5D6A0; }
  .alert-error { background: var(--vermelho-claro); color: var(--vermelho); border: 1px solid #F5AEAC; }

  /* ESCALA */
  .escala-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .escala-col-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--cinza-medio); padding: 8px; text-transform: uppercase; }
  .escala-cell {
    background: var(--branco); border: 1px solid var(--borda); border-radius: 8px;
    padding: 8px; min-height: 90px; cursor: pointer; transition: border-color 0.15s;
  }
  .escala-cell:hover { border-color: var(--azul-claro); }
  .escala-turno {
    background: var(--azul-claro); color: #fff; border-radius: 6px;
    padding: 4px 6px; font-size: 10px; margin-bottom: 4px;
  }
  .escala-turno.manha { background: #F39C12; }
  .escala-turno.tarde { background: var(--azul-claro); }
  .escala-turno.noite { background: #6C3483; }
  .escala-turno.recepcao { background: var(--verde); }
  .escala-turno.ns { background: #1A5276; }

  /* MEMORANDOS */
  .dias-contador {
    display: inline-block; background: var(--azul); color: #fff;
    border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700;
  }
  .dias-contador.urgente { background: var(--vermelho); }
  .dias-contador.aviso { background: var(--amarelo); }

  /* SECTION BOX */
  .section-box {
    background: var(--branco); border-radius: var(--radius-lg);
    border: 1px solid var(--borda); box-shadow: var(--sombra);
    margin-bottom: 20px; overflow: hidden;
  }
  .section-box-header {
    padding: 16px 20px; border-bottom: 1px solid var(--borda);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cinza-claro);
  }
  .section-box-header h3 { font-size: 15px; color: var(--azul); display: flex; align-items: center; gap: 8px; }
  .section-box-body { padding: 20px; }

  /* TOASTS */
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--cinza-escuro); color: #fff;
    padding: 12px 20px; border-radius: 10px; font-size: 13px;
    box-shadow: var(--sombra-forte); animation: slideIn 0.3s ease;
    display: flex; align-items: center; gap: 8px; max-width: 320px;
  }
  .toast.success { background: var(--verde); }
  .toast.error { background: var(--vermelho); }
  @keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* MOBILE */
  .hamburger { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; background: var(--azul); border: none; border-radius: 8px; padding: 8px 10px; cursor: pointer; color: #fff; font-size: 18px; }
  @media (max-width: 768px) {
    .hamburger { display: flex; }
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-left: 0; padding: 16px; padding-top: 60px; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .escala-grid { grid-template-columns: repeat(3,1fr); }
  }

  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--cinza-medio); font-size: 14px; gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--borda); border-top-color: var(--azul); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--cinza-medio); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .codigo-display {
    background: var(--cinza-claro); border: 2px dashed var(--borda);
    border-radius: 10px; padding: 16px; text-align: center; margin: 12px 0;
  }
  .codigo-display .codigo { font-size: 28px; font-weight: 700; letter-spacing: 6px; color: var(--azul); font-family: 'Space Grotesk', sans-serif; }
  .codigo-display p { font-size: 12px; color: var(--cinza-medio); margin-top: 4px; }
</style>
</head>
<body>

<div id="hamburger-wrap"></div>
<div class="toast-container" id="toasts"></div>

<div id="root"></div>

<script>

// ===== SUPABASE CLIENT =====
const sb = {
  async query(table, opts={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?`;
    if(opts.select) url += `select=${encodeURIComponent(opts.select)}&`;
    if(opts.filter) Object.entries(opts.filter).forEach(([k,v])=>{ url += `${k}=${encodeURIComponent(v)}&`; });
    if(opts.order) url += `order=${opts.order}&`;
    if(opts.limit) url += `limit=${opts.limit}&`;
    const r = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json' }});
    return r.json();
  },
  async insert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
      body: JSON.stringify(data)
    });
    return r.json();
  },
  async update(table, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation' },
      body: JSON.stringify(data)
    });
    return r.json();
  },
  async delete(table, id) {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
  },
  async rpc(fn, params={}) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
      method:'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json' },
      body: JSON.stringify(params)
    });
    return r.json();
  }
};

// ===== AUTH =====
function hashCode(code) {
  return CryptoJS.SHA256(code.toUpperCase().trim()).toString();
}

async function login(code) {
  const codeClean = code.toUpperCase().trim();
  const resp = await fetch(SUPABASE_URL+'/rest/v1/utilizadores?codigo_visivel=eq.'+encodeURIComponent(codeClean)+'&ativo=eq.true&select=*', {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY}
  });
  const users = await resp.json();
  if(!Array.isArray(users)||!users.length) return null;
  return {user: users[0], token: users[0].id+'_'+Date.now()};
}

async function checkSession() {
  const saved = localStorage.getItem('gesteq_session');
  if(!saved) return false;
  try {
    const {uid, exp} = JSON.parse(saved);
    if(!uid||Date.now()>exp){localStorage.removeItem('gesteq_session');return false;}
    const resp = await fetch(SUPABASE_URL+'/rest/v1/utilizadores?id=eq.'+uid+'&ativo=eq.true&select=*', {
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const users = await resp.json();
    if(!Array.isArray(users)||!users.length){localStorage.removeItem('gesteq_session');return false;}
    state.user=users[0];return true;
  }catch{localStorage.removeItem('gesteq_session');return false;}
}

async function logout() {
  // session stored in localStorage only
  localStorage.removeItem('gesteq_session');
  state.user = null; state.token = null;
  render();
}

}

function formatDate(d) {
  if(!d) return '—';
  return new Date(d).toLocaleDateString('pt-PT');
}

function diasDesde(data) {
  if(!data) return null;
  const hoje = new Date(); const d = new Date(data);
  return Math.floor((hoje-d)/(1000*60*60*24));
}

function gerarCodigo() {
  const letras = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const numeros = '0123456789';
  let c = '';
  for(let i=0;i<2;i++) c += letras[Math.floor(Math.random()*letras.length)];
  c += '-';
  for(let i=0;i<4;i++) c += numeros[Math.floor(Math.random()*numeros.length)];
  return c;
}

function attachLoginEvents() {
  const inp = document.getElementById('login-code');
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-error');

  inp?.addEventListener('input', e => { e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9-_]/g,''); });
  inp?.addEventListener('keydown', e => { if(e.key==='Enter') btn.click(); });

  btn?.addEventListener('click', async () => {
    const code = inp.value.trim();
    if(!code) { err.textContent = 'Introduza o código de acesso.'; return; }
    btn.textContent = 'A verificar...'; btn.disabled = true;
    try {
      const result = await login(code);
      if(!result) { err.textContent = 'Código inválido ou conta desativada.'; btn.textContent = 'Entrar'; btn.disabled = false; return; }
      state.user = result.user; state.token = result.token;
      localStorage.setItem('gesteq_session', JSON.stringify({uid: result.user.id, exp: Date.now()+8*3600000}));
      await loadEquipamentos();
      render();
    } catch(e) { err.textContent = 'Erro de ligação. Tente novamente.'; btn.textContent = 'Entrar'; btn.disabled = false; }
  });
}

          <span style="background:var(--azul);color:#fff;padding:2px 8px;border-radius:4px">● Campo</span>

            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div id="reservas-lista-dia"></div>
  `;
}

// ===== DATA LOADERS =====
async function loadEquipamentos() {
  try {
    const data = await sb.query('equipamentos', { filter: { ativo: 'eq.true' }, order: 'nome.asc' });
    state.equipamentos = Array.isArray(data) ? data : [];
  } catch(e) { state.equipamentos = []; }
}

async function loadChecklistItens(eqId, momento) {
  const data = await sb.query('checklist_itens', { filter: { equipamento_id: `eq.${eqId}`, momento: `eq.${momento}`, ativo: 'eq.true' }, order: 'ordem.asc' });
  return Array.isArray(data) ? data : [];
}

async function loadReservas(eqId, ano, mes) {
  const inicio = `${ano}-${String(mes+1).padStart(2,'0')}-01`;
  const fim = `${ano}-${String(mes+1).padStart(2,'0')}-${new Date(ano,mes+1,0).getDate()}`;
  const data = await sb.query('reservas', { filter: { equipamento_id: `eq.${eqId}`, data: `gte.${inicio}`, 'data': `lte.${fim}` }, order: 'data.asc,hora_inicio.asc' });
  return Array.isArray(data) ? data : [];
}

async function loadEscalas(eqId, inicio, fim) {
  const resp2 = await fetch(SUPABASE_URL+'/rest/v1/escalas?equipamento_id=eq.'+eqId+'&data=gte.'+inicio+'&data=lte.'+fim+'&order=data.asc,hora_inicio.asc&select=*',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  const data = await resp2.json();
  return Array.isArray(data) ? data : [];
}

async function loadParametros(eqId) {
  const data = await sb.query('parametros_agua_config', { filter: { equipamento_id: `eq.${eqId}`, ativo: 'eq.true' }, order: 'ordem.asc' });

}

}

}

async function loadUtilizadores() {

// ===== EVENT ATTACHMENT =====
function attachPageEvents() {
  // Dashboard load memorandos count
  if(state.page==='dashboard') {
    sb.query('memorandos_dds', { filter: { estado: 'eq.pendente' } }).then(d=>{
      const el = document.getElementById('dash-memorandos');
      if(el) el.textContent = Array.isArray(d) ? d.length : '—';
    });
    sb.query('memorandos_reparacao', { filter: { estado: 'eq.pendente' } }).then(d=>{});
  }

  // Equipamento detalhe tab events
  if(state.page==='equipamento_detalhe') {
    attachTabEvents();
  }

  // Memorandos DDS
  if(state.page==='memorandos_dds') {
    loadAndRenderMemorandosDDS('todos');
    document.querySelectorAll('[data-filter]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ loadAndRenderMemorandosDDS(btn.dataset.filter); });
    });
    document.getElementById('btn-novo-memo-dds')?.addEventListener('click', ()=>openModalMemorandoDDS());
  }

  // Utilizadores
  if(state.page==='utilizadores') {
    loadAndRenderUtilizadores();
    document.getElementById('btn-novo-user')?.addEventListener('click', ()=>openModalNovoUser());
  }

  // Config
  if(state.page==='config_equipamentos') {
    loadAndRenderConfigEq();
    document.getElementById('btn-novo-eq-config')?.addEventListener('click', ()=>openModalEquipamento());
  }

  // Equipamentos list
  if(state.page==='equipamentos') {
    document.getElementById('btn-novo-eq')?.addEventListener('click', ()=>openModalEquipamento());
    document.querySelectorAll('[onclick^="editEquipamento"]').forEach(el=>{
      const id = el.getAttribute('onclick').match(/'([^']+)'/)[1];
      el.onclick = ()=>editEquipamento(id);
    });
  }
}

function attachTabEvents() {
  const eq = state.equipamentos.find(e=>e.id===state.selectedEquipamento) || state.equipamentos.find(e=>e.id===state.selectedEquipamento?.id);
  if(!eq) return;

  if(state.tab==='reservas') {
    loadAndRenderCalendario(eq);
    document.getElementById('btn-nova-reserva')?.addEventListener('click', ()=>openModalReserva(eq));
    document.getElementById('cal-prev')?.addEventListener('click', ()=>{ if(state.calMonth===0){state.calMonth=11;state.calYear--;}else state.calMonth--; setTab('reservas'); });
    document.getElementById('cal-next')?.addEventListener('click', ()=>{ if(state.calMonth===11){state.calMonth=0;state.calYear++;}else state.calMonth++; setTab('reservas'); });
  }

  if(state.tab==='checklist_inicio'||state.tab==='checklist_termo') {
    const momento = state.tab==='checklist_inicio'?'inicio_turno':'termo_turno';
    loadAndRenderChecklistItens(eq, momento);
    document.getElementById('btn-novo-item-check')?.addEventListener('click', ()=>openModalNovoItemCheck(eq, momento));
  }

  if(state.tab==='escala') {
    loadAndRenderEscala(eq);
    document.getElementById('btn-novo-turno')?.addEventListener('click', ()=>openModalNovoTurno(eq));
    document.getElementById('escala-prev')?.addEventListener('click', ()=>{ state.escalaSemana = new Date(state.escalaSemana.getTime()-7*86400000); setTab('escala'); });
    document.getElementById('escala-next')?.addEventListener('click', ()=>{ state.escalaSemana = new Date(state.escalaSemana.getTime()+7*86400000); setTab('escala'); });
  }

  if(state.tab==='parametros_agua') {
    loadAndRenderParametros(eq);
    document.getElementById('btn-novo-param')?.addEventListener('click', ()=>openModalNovoParam(eq));
    document.getElementById('btn-registar-agua')?.addEventListener('click', ()=>openModalRegistarAgua(eq));
  }

  if(state.tab==='relatorios') {
    document.getElementById('btn-gerar-rel')?.addEventListener('click', ()=>gerarRelatorio(eq));
  }

  if(state.tab==='memorandos_rep') {
    loadAndRenderMemorandosRep(eq);
    document.getElementById('btn-novo-memo-rep')?.addEventListener('click', ()=>openModalMemorandoRep(eq));
  }
}

// ===== ASYNC RENDERERS =====
async function loadAndRenderCalendario(eq) {
  const reservas = await loadReservas(eq.id, state.calYear, state.calMonth);
  reservas.forEach(r=>{
    const cel = document.getElementById(`cal-eventos-${r.data}`);
    if(cel) {
      const cls = r.espaco==='campo'?'campo':r.espaco==='sala_ginastica'?'sala':'';
      cel.innerHTML += `<div class="cal-event ${cls}" title="${r.nome_entidade}">${r.hora_inicio.slice(0,5)} ${r.nome_entidade.slice(0,10)}</div>`;
    }
  });
}

async function loadAndRenderChecklistItens(eq, momento) {
  const el = document.getElementById(`checklist-itens-${momento}`);
  if(!el) return;
  const itens = await loadChecklistItens(eq.id, momento);
  if(!itens.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Sem itens de checklist definidos.${isAdmin()?' Adicione itens clicando no botão acima.':''}</p></div>`;
    return;
  }
  const state_checks = {};
  el.innerHTML = itens.map(item=>`
    <div class="checklist-item" id="ci-${item.id}">
      <div class="check-toggle">
        <button class="check-btn sim" onclick="toggleCheck('${item.id}',true)" title="Conforme">✓</button>
        <button class="check-btn nao" onclick="toggleCheck('${item.id}',false)" title="Não conforme">✗</button>
      </div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${item.descricao}</div>
      </div>
      <div style="display:flex;gap:6px">
        ${isAdmin()?`<button class="btn btn-xs btn-danger" onclick="deleteCheckItem('${item.id}')">🗑️</button>`:''}
      </div>
    </div>`).join('');

  const wrap = document.getElementById('registo-checklist-wrap');
  if(wrap && itens.length) {
    wrap.innerHTML = `<button class="btn btn-success" onclick="submeterChecklist('${eq.id}','${momento}')">💾 Submeter Checklist</button>`;
  }
}

async function loadAndRenderEscala(eq) {
  const hoje = new Date(state.escalaSemana);
  const inicioSemana = new Date(hoje);
  inicioSemana.setDate(hoje.getDate() - hoje.getDay() + 1);
  const dias = Array.from({length:7},(_,i)=>{const d=new Date(inicioSemana);d.setDate(inicioSemana.getDate()+i);return d;});
  const inicio = dias[0].toISOString().slice(0,10);
  const fim = dias[6].toISOString().slice(0,10);
  const escalas = await loadEscalas(eq.id, inicio, fim);
  const utilizadores = await sb.query('utilizadores', {});

  dias.forEach(d=>{
    const dateStr = d.toISOString().slice(0,10);
    const cel = document.getElementById(`escala-cell-${dateStr}`);
    if(!cel) return;
    const turnos = escalas.filter(e=>e.data===dateStr);
    if(!turnos.length) { cel.innerHTML = `<div style="font-size:11px;color:var(--cinza-medio);text-align:center;margin-top:20px">—</div>`; return; }
    cel.innerHTML = turnos.map(t=>{
      const u = Array.isArray(utilizadores) ? utilizadores.find(x=>x.id===t.utilizador_id) : null;
      const clsMap = { manha:'manha', tarde:'tarde', noite:'noite', recepcao:'recepcao', nadador_salvador:'ns' };
      const cls = clsMap[t.funcao]||'';
      return `<div class="escala-turno ${cls}" title="${u?.nome||'—'}">
        <div style="font-weight:700">${u?.nome?.split(' ')[0]||'—'}</div>
        <div style="font-size:9px">${t.hora_inicio||''}${t.hora_fim?'–'+t.hora_fim:''}</div>
      </div>`;
    }).join('');
  });
}

async function loadAndRenderParametros(eq) {
  const el = document.getElementById('parametros-lista');
  if(!el) return;
  const params = await loadParametros(eq.id);
  if(!params.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">💧</div><p>Sem parâmetros configurados.${isAdmin()?' Adicione parâmetros acima.':''}</p></div>`;
  } else {
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Parâmetro</th><th>Unidade</th><th>Mínimo</th><th>Máximo</th><th>Estado</th>${isAdmin()?'<th></th>':''}</tr></thead>
      <tbody>${params.map(p=>`<tr>
        <td><strong>${p.nome}</strong></td>
        <td>${p.unidade||'—'}</td>
        <td>${p.valor_min??'—'}</td>
        <td>${p.valor_max??'—'}</td>
        <td><span class="status status-confirmada">Ativo</span></td>
        ${isAdmin()?`<td><button class="btn btn-xs btn-danger" onclick="deleteParam('${p.id}')">🗑️</button></td>`:''}
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  // Registos de hoje
  const hoje = new Date().toISOString().slice(0,10);
  const elHoje = document.getElementById('agua-hoje');
  if(elHoje) {
    const regs = await sb.query('parametros_agua_registo', { filter: { equipamento_id: `eq.${eq.id}`, data: `eq.${hoje}` }, order: 'hora.asc' });
    if(!Array.isArray(regs)||!regs.length) {
      elHoje.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>Sem registos hoje. Clique em "Registar Valores".</p></div>`;
    } else {
      elHoje.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Hora</th><th>Parâmetro</th><th>Valor</th><th>Observação</th></tr></thead>
        <tbody>${regs.map(r=>{
          const p = params.find(x=>x.id===r.parametro_id);
          const conforme = (!p?.valor_min||r.valor>=p.valor_min)&&(!p?.valor_max||r.valor<=p.valor_max);
          return `<tr>
            <td>${r.hora?.slice(0,5)||'—'}</td>
            <td>${p?.nome||'—'}</td>
            <td><strong style="color:${conforme?'var(--verde)':'var(--vermelho)'}">${r.valor} ${p?.unidade||''}</strong></td>
            <td>${r.observacao||'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
  }
}

async function loadAndRenderMemorandosRep(eq) {
  const el = document.getElementById('memorandos-rep-lista');

  const memos = await loadMemorandosRep(eq.id);

  el.innerHTML = `<div class="table-wrap"><table>

    <tbody>${memos.map(m=>{
      const dias = m.data_conclusao ? Math.floor((new Date(m.data_conclusao)-new Date(m.data_pedido))/(1000*60*60*24)) : Math.floor((new Date()-new Date(m.data_pedido))/(1000*60*60*24));

        <td>${m.descricao}</td>
        <td>${m.brigada||'—'}</td>

        <td><span class="dias-contador ${cls}">${dias}d</span></td>
        <td>${m.data_conclusao?formatDate(m.data_conclusao):'—'}</td>
        <td><button class="btn btn-xs btn-outline" onclick="editMemorandoRep('${m.id}','${eq.id}')">✏️</button></td>
      </tr>`;}).join('')}
    </tbody>
  </table></div>`;
}

async function loadAndRenderMemorandosDDS(filter='todos') {
  const el = document.getElementById('memorandos-dds-lista');
  if(!el) return;
  const memos = await loadMemorandosDDS(filter);
  if(!memos.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Sem memorandos ${filter!=='todos'?'neste estado':''}.</p></div>`;

  el.innerHTML = `<div class="table-wrap"><table>

async function submeterReserva(eqId, temEspacos) {
  const entidade = document.getElementById('res-entidade')?.value?.trim();
  const data = document.getElementById('res-data')?.value;
  const hinicio = document.getElementById('res-hinicio')?.value;

  if(!entidade||!data||!hinicio||!hfim) { toast('Preencha todos os campos obrigatórios.','error'); return; }
  const espaco = temEspacos==='true' ? (document.getElementById('res-espaco')?.value||'campo') : 'geral';
  const npessoas = temEspacos==='true' ? null : parseInt(document.getElementById('res-npessoas')?.value)||null;
  try {
    await sb.insert('reservas', { equipamento_id: eqId, espaco, data, hora_inicio: hinicio, hora_fim: hfim, nome_entidade: entidade, contacto: document.getElementById('res-contacto')?.value||null, num_pessoas: npessoas, observacoes: document.getElementById('res-obs')?.value||null, criado_por: state.user.id });

  const params = await loadParametros(eq.id);
  if(!params.length) { toast('Sem parâmetros configurados para esta piscina.','error'); return; }
  showModal(`<div class="modal modal-lg">
    <h2>💧 Registar Parâmetros da Água</h2>
    <div class="alert alert-info">📅 ${new Date().toLocaleDateString('pt-PT')} · ⏰ ${new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}</div>
    ${params.map(p=>`
      <div class="param-row">
        <div>
          <div class="param-name">${p.nome}</div>
          <div class="param-range">${p.valor_min??''}${p.valor_min&&p.valor_max?' – ':''}${p.valor_max??''} ${p.unidade||''}</div>
        </div>
        <input type="number" step="0.01" class="param-input" id="regagua-${p.id}" placeholder="—"/>
        <div class="param-status param-ok" id="regagua-status-${p.id}">✓</div>
      </div>`).join('')}
    <div class="form-group" style="margin-top:12px"><label>Observações Gerais</label><textarea id="regagua-obs" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-success" onclick="submeterAgua('${eq.id}')">💾 Guardar Registos</button>
    </div>
  </div>`);

  params.forEach(p=>{
    document.getElementById(`regagua-${p.id}`)?.addEventListener('input', e=>{
      const v = parseFloat(e.target.value);
      const s = document.getElementById(`regagua-status-${p.id}`);
      if(!s||isNaN(v)) return;
      const ok = (!p.valor_min||v>=p.valor_min)&&(!p.valor_max||v<=p.valor_max);
      s.className = `param-status ${ok?'param-ok':'param-nok'}`;
      s.textContent = ok?'✓':'✗';
    });
  });
}

async function submeterAgua(eqId) {
  const params = await loadParametros(eqId);
  const hoje = new Date().toISOString().slice(0,10);
  const hora = new Date().toTimeString().slice(0,5);
  const obs = document.getElementById('regagua-obs')?.value||null;
  let count = 0;
  for(const p of params) {
    const v = parseFloat(document.getElementById(`regagua-${p.id}`)?.value);
    if(!isNaN(v)) {
      await sb.insert('parametros_agua_registo', { equipamento_id: eqId, parametro_id: p.id, valor: v, data: hoje, hora, observacao: obs, registado_por: state.user.id });
      count++;
    }
  }
  closeModal(); toast(`${count} parâmetro(s) registado(s)!`,'success');
  loadAndRenderParametros(state.equipamentos.find(e=>e.id===eqId));
}

async function editEquipamento(id) {
  const eqs = await sb.query('equipamentos', { filter: { id: `eq.${id}` } });
  const eq = Array.isArray(eqs)&&eqs[0];
  if(!eq) return;
  showModal(`<div class="modal">
    <h2>✏️ Editar Equipamento</h2>
    <div class="form-group"><label>Nome</label><input type="text" id="eq-nome" value="${eq.nome}"/></div>
    <div class="form-row">
      <div class="form-group"><label>Tipo</label><select id="eq-tipo">
        <option value="pavilhao" ${eq.tipo==='pavilhao'?'selected':''}>🏟️ Pavilhão</option>
        <option value="piscina_coberta" ${eq.tipo==='piscina_coberta'?'selected':''}>🏊 Piscina Coberta</option>
        <option value="piscina_descoberta" ${eq.tipo==='piscina_descoberta'?'selected':''}>🌊 Piscina Descoberta</option>
        <option value="complexo" ${eq.tipo==='complexo'?'selected':''}>🌿 Complexo</option>
        <option value="casa_juventude" ${eq.tipo==='casa_juventude'?'selected':''}>🏠 Casa da Juventude</option>
      </select></div>
      <div class="form-group"><label>Localização</label><input type="text" id="eq-local" value="${eq.localizacao||''}"/></div>
    </div>
    <div class="form-group"><label>Responsável</label><input type="text" id="eq-resp" value="${eq.responsavel_nome||''}"/></div>
    <div class="form-group"><label><input type="checkbox" id="eq-sazonal" ${eq.sazonal?'checked':''}/> Equipamento Sazonal</label></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="toggleEqAtivo('${id}',${!eq.ativo})">${eq.ativo?'🚫 Desativar':'✅ Ativar'}</button>
      <button class="btn btn-primary" onclick="submeterEquipamento('${id}')">💾 Guardar</button>
    </div>
  </div>`);
}

async function submeterEquipamento(id) {
  const nome = document.getElementById('eq-nome')?.value?.trim();
  if(!nome) { toast('Nome obrigatório.','error'); return; }
  const data = { nome, tipo: document.getElementById('eq-tipo')?.value, localizacao: document.getElementById('eq-local')?.value||null, responsavel_nome: document.getElementById('eq-resp')?.value||null, sazonal: document.getElementById('eq-sazonal')?.checked||false };
  if(id) await sb.update('equipamentos', id, data);
  else await sb.insert('equipamentos', data);
  closeModal(); toast(id?'Equipamento atualizado!':'Equipamento criado!','success');
  await loadEquipamentos(); render();
}

async function toggleEqAtivo(id, ativo) {
  await sb.update('equipamentos', id, { ativo });
  closeModal(); toast(ativo?'Equipamento ativado!':'Equipamento desativado!','success');
  await loadEquipamentos(); render();
}

    <div class="codigo-display">

      <p>Código gerado automaticamente — copie e envie ao utilizador</p>
    </div>
    <input type="hidden" id="nu-codigo" value="${codigo}"/>

function regenerarCodigoModal() {
  const c = gerarCodigo();
  document.getElementById('nu-codigo').value = c;
  document.getElementById('nu-codigo-display').textContent = c;
}

async function submeterNovoUser() {
  const nome = document.getElementById('nu-nome')?.value?.trim();
  const perfil = document.getElementById('nu-perfil')?.value;
  const codigo = document.getElementById('nu-codigo')?.value;
  if(!nome) { toast('Nome obrigatório.','error'); return; }
  const hash = hashCode(codigo);
  await sb.insert('utilizadores', { nome, codigo_hash: hash, codigo_visivel: codigo, perfil });
  closeModal(); toast(`Utilizador criado! Código: ${codigo}`,'success');
  loadAndRenderUtilizadores();
}

async function editUser(id) {
  const users = await sb.query('utilizadores', { filter: { id: `eq.${id}` } });
  const u = Array.isArray(users)&&users[0];
  if(!u) return;
  showModal(`<div class="modal">
    <h2>✏️ Editar Utilizador</h2>
    <div class="form-group"><label>Nome</label><input type="text" id="eu-nome" value="${u.nome}"/></div>
    <div class="form-group"><label>Perfil</label><select id="eu-perfil">
      <option value="funcionario" ${u.perfil==='funcionario'?'selected':''}>Funcionário</option>
      <option value="responsavel" ${u.perfil==='responsavel'?'selected':''}>Responsável</option>
      <option value="supervisor" ${u.perfil==='supervisor'?'selected':''}>Supervisor</option>
      <option value="admin" ${u.perfil==='admin'?'selected':''}>Admin</option>
    </select></div>
    <div class="codigo-display">
      <div class="codigo">${u.codigo_visivel}</div>
      <p>Código atual do utilizador</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEditUser('${id}')">💾 Guardar</button>
    </div>
  </div>`);
}

async function guardarEditUser(id) {
  const nome = document.getElementById('eu-nome')?.value?.trim();
  const perfil = document.getElementById('eu-perfil')?.value;
  if(!nome) { toast('Nome obrigatório.','error'); return; }
  await sb.update('utilizadores', id, { nome, perfil });
  closeModal(); toast('Utilizador atualizado!','success');
  loadAndRenderUtilizadores();
}

async function regenarCodigo(id) {
  if(!confirm('Gerar novo código? O código anterior deixará de funcionar.')) return;
  const novo = gerarCodigo();
  const hash = hashCode(novo);
  await sb.update('utilizadores', id, { codigo_hash: hash, codigo_visivel: novo });
  toast(`Novo código: ${novo}`,'success');
  loadAndRenderUtilizadores();
  showModal(`<div class="modal">
    <h2>🔄 Novo Código Gerado</h2>
    <div class="codigo-display">
      <div class="codigo">${novo}</div>
      <p>Envie este código ao utilizador. O código anterior já não funciona.</p>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Fechar</button></div>
  </div>`);
}

async function toggleUser(id, ativo) {
  if(!confirm(`${ativo?'Ativar':'Desativar'} este utilizador?`)) return;
  await sb.update('utilizadores', id, { ativo });
  toast(ativo?'Utilizador ativado!':'Utilizador desativado!','success');
  loadAndRenderUtilizadores();
}

async function deleteUser(id) {
  if(!confirm('Eliminar utilizador? Esta ação é irreversível.')) return;
  await sb.delete('utilizadores', id);
  toast('Utilizador eliminado.','success');
  loadAndRenderUtilizadores();
}

async function init() {
  document.getElementById('root').innerHTML = '<div class="login-wrap"><div class="login-card"><div class="loading"><div class="spinner"></div> A iniciar...</div></div></div>';
  const ok = await checkSession();
  if(ok) { await loadEquipamentos(); }
  render();
}
