<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>GestEq</title>
<style>
:root{
  --verde:#2d6a4f;--verde2:#40916c;--verde-claro:#52b788;--verde-pale:#d8f3dc;
  --azul-menu:#1a5fa8;--azul-menu2:#2271c3;--azul-menu-ativo:#2980d4;--azul-menu-titulo:#93c4ed;
  --dourado:#9a7b2f;--dourado-pale:#f5f0e0;
  --cinza-escuro:#1a1a1a;--cinza:#444;--cinza-medio:#888;--cinza-claro:#e4e8ed;
  --fundo:#f0f4f8;--branco:#fff;
  --vermelho:#c0392b;--vermelho-pale:#fdecea;
  --amarelo:#e67e22;--amarelo-pale:#fef3e2;
  --azul:#2471a3;--azul-pale:#eaf4fb;
  --sombra:0 2px 12px rgba(30,58,95,0.08);--sombra-forte:0 4px 24px rgba(0,0,0,0.18);
  --radius:12px;--radius-sm:8px;
  --fonte:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --topo-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);font-size:15px;overflow-x:hidden;}
button{font-family:var(--fonte);cursor:pointer;-webkit-appearance:none;}
#topo{position:fixed;top:0;left:0;right:0;height:var(--topo-h);background:linear-gradient(135deg,#1a5fa8 0%,#2271c3 100%);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:150;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
#btn-menu{background:none;border:none;color:#fff;font-size:22px;padding:4px 6px;line-height:1;flex-shrink:0;}
#topo-info{flex:1;min-width:0;}
#topo-eq-nome{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#topo-eq-tipo{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px;}
#btn-sair{background:rgba(255,255,255,0.12);border:none;color:#fff;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;flex-shrink:0;}
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background 0.25s;}
#menu-overlay.visivel{background:rgba(0,0,0,0.5);pointer-events:all;}
#menu-lateral{position:fixed;top:0;left:0;bottom:0;width:286px;background:var(--azul-menu);z-index:201;transform:translateX(-100%);transition:transform 0.27s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden;}
#menu-lateral.aberto{transform:translateX(0);}
#menu-topo{padding:20px 16px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
#menu-logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
#menu-logo-sub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;letter-spacing:0.3px;}
#menu-util{margin-top:14px;background:rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
#menu-util-avatar{width:34px;height:34px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
#menu-util-nome{font-size:13px;font-weight:600;color:#fff;}
#menu-util-perfil{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;text-transform:capitalize;}
#menu-corpo{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 24px;}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:3px solid transparent;}
.menu-item:active{background:rgba(255,255,255,0.06);}
.menu-item.ativo{background:var(--azul-menu-ativo);border-left-color:var(--verde-claro);}
.menu-item-icone{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.menu-item-nome{font-size:13px;color:rgba(255,255,255,0.82);}
.menu-item.ativo .menu-item-nome{color:#fff;font-weight:600;}
.menu-grupo-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 14px;cursor:pointer;border:none;background:none;width:100%;}
.menu-grupo-header:active{background:rgba(255,255,255,0.04);}
.menu-grupo-header-esq{display:flex;align-items:center;gap:8px;}
.menu-grupo-icone{font-size:16px;width:22px;text-align:center;}
.menu-grupo-nome{font-size:11px;font-weight:700;color:var(--azul-menu-titulo);text-transform:uppercase;letter-spacing:0.8px;}
.menu-grupo-seta{font-size:10px;color:var(--azul-menu-titulo);transition:transform 0.2s;}
.menu-grupo-seta.aberto{transform:rotate(180deg);}
.menu-grupo-filhos{display:none;}
.menu-grupo-filhos.aberto{display:block;}
.menu-filho{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 36px;border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:3px solid transparent;}
.menu-filho:active{background:rgba(255,255,255,0.06);}
.menu-filho.ativo{background:var(--azul-menu-ativo);border-left-color:var(--verde-claro);}
.menu-filho-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;}
.menu-filho.ativo .menu-filho-dot{background:var(--verde-claro);}
.menu-filho-nome{font-size:13px;color:rgba(255,255,255,0.75);}
.menu-filho.ativo .menu-filho-nome{color:#fff;font-weight:600;}
.menu-sep{height:1px;background:rgba(255,255,255,0.07);margin:6px 16px;}
#conteudo{padding-top:var(--topo-h);min-height:100vh;}
#area-eq{padding:14px;padding-bottom:40px;}
#ecra-carregar{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--cinza-claro);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ecra-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#1a5fa8 0%,#0d3d7a 100%);}
.login-card{background:var(--branco);border-radius:20px;box-shadow:var(--sombra-forte);padding:36px 28px;width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--cinza-claro);}
.login-logo-nome{font-size:32px;font-weight:800;color:var(--azul-menu);letter-spacing:-0.5px;}
.login-logo-sub{font-size:12px;color:var(--cinza-medio);margin-top:8px;font-weight:500;}
.campo-label{display:block;font-size:11px;font-weight:700;color:var(--cinza);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.campo-input{width:100%;padding:13px 14px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:17px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);outline:none;-webkit-appearance:none;text-transform:uppercase;letter-spacing:2px;}
.campo-input:focus{border-color:var(--verde-claro);}
.btn-primario{width:100%;background:var(--azul-menu);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;margin-top:18px;}
.erro-msg{color:var(--vermelho);font-size:13px;text-align:center;margin-top:12px;min-height:18px;}
.dash-saudacao{background:var(--azul-menu);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;}
.dash-saud-hora{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px;}
.dash-saud-nome{font-size:20px;font-weight:800;color:#fff;}
.dash-saud-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px;}
.dash-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dash-card{background:var(--branco);border-radius:var(--radius);padding:14px;box-shadow:var(--sombra);cursor:pointer;}
.dash-card-val{font-size:28px;font-weight:800;color:var(--azul-menu);line-height:1;}
.dash-card-label{font-size:12px;color:var(--cinza-medio);margin-top:5px;line-height:1.3;}
.dash-card-icone{font-size:22px;margin-bottom:8px;}
.dash-card.alerta .dash-card-val{color:var(--vermelho);}
.dash-card.aviso .dash-card-val{color:var(--amarelo);}
.dash-card.ok .dash-card-val{color:var(--verde);}
.dash-secao-titulo{font-size:13px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;margin-top:6px;}
.dash-acesso-rapido{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dash-btn-eq{background:var(--branco);border-radius:var(--radius);padding:12px;box-shadow:var(--sombra);border:none;text-align:left;cursor:pointer;display:flex;align-items:flex-start;gap:10px;width:100%;flex-direction:column;}
.dash-btn-eq:active{background:var(--fundo);}
.dash-btn-eq-row{display:flex;align-items:center;gap:8px;width:100%;}
.dash-btn-eq-icone{font-size:20px;flex-shrink:0;}
.dash-btn-eq-nome{font-size:12px;font-weight:600;color:var(--cinza-escuro);line-height:1.3;}
.dash-btn-eq-cnt{font-size:11px;color:var(--cinza-medio);}
.dash-alerta-item{background:var(--branco);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:7px;box-shadow:var(--sombra);display:flex;align-items:center;gap:10px;}
.dash-alerta-item.urgente{border-left:3px solid var(--vermelho);}
.dash-alerta-item.aviso{border-left:3px solid var(--amarelo);}
.dash-alerta-item.info{border-left:3px solid var(--azul);}
.dash-alerta-icone{font-size:18px;flex-shrink:0;}
.dash-alerta-txt{font-size:13px;color:var(--cinza-escuro);flex:1;line-height:1.3;}
.dash-alerta-sub{font-size:11px;color:var(--cinza-medio);margin-top:2px;}
.dash-reserva-item{background:var(--verde-pale);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.dash-reserva-nome{font-size:13px;font-weight:600;}
.dash-reserva-hora{font-size:12px;color:var(--verde);font-weight:700;}
.dash-reserva-eq{font-size:11px;color:var(--cinza-medio);margin-top:2px;}
.resp-card{background:var(--branco);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra);}
.resp-label{font-size:10px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.4px;}
.resp-nome{font-size:15px;font-weight:700;color:var(--cinza-escuro);margin-top:2px;}
.modulo-card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;}
.modulo-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.modulo-header-esq{display:flex;align-items:center;gap:10px;}
.modulo-icone{width:36px;height:36px;border-radius:9px;background:var(--azul-menu);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.modulo-nome{font-size:15px;font-weight:600;color:var(--cinza-escuro);}
.modulo-seta{font-size:12px;color:var(--cinza-medio);transition:transform 0.2s;flex-shrink:0;}
.modulo-seta.aberto{transform:rotate(180deg);}
.modulo-corpo{display:none;border-top:1.5px solid var(--cinza-claro);padding:14px;}
.modulo-corpo.aberto{display:block;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.subtabs::-webkit-scrollbar{display:none;}
.subtab-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:none;background:var(--cinza-claro);color:var(--cinza);white-space:nowrap;flex-shrink:0;}
.subtab-btn.ativo{background:var(--azul-menu);color:#fff;}
.escala-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.escala-sem-label{font-size:13px;font-weight:600;color:var(--cinza-escuro);text-align:center;flex:1;}
.btn-nav{background:var(--cinza-claro);border:none;border-radius:7px;padding:7px 12px;font-size:13px;color:var(--cinza-escuro);font-weight:600;}
.escala-dia{background:var(--fundo);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.escala-dia-titulo{font-size:11px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.escala-turno{display:flex;justify-content:space-between;align-items:center;background:var(--branco);border-radius:7px;padding:8px 10px;margin-bottom:4px;}
.escala-turno-nome{font-size:13px;font-weight:500;}
.escala-turno-hora{font-size:12px;color:var(--cinza-medio);}
.escala-sem-turno{font-size:12px;color:var(--cinza-medio);text-align:center;padding:6px;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cinza-claro);}
.check-item:last-child{border-bottom:none;}
.check-box{width:24px;height:24px;border:2px solid var(--cinza-claro);border-radius:6px;background:var(--branco);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.check-box.marcado{background:var(--verde);border-color:var(--verde);color:#fff;}
.check-texto{font-size:14px;color:var(--cinza-escuro);flex:1;line-height:1.3;}
.agua-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.agua-row-label{flex:1;}
.agua-row-label-nome{font-size:13px;font-weight:600;}
.agua-row-label-range{font-size:11px;color:var(--cinza-medio);margin-top:1px;}
.agua-inp{width:90px;flex:none;padding:10px 12px;border:1.5px solid var(--cinza-claro);border-radius:8px;font-size:15px;font-family:var(--fonte);background:var(--fundo);-webkit-appearance:none;outline:none;text-align:center;}
.agua-inp:focus{border-color:var(--verde-claro);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-mes{font-size:15px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.cal-cab{text-align:center;font-size:10px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;padding:4px 0;}
.cal-dia{text-align:center;padding:8px 2px;border-radius:7px;font-size:14px;cursor:pointer;}
.cal-dia.vazio{pointer-events:none;}
.cal-dia.hoje{background:var(--azul-menu);color:#fff;font-weight:700;}
.cal-dia.tem-res{background:#2d6a4f;color:#fff;font-weight:700;}
.cal-dia:active{background:var(--cinza-claro);}
.dds-seccao{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;}
.dds-seccao-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.dds-seccao-nome{font-size:14px;font-weight:700;color:var(--cinza-escuro);flex:1;}
.dds-badge{background:var(--azul-menu);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 9px;margin-right:8px;}
.dds-seccao-corpo{display:none;border-top:1.5px solid var(--cinza-claro);padding:12px;}
.dds-seccao-corpo.aberto{display:block;}
.dds-card{background:var(--fundo);border-radius:9px;padding:12px;margin-bottom:8px;}
.dds-card-topo{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.dds-num{font-size:12px;font-weight:700;color:var(--cinza-medio);}
.dds-data{font-size:12px;color:var(--cinza-medio);}
.dds-desc{font-size:14px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:7px;}
.dds-rodape{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.dds-dias{font-size:11px;font-weight:700;color:var(--amarelo);}
.memo-card{background:var(--fundo);border-radius:9px;padding:11px;margin-bottom:7px;}
.memo-topo{display:flex;justify-content:space-between;margin-bottom:5px;}
.memo-data-txt{font-size:12px;color:var(--cinza-medio);}
.memo-desc{font-size:13px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:5px;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px;}
.tag-verde{background:var(--verde-pale);color:var(--verde);}
.tag-cinza{background:var(--cinza-claro);color:var(--cinza);}
.tag-vermelho{background:var(--vermelho-pale);color:var(--vermelho);}
.tag-amarelo{background:var(--amarelo-pale);color:var(--amarelo);}
.tag-azul{background:var(--azul-pale);color:var(--azul);}
.btn-sm{display:inline-block;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;}
.btn-verde{background:var(--verde);color:#fff;}
.btn-azul{background:var(--azul-menu);color:#fff;}
.btn-cinza{background:var(--cinza-claro);color:var(--cinza-escuro);}
.btn-vermelho{background:var(--vermelho);color:#fff;}
.btn-bloco{width:100%;padding:12px;font-size:14px;}
.vazio{text-align:center;padding:24px 16px;color:var(--cinza-medio);font-size:14px;}
hr.sep{border:none;border-top:1.5px solid var(--cinza-claro);margin:12px 0;}
.campo-group{margin-bottom:12px;}
.campo-textarea{width:100%;padding:11px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;resize:vertical;min-height:72px;}
.campo-textarea:focus{border-color:var(--verde-claro);}
.campo-select{width:100%;padding:12px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;}
.campo-select:focus{border-color:var(--verde-claro);}
.campo-input-sm{width:100%;padding:11px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;}
.campo-input-sm:focus{border-color:var(--verde-claro);}
.form-card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);padding:14px;margin-bottom:12px;}
.form-titulo{font-size:14px;font-weight:700;color:var(--cinza-escuro);margin-bottom:12px;}
.row-btns{display:flex;gap:8px;margin-top:10px;}
.row-btns button{flex:1;}
.erro-inline{background:var(--vermelho-pale);color:var(--vermelho);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;}
.ficha-linha{padding:10px 0;border-bottom:1px solid var(--cinza-claro);display:flex;gap:10px;}
.ficha-lbl{font-size:11px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;width:100px;flex-shrink:0;padding-top:2px;}
.ficha-val{font-size:14px;color:var(--cinza-escuro);flex:1;line-height:1.4;}
.horario-dia{background:var(--fundo);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.horario-dia-topo{display:flex;align-items:center;gap:10px;}
.horario-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--cinza-claro);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;font-weight:700;}
.horario-chk.on{background:var(--verde);border-color:var(--verde);color:#fff;}
.horario-lbl{font-size:14px;font-weight:600;flex:1;}
.horario-extra{display:none;margin-top:10px;}
.horario-hora-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.horario-hora-lbl{font-size:12px;color:var(--cinza-medio);width:80px;flex-shrink:0;}
.horario-hora-inp{flex:1;padding:9px 12px;border:1.5px solid var(--cinza-claro);border-radius:8px;font-size:14px;font-family:var(--fonte);background:var(--fundo);-webkit-appearance:none;outline:none;}
.horario-hora-inp:focus{border-color:var(--verde-claro);}
.almoco-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;}

<script>

var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impwb2p5aHZvY3Nwa3N1bWxqc2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE3NDUsImV4cCI6MjA5NzQ0Nzc0NX0.qwAyl_zBx31Z6a3KbaHns8gWceRrjQPcdN3RDBTkGkA';
var SESSAO_HORAS=8;
var app={utilizador:null,equipamentos:[],eqAtivo:null,vistaAtual:'dashboard'};
var GRUPOS=[{id:'pavilhao',nome:'Pavilhões',tipos:['pavilhao']},{id:'pisc_cob',nome:'Piscinas Cobertas',tipos:['piscina_coberta']},{id:'pisc_desc',nome:'Piscinas Descobertas',tipos:['piscina_descoberta']},{id:'complexo',nome:'Complexo Vinha de Mouros',tipos:['complexo','ceavm','centro_hipico']},{id:'outros',nome:'Outros',tipos:['casa_juventude']}];
var TIPO_LABELS={'pavilhao':'Pavilhão Gimnodesportivo','piscina_coberta':'Piscina Municipal Coberta','piscina_descoberta':'Piscina Municipal Descoberta','complexo':'Complexo de Vinha de Mouros','ceavm':'Centro de Educação Ambiental','casa_juventude':'Casa da Juventude','centro_hipico':'Centro Hípico'};
var TIPO_ICONES={'pavilhao':'P','piscina_coberta':'C','piscina_descoberta':'D','complexo':'V','ceavm':'V','casa_juventude':'O','centro_hipico':'🐴'};
var TIPOS_ENTIDADE=['Associação / Clube','Grupo','Escola','Empresa','Particular','Outro'];
var MESES_PT=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MESES_C=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var DIAS_PT=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
var DIAS_FORM=[['seg','Segunda'],['ter','Terca'],['qua','Quarta'],['qui','Quinta'],['sex','Sexta'],['sab','Sabado'],['dom','Domingo']];
var PERFIL_LABELS={'trabalhador':'Funcionário(a)','funcionario':'Funcionário(a)','professor':'Professor','responsavel':'Responsável','responsavel_dds':'Responsável DDS','supervisor':'Supervisor','admin':'Administrador'};
function labelPerfil(p){return PERFIL_LABELS[p]||p.replace(/_/g,' ');}

// ── API ───────────────────────────────────────────────────────────────────────
function sbGet(t,p){return fetch(SB_URL+'/rest/v1/'+t+'?'+(p||''),{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}}).then(function(r){return r.json();});}
function sbPost(t,c){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(c)}).then(function(r){return r.json();});}
function sbPatch(t,filtro,c){return fetch(SB_URL+'/rest/v1/'+t+'?'+filtro,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(c)}).then(function(r){return r.json();});}

// ── SESSAO ────────────────────────────────────────────────────────────────────
function guardarSessao(uid){try{localStorage.setItem('gestEqSessao',JSON.stringify({uid:uid,exp:new Date().getTime()+SESSAO_HORAS*3600000}));}catch(e){}}
function lerSessao(){try{var raw=localStorage.getItem('gestEqSessao');if(!raw)return null;var o=JSON.parse(raw);if(!o||!o.uid||!o.exp)return null;if(new Date().getTime()>o.exp){localStorage.removeItem('gestEqSessao');return null;}return o.uid;}catch(e){return null;}}
function limparSessao(){try{localStorage.removeItem('gestEqSessao');}catch(e){}}

// ── ECRAS ─────────────────────────────────────────────────────────────────────
function mostrarEcra(qual){document.getElementById('ecra-carregar').style.display='none';document.getElementById('ecra-login').style.display='none';document.getElementById('area-eq').style.display='none';document.getElementById('topo').style.display='none';if(qual==='carregar'){document.getElementById('ecra-carregar').style.display='flex';}else if(qual==='login'){document.getElementById('ecra-login').style.display='flex';}else if(qual==='principal'){document.getElementById('topo').style.display='flex';document.getElementById('area-eq').style.display='block';}}

// ── MENU ──────────────────────────────────────────────────────────────────────
function abrirMenu(){document.getElementById('menu-lateral').classList.add('aberto');document.getElementById('menu-overlay').classList.add('visivel');}
function fecharMenu(){document.getElementById('menu-lateral').classList.remove('aberto');document.getElementById('menu-overlay').classList.remove('visivel');}
function renderMenu(){
  var corpo=document.getElementById('menu-corpo');corpo.innerHTML='';
  var u=app.utilizador;
  document.getElementById('menu-util-avatar').textContent=(u.nome||u.codigo_visivel||'?').charAt(0).toUpperCase();
  document.getElementById('menu-util-nome').textContent=u.nome||u.codigo_visivel;
  document.getElementById('menu-util-perfil').textContent='';
  addMenuItem(corpo,'dashboard','🏠','Dashboard',function(){navDashboard();fecharMenu();});
  if(u.perfil==='admin'||u.perfil==='supervisor'||u.perfil==='responsavel_dds'){addMenuItem(corpo,'relatorio-geral','📊','Estatísticas DDS',function(){navRelatorioGeral();fecharMenu();});}
  addMenuItem(corpo,'relatorio-reservas','📅','Relatório de Reservas',function(){navRelatorioReservas();fecharMenu();});
  if(u.perfil==='admin'||u.perfil==='supervisor'){addMenuItem(corpo,'relatorio-ferias','🏖️','Relatório de Férias',function(){navRelatorioFerias();fecharMenu();});}
  if(u.perfil==='admin'||u.perfil==='supervisor'||u.perfil==='responsavel_dds'){addSep(corpo);addMenuItem(corpo,'dds','📨','Memorandos DDS',function(){navDDS();fecharMenu();});}
  addSep(corpo);
  for(var g=0;g<GRUPOS.length;g++){var grp=GRUPOS[g];var eqsG=filtrarEqGrupo(grp);if(!eqsG.length)continue;addGrupoMenu(corpo,grp,eqsG);}
  if(u.perfil==='admin'||u.perfil==='supervisor'){addSep(corpo);addMenuItem(corpo,'chk-painel','✅','Painel de Checklists',function(){navPainelChk();fecharMenu();});}
  if(u.perfil==='admin'){addSep(corpo);addMenuItem(corpo,'adm-util','👥','Utilizadores',function(){navAdmin('utilizadores');fecharMenu();});addMenuItem(corpo,'adm-eq','🏛','Equipamentos',function(){navAdmin('equipamentos');fecharMenu();});addMenuItem(corpo,'adm-avisos','📢','Avisos',function(){navAvisos();fecharMenu();});}
}
function filtrarEqGrupo(grp){var r=[];for(var i=0;i<app.equipamentos.length;i++){for(var t=0;t<grp.tipos.length;t++){if(app.equipamentos[i].tipo===grp.tipos[t]){r.push(app.equipamentos[i]);break;}}}return r;}
function addSep(pai){var s=document.createElement('div');s.className='menu-sep';pai.appendChild(s);}
function addMenuItem(pai,id,ic,txt,fn){var btn=document.createElement('button');btn.className='menu-item';btn.id='menu-item-'+id;var s1=document.createElement('span');s1.className='menu-item-icone';s1.textContent=ic;var s2=document.createElement('span');s2.className='menu-item-nome';s2.textContent=txt;btn.appendChild(s1);btn.appendChild(s2);btn.onclick=fn;pai.appendChild(btn);}
function addGrupoMenu(pai,grupo,eqs){
  var div=document.createElement('div');
  var hdr=document.createElement('button');hdr.className='menu-grupo-header';
  var esq=document.createElement('div');esq.className='menu-grupo-header-esq';
  var ic=document.createElement('span');ic.className='menu-grupo-icone';var grupoEmojis={'pavilhao':'🏟','pisc_cob':'🏊','pisc_desc':'🌊','complexo':'🌳','outros':'🏠'};ic.textContent=grupoEmojis[grupo.id]||'📍';
  var nm=document.createElement('span');nm.className='menu-grupo-nome';nm.textContent=grupo.nome;
  esq.appendChild(ic);esq.appendChild(nm);
  var seta=document.createElement('span');seta.className='menu-grupo-seta';seta.textContent='v';
  hdr.appendChild(esq);hdr.appendChild(seta);
  var filhos=document.createElement('div');filhos.className='menu-grupo-filhos';
  for(var j=0;j<eqs.length;j++){(function(eq){var item=document.createElement('button');item.className='menu-filho';item.id='menu-item-'+eq.id;var dot=document.createElement('span');dot.className='menu-filho-dot';var nome=document.createElement('span');nome.className='menu-filho-nome';nome.textContent=eq.nome;item.appendChild(dot);item.appendChild(nome);item.onclick=function(){navEq(eq.id);fecharMenu();};filhos.appendChild(item);})(eqs[j]);}
  hdr.onclick=function(){var ab=filhos.classList.contains('aberto');if(ab){filhos.classList.remove('aberto');seta.classList.remove('aberto');}else{filhos.classList.add('aberto');seta.classList.add('aberto');}};
  div.appendChild(hdr);div.appendChild(filhos);pai.appendChild(div);
}
function marcarMenuAtivo(id){var items=document.querySelectorAll('.menu-item,.menu-filho');for(var i=0;i<items.length;i++)items[i].classList.remove('ativo');var el=document.getElementById('menu-item-'+id);if(el){el.classList.add('ativo');var pai=el.parentElement;if(pai&&pai.classList.contains('menu-grupo-filhos')){pai.classList.add('aberto');var h=pai.previousSibling;if(h){var s=h.querySelector('.menu-grupo-seta');if(s)s.classList.add('aberto');}}}}
function definirTopo(nome,tipo){document.getElementById('topo-eq-nome').textContent=nome;document.getElementById('topo-eq-tipo').textContent=tipo||'';}

// ── INICIO ────────────────────────────────────────────────────────────────────
function iniciar(){mostrarEcra('carregar');var uid=lerSessao();if(!uid){mostrarEcra('login');return;}sbGet('utilizadores','id=eq.'+uid+'&select=*').then(function(d){if(!d||!d.length||!d[0].ativo){limparSessao();mostrarEcra('login');return;}app.utilizador=d[0];carregarEquipamentos();}).catch(function(){mostrarEcra('login');});}
function carregarEquipamentos(){var u=app.utilizador;if(u.perfil==='responsavel_dds'){app.equipamentos=[];arrancarApp();return;}if(u.perfil==='admin'||u.perfil==='supervisor'){sbGet('equipamentos','select=*&order=nome.asc').then(function(eqs){app.equipamentos=eqs||[];arrancarApp();}).catch(function(){mostrarEcra('login');});return;}sbGet('utilizador_equipamentos','utilizador_id=eq.'+u.id+'&ativo=eq.true&select=equipamentos(id,nome,tipo,responsavel)').then(function(rels){var eqs=[];if(rels)for(var i=0;i<rels.length;i++)if(rels[i].equipamentos)eqs.push(rels[i].equipamentos);app.equipamentos=eqs;arrancarApp();}).catch(function(){mostrarEcra('login');});}
function arrancarApp(){mostrarEcra('principal');renderMenu();if(app.utilizador.perfil==='responsavel_dds'){navDDS();return;}navDashboard();setTimeout(verificarAvisosNaoLidos,1500);}

// ── UTEIS ─────────────────────────────────────────────────────────────────────
function dataISO(d){var mm=d.getMonth()+1;var dd=d.getDate();return d.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);}
function inicioSemana(d){var c=new Date(d);c.setHours(0,0,0,0);var dw=c.getDay();c.setDate(c.getDate()-(dw===0?6:dw-1));return c;}
function addDias(d,n){var c=new Date(d);c.setDate(c.getDate()+n);return c;}
function diasEntre(d1,d2){return Math.floor((d2-d1)/86400000);}
function area(){return document.getElementById('area-eq');}

// ── MODAL GENERICO ────────────────────────────────────────────────────────────
function criarModal(titulo,conteudo,fnFechar){
  var ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;';
  var md=document.createElement('div');md.style.cssText='background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 40px;box-shadow:0 -4px 24px rgba(0,0,0,0.18);';
  var top=document.createElement('div');top.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;';
  var tit=document.createElement('div');tit.style.cssText='font-size:16px;font-weight:800;color:var(--azul-menu);';tit.textContent=titulo;
  var bf=document.createElement('button');bf.style.cssText='background:var(--cinza-claro);border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;';bf.textContent='Fechar';bf.onclick=function(){document.body.removeChild(ov);if(fnFechar)fnFechar();};
  top.appendChild(tit);top.appendChild(bf);md.appendChild(top);
  if(typeof conteudo==='string'){var p=document.createElement('div');p.textContent=conteudo;md.appendChild(p);}else{md.appendChild(conteudo);}
  ov.appendChild(md);document.body.appendChild(ov);
  ov.onclick=function(e){if(e.target===ov){document.body.removeChild(ov);if(fnFechar)fnFechar();}};
  return {ov:ov,md:md,fechar:function(){if(document.body.contains(ov))document.body.removeChild(ov);}};
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function navDashboard(){
  app.vistaAtual='dashboard';definirTopo('Dashboard','Cabeceiras de Basto');marcarMenuAtivo('dashboard');
  var a=area();a.innerHTML='';
  var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';a.appendChild(load);
  var u=app.utilizador;var hoje=dataISO(new Date());var hora=new Date().getHours();
  var saud=hora<12?'Bom dia':(hora<19?'Boa tarde':'Boa noite');
  // Filtrar por equipamentos do utilizador (admin/supervisor veem tudo)
  var eqIds=[];for(var ei=0;ei<app.equipamentos.length;ei++)eqIds.push(app.equipamentos[ei].id);
  var filtraEq=(u.perfil!=='admin'&&u.perfil!=='supervisor')&&eqIds.length>0;
  var eTrabalhador=(u.perfil==='trabalhador'||u.perfil==='funcionario'||u.perfil==='professor'||u.perfil==='responsavel');
  var qRes='data=eq.'+hoje+'&select=*,equipamentos(nome)&order=hora_inicio.asc&limit=20';
  var qChk='data_registo=gte.'+hoje+'T00:00:00&select=id&limit=50';
  var qDDS='estado=eq.pendente&select=id&limit=100';
  var qRep='estado=neq.concluido&select=id,urgencia&limit=100';
  // Verificacoes dos ultimos 15 dias
  var h15=new Date();h15.setDate(h15.getDate()-15);
  var iso15=h15.getFullYear()+'-'+('0'+(h15.getMonth()+1)).slice(-2)+'-'+('0'+h15.getDate()).slice(-2)+'T00:00:00';
  var qVer='momento=eq.verificacao&data_registo=gte.'+iso15+'&select=equipamento_id&limit=200';
  if(filtraEq){
    var eqIn='('+eqIds.join(',')+')';
    qRes=qRes+'&equipamento_id=in.'+eqIn;
    qChk=qChk+'&equipamento_id=in.'+eqIn;
    qRep=qRep+'&equipamento_id=in.'+eqIn;
    qVer=qVer+'&equipamento_id=in.'+eqIn;
    // trabalhador so ve memorandos internos dos seus equipamentos (nao DDS gerais)
    if(eTrabalhador)qDDS='estado=eq.pendente&equipamento_id=in.'+eqIn+'&select=id&limit=100&criado_por_dds=eq.false';
  }
  Promise.all([
    sbGet('memorandos_dds',qDDS).then(function(r){return{t:'dds',d:r||[]};}).catch(function(){return{t:'dds',d:[]};}),
    sbGet('checklists_registo',qChk).then(function(r){return{t:'chk',d:r||[]};}).catch(function(){return{t:'chk',d:[]};}),
    sbGet('reservas',qRes).then(function(r){return{t:'res',d:r||[]};}).catch(function(){return{t:'res',d:[]};}),
    sbGet('memorandos_reparacao',qRep).then(function(r){return{t:'rep',d:r||[]};}).catch(function(){return{t:'rep',d:[]};}),
    sbGet('checklists_registo',qVer).then(function(r){return{t:'ver',d:r||[]};}).catch(function(){return{t:'ver',d:[]};})
  ]).then(function(rs){
    a.removeChild(load);
    var dds=[],chk=[],res=[],rep=[],ver=[];
    for(var i=0;i<rs.length;i++){if(rs[i].t==='dds')dds=rs[i].d;if(rs[i].t==='chk')chk=rs[i].d;if(rs[i].t==='res')res=rs[i].d;if(rs[i].t==='rep')rep=rs[i].d;if(rs[i].t==='ver')ver=rs[i].d;}
    var urg=0;for(var j=0;j<rep.length;j++)if(rep[j].urgencia==='urgente')urg++;
    // Equipamentos sem verificacao nos ultimos 15 dias
    var verEqIds={};for(var vi=0;vi<ver.length;vi++)verEqIds[ver[vi].equipamento_id]=true;
    var eqSemVer=[];for(var evi=0;evi<app.equipamentos.length;evi++){if(!verEqIds[app.equipamentos[evi].id])eqSemVer.push(app.equipamentos[evi].nome);}
    // Saudacao
    var sd=document.createElement('div');sd.className='dash-saudacao';
    var sh=document.createElement('div');sh.className='dash-saud-hora';sh.textContent=new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
    var sn=document.createElement('div');sn.className='dash-saud-nome';sn.textContent=saud+', '+(u.nome||u.codigo_visivel);
    var ss=document.createElement('div');ss.className='dash-saud-sub';ss.textContent=app.equipamentos.length+' equipamento'+(app.equipamentos.length!==1?'s':'')+' atribuído'+(app.equipamentos.length!==1?'s':'');
    sd.appendChild(sh);sd.appendChild(sn);sd.appendChild(ss);a.appendChild(sd);
    // Cards com emojis
    var cg=document.createElement('div');cg.className='dash-cards';
    var cardsD=[
      {v:dds.length,l:eTrabalhador?'Pedidos enviados pendentes':'Memorandos DDS pendentes',ic:'📨',cl:dds.length>0?'aviso':'ok',fn:eTrabalhador?null:navDDS},
      {v:chk.length>0?'Sim':'Não',l:'Checklists feitas hoje',ic:'✅',cl:chk.length>0?'ok':'aviso',fn:null},
      {v:res.length,l:'Reservas para hoje',ic:'📅',cl:res.length>0?'aviso':'ok',fn:null},
      {v:urg>0?urg:rep.length,l:urg>0?'Reparações urgentes':'Reparações em aberto',ic:'🔧',cl:urg>0?'alerta':(rep.length>0?'aviso':'ok'),fn:null}
    ];
    for(var ci=0;ci<cardsD.length;ci++){(function(cd){
      var c=document.createElement('div');c.className='dash-card '+cd.cl;if(cd.fn)c.onclick=cd.fn;
      var ci2=document.createElement('div');ci2.className='dash-card-icone';ci2.textContent=cd.ic;
      var v=document.createElement('div');v.className='dash-card-val';v.textContent=cd.v;
      var l=document.createElement('div');l.className='dash-card-label';l.textContent=cd.l;
      c.appendChild(ci2);c.appendChild(v);c.appendChild(l);cg.appendChild(c);
    })(cardsD[ci]);}
    a.appendChild(cg);
    // Admin/Supervisor: mostrar resumo de avisos enviados
    if(u.perfil==='admin'||u.perfil==='supervisor'){
      sbGet('avisos','select=id,lido&order=created_at.desc').then(function(avisos){
        if(!avisos||!avisos.length)return;
        var pendentes=0;var lidos=0;
        for(var ai=0;ai<avisos.length;ai++){if(avisos[ai].lido)lidos++;else pendentes++;}
        var avSec=document.createElement('div');avSec.className='dash-secao-titulo';avSec.textContent='Avisos';
        // Inserir antes da secção Equipamentos
        var eqSec=a.querySelector('.dash-secao-titulo:last-of-type');
        if(eqSec)a.insertBefore(avSec,eqSec);else a.appendChild(avSec);
        var avCards=document.createElement('div');avCards.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;';
        function mkAvCard(val,lbl,cor){var c=document.createElement('div');c.style.cssText='background:var(--branco);border-radius:var(--radius);padding:12px 10px;box-shadow:var(--sombra);text-align:center;cursor:pointer;';c.onclick=function(){navAvisos();};var cv=document.createElement('div');cv.style.cssText='font-size:26px;font-weight:800;color:'+cor+';line-height:1;';cv.textContent=val;var cl=document.createElement('div');cl.style.cssText='font-size:11px;color:var(--cinza-medio);margin-top:4px;';cl.textContent=lbl;c.appendChild(cv);c.appendChild(cl);return c;}
        avCards.appendChild(mkAvCard(pendentes,'Avisos pendentes',pendentes>0?'var(--amarelo)':'var(--verde)'));
        avCards.appendChild(mkAvCard(lidos,'Avisos lidos','var(--verde)'));
        if(eqSec)a.insertBefore(avCards,eqSec);else a.appendChild(avCards);
      }).catch(function(){});
    }
    // Alertas
    var alertas=[];
    if(urg>0)alertas.push({cl:'urgente',ic:'🚨',tx:urg+' pedido'+(urg>1?'s':'')+' de reparação urgente',sb:'Requerem atenção imediata'});
    if(dds.length>0)alertas.push({cl:'aviso',ic:'⚠️',tx:dds.length+(eTrabalhador?' pedido'+(dds.length>1?'s':'')+' pendente'+(dds.length>1?'s':''):' memorando'+(dds.length>1?'s':'')+' DDS pendente'+(dds.length>1?'s':'')),sb:eTrabalhador?'Aguardam resposta dos serviços':'Aguardam aprovação'});
    if(chk.length===0&&app.equipamentos.length>0)alertas.push({cl:'info',ic:'ℹ️',tx:'Sem checklists registadas hoje',sb:'Verifica os equipamentos'});
    if(eqSemVer.length>0&&filtraEq)alertas.push({cl:'aviso',ic:'📋',tx:'Verificação em atraso: '+eqSemVer.join(', '),sb:'Período máximo de 15 dias entre verificações'});
    if(alertas.length){
      var at=document.createElement('div');at.className='dash-secao-titulo';at.textContent='Alertas';a.appendChild(at);
      for(var ai=0;ai<alertas.length;ai++){(function(al){
        var ai2=document.createElement('div');ai2.className='dash-alerta-item '+al.cl;
        var aic=document.createElement('div');aic.className='dash-alerta-icone';aic.textContent=al.ic;
        var atx=document.createElement('div');
        var at2=document.createElement('div');at2.className='dash-alerta-txt';at2.textContent=al.tx;
        var as=document.createElement('div');as.className='dash-alerta-sub';as.textContent=al.sb;
        atx.appendChild(at2);atx.appendChild(as);ai2.appendChild(aic);ai2.appendChild(atx);a.appendChild(ai2);
      })(alertas[ai]);}
    }
    // Equipamentos por grupo
    if(app.equipamentos.length){
      var et=document.createElement('div');et.className='dash-secao-titulo';et.textContent='Equipamentos';a.appendChild(et);
      var eg=document.createElement('div');eg.className='dash-acesso-rapido';
      for(var gi=0;gi<GRUPOS.length;gi++){(function(grp){
        var eqsG=filtrarEqGrupo(grp);if(!eqsG.length)return;
        var btn=document.createElement('button');btn.className='dash-btn-eq';
        var row=document.createElement('div');row.className='dash-btn-eq-row';
        var bic=document.createElement('div');bic.className='dash-btn-eq-icone';
        var dashGrpEmoji={'pavilhao':'🏟️','piscinas cobertas':'🏊','piscinas descobertas':'🌊','complexo vinha de mouros':'🌳','outros':'🏠'};
        bic.textContent=dashGrpEmoji[grp.nome.toLowerCase()]||'📍';
        var bnm=document.createElement('div');bnm.className='dash-btn-eq-nome';bnm.textContent=grp.nome;
        row.appendChild(bic);row.appendChild(bnm);
        var bcnt=document.createElement('div');bcnt.className='dash-btn-eq-cnt';bcnt.textContent=eqsG.length+(eqsG.length===1?' equipamento':' equipamentos');
        btn.appendChild(row);btn.appendChild(bcnt);btn.onclick=function(){abrirModalGrupo(grp,eqsG);};eg.appendChild(btn);
      })(GRUPOS[gi]);}
      a.appendChild(eg);
    }
  }).catch(function(){load.textContent='Erro ao carregar dashboard.';});
}

function navEq(eqId){app.eqAtivo=eqId;var eq=null;for(var i=0;i<app.equipamentos.length;i++)if(app.equipamentos[i].id===eqId){eq=app.equipamentos[i];break;}if(!eq)return;definirTopo(eq.nome,TIPO_LABELS[eq.tipo]||eq.tipo);marcarMenuAtivo(eqId);renderAreaEq(eq);}
function navDDS(){app.vistaAtual='dds';definirTopo('Memorandos DDS','Gestão de pedidos');marcarMenuAtivo('dds');renderDDS();}
function navPainelChk(){app.vistaAtual='chk-painel';definirTopo('Painel de Checklists','Supervisão');marcarMenuAtivo('chk-painel');renderPainelChk();}
function buildSecDDSArquivo(memos){
  var sec=document.createElement('div');sec.className='dds-seccao';
  var hdr=document.createElement('div');hdr.className='dds-seccao-header';
  var nm=document.createElement('div');nm.className='dds-seccao-nome';nm.textContent='Arquivo';
  var badge=document.createElement('span');badge.className='dds-badge';badge.textContent=memos.length;
  var seta=document.createElement('div');seta.className='modulo-seta';seta.textContent='v';
  hdr.appendChild(nm);hdr.appendChild(badge);hdr.appendChild(seta);
  var corpo=document.createElement('div');corpo.className='dds-seccao-corpo';
  hdr.onclick=function(){var ab=corpo.classList.contains('aberto');if(ab){corpo.classList.remove('aberto');seta.classList.remove('aberto');}else{corpo.classList.add('aberto');seta.classList.add('aberto');}};

      esq.appendChild(num);esq.appendChild(desc);
      if(memo.equipamentos&&memo.equipamentos.nome){var eqN=document.createElement('div');eqN.style.cssText='font-size:11px;color:var(--azul-menu);font-weight:600;margin-top:2px;';eqN.textContent=memo.equipamentos.nome;esq.appendChild(eqN);}
      var arr=document.createElement('div');arr.style.cssText='font-size:16px;color:var(--cinza-medio);flex-shrink:0;margin-left:8px;';arr.textContent='>';

function navRelatorioGeral(){
  definirTopo('Estatísticas','Memorandos DDS');marcarMenuAtivo('relatorio-geral');

function downloadExcelMemo(dados){
  // Gerar XLSX real usando SheetJS (carregado dinamicamente)
  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload=function(){
    var ws_data=[['N.º','Data','Descrição','Brigada','Equipamento','Estado','Reforços','Data Conclusão','Observações']];
    for(var i=0;i<dados.length;i++){
      var d=dados[i];var tag=estadoTag(d);
      ws_data.push([d.numero||'',formatarDataPT(d.data),d.descricao||'',d.brigada||'',d.equipamentos&&d.equipamentos.nome?d.equipamentos.nome:'',tag.txt,d.num_reforcos||0,d.data_conclusao?formatarDataPT(d.data_conclusao):'',d.observacoes||'']);
    }
    var wb=XLSX.utils.book_new();
    var ws=XLSX.utils.aoa_to_sheet(ws_data);
    ws['!cols']=[{wch:14},{wch:12},{wch:40},{wch:20},{wch:30},{wch:14},{wch:10},{wch:14},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws,'Memorandos DDS');
    XLSX.writeFile(wb,'memorandos_dds_'+new Date().toISOString().substring(0,10)+'.xlsx');
  };
  script.onerror=function(){
    // Fallback CSV se SheetJS nao carregar
    var linhas=[['Numero','Data','Descricao','Brigada','Equipamento','Estado','Reforcos','Data Conclusao','Observacoes']];
    for(var i=0;i<dados.length;i++){var d=dados[i];var tag=estadoTag(d);linhas.push([d.numero||'',formatarDataPT(d.data),d.descricao||'',d.brigada||'',d.equipamentos&&d.equipamentos.nome?d.equipamentos.nome:'',tag.txt,d.num_reforcos||0,d.data_conclusao?formatarDataPT(d.data_conclusao):'',d.observacoes||'']);}
    var csv=linhas.map(function(r){return r.map(function(c){return '"'+(''+c).split('"').join('""')+'"';}).join(',');}).join(String.fromCharCode(10));
    var bom='﻿';
    var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a2=document.createElement('a');a2.href=url;a2.download='memorandos_dds_'+new Date().toISOString().substring(0,10)+'.csv';document.body.appendChild(a2);a2.click();document.body.removeChild(a2);URL.revokeObjectURL(url);
  };
  document.head.appendChild(script);
}

    var load=document.createElement('div');load.className='vazio';load.textContent='...';corpo.appendChild(load);

      sbGet('utilizador_equipamentos','equipamento_id=eq.'+eq.id+'&ativo=eq.true&select=utilizadores(id,nome,cor_escala)'),

function copiarSemanaEscala(eq,semI,tipoEsc,onDone){
  sbGet('escalas','equipamento_id=eq.'+eq.id+'&data=gte.'+dataISO(semI)+'&data=lte.'+dataISO(addDias(semI,6))+'&select=*').then(function(turnos){
    if(!turnos||!turnos.length){alert('Sem turnos para copiar.');return;}
    modalEscolherSemanas(eq,semI,tipoEsc,turnos,onDone);
  }).catch(function(){alert('Erro ao carregar turnos.');});
}

function modalEscolherSemanas(eq,semI,tipoEsc,turnos,onDone){
  var ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;';
  var md=document.createElement('div');md.style.cssText='background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 44px;box-shadow:0 -4px 24px rgba(0,0,0,0.18);';
  var tit=document.createElement('div');tit.style.cssText='font-size:16px;font-weight:800;color:var(--azul-menu);margin-bottom:4px;';tit.textContent='Copiar Semana';
  var sub=document.createElement('div');sub.style.cssText='font-size:12px;color:var(--cinza-medio);margin-bottom:16px;';
  sub.textContent='Semana de '+formatarDataPT(dataISO(semI))+' — escolhe para onde copiar:';
  md.appendChild(tit);md.appendChild(sub);
  // Gerar próximas 12 semanas
  var semanasSelec={};
  var semanas=[];
  for(var i=1;i<=12;i++){
    var s=addDias(semI,i*7);semanas.push(s);
  }
  var grid=document.createElement('div');grid.style.cssText='display:flex;flex-direction:column;gap:6px;margin-bottom:16px;';
  for(var si=0;si<semanas.length;si++){(function(s,idx){
    var key=dataISO(s);
    var f=addDias(s,6);
    var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--cinza-claro);cursor:pointer;';
    var chk=document.createElement('div');chk.style.cssText='width:22px;height:22px;border-radius:6px;border:2px solid var(--cinza-claro);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;';
    var lbl=document.createElement('div');
    var ln=document.createElement('div');ln.style.cssText='font-size:13px;font-weight:600;color:var(--cinza-escuro);';
    ln.textContent=s.getDate()+' '+MESES_C[s.getMonth()]+' – '+f.getDate()+' '+MESES_C[f.getMonth()]+' '+f.getFullYear();
    var ls=document.createElement('div');ls.style.cssText='font-size:11px;color:var(--cinza-medio);';ls.textContent='Semana '+(idx+1);
    lbl.appendChild(ln);lbl.appendChild(ls);
    row.appendChild(chk);row.appendChild(lbl);
    row.onclick=function(){
      if(semanasSelec[key]){
        delete semanasSelec[key];
        chk.style.background='#fff';chk.style.borderColor='var(--cinza-claro)';chk.textContent='';
        row.style.borderColor='var(--cinza-claro)';row.style.background='#fff';
      } else {
        semanasSelec[key]=s;
        chk.style.background='var(--azul-menu)';chk.style.borderColor='var(--azul-menu)';chk.style.color='#fff';chk.textContent='✓';
        row.style.borderColor='var(--azul-menu)';row.style.background='#f0f7ff';
      }
      bg.textContent=Object.keys(semanasSelec).length>0?'Copiar para '+Object.keys(semanasSelec).length+' semana'+(Object.keys(semanasSelec).length>1?'s':''):'Copiar';
    };
    grid.appendChild(row);
  })(semanas[si],si);}
  md.appendChild(grid);
  var errD=document.createElement('div');errD.style.cssText='color:var(--vermelho);font-size:13px;margin:8px 0;min-height:16px;';md.appendChild(errD);
  var bts=document.createElement('div');bts.className='row-btns';
  var bc=document.createElement('button');bc.className='btn-sm btn-cinza';bc.textContent='Cancelar';bc.onclick=function(){document.body.removeChild(ov);};
  var bg=document.createElement('button');bg.className='btn-sm btn-azul';bg.textContent='Copiar';
  bg.onclick=function(){
    var keys=Object.keys(semanasSelec);
    if(!keys.length){errD.textContent='Escolhe pelo menos uma semana.';return;}
    bg.textContent='...';bg.disabled=true;bc.disabled=true;
    // Verificar ferias nas semanas destino
    var todasDestISO=[];
    for(var ki=0;ki<keys.length;ki++){var ds=semanasSelec[keys[ki]];for(var dd=0;dd<7;dd++)todasDestISO.push(dataISO(addDias(ds,dd)));}
    var minDest=todasDestISO[0];var maxDest=todasDestISO[todasDestISO.length-1];
    sbGet('ferias','equipamento_id=eq.'+eq.id+'&data_inicio=lte.'+maxDest+'&data_fim=gte.'+minDest+'&select=utilizador_id,data_inicio,data_fim').then(function(feriasExist){
      // Mapa de dias de ferias por utilizador
      var ferMap={};
      for(var fi=0;fi<(feriasExist||[]).length;fi++){
        var fer2=feriasExist[fi];var cur=new Date(fer2.data_inicio+'T12:00:00');var fim=new Date(fer2.data_fim+'T12:00:00');
        while(cur<=fim){var dISO2=dataISO(cur);ferMap[fer2.utilizador_id+'-'+dISO2]=true;cur.setDate(cur.getDate()+1);}
      }
      var promises=[];var skiped=0;
      for(var ki2=0;ki2<keys.length;ki2++){(function(destSemI){
        var destSemF=addDias(destSemI,6);
        var p=fetch(SB_URL+'/rest/v1/escalas?equipamento_id=eq.'+eq.id+'&data=gte.'+dataISO(destSemI)+'&data=lte.'+dataISO(destSemF),{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
        .then(function(){
          var novos=[];
          for(var ti=0;ti<turnos.length;ti++){
            var t=turnos[ti];
            var diffDias=Math.round((new Date(destSemI)-new Date(semI))/(1000*60*60*24));
            var novaData=addDias(new Date(t.data+'T12:00:00'),diffDias);
            var novaISO=dataISO(novaData);
            // Saltar se funcionario esta de ferias nesse dia
            if(ferMap[t.utilizador_id+'-'+novaISO]){skiped++;continue;}
            var obj={equipamento_id:t.equipamento_id,utilizador_id:t.utilizador_id,data:novaISO,hora_inicio:t.hora_inicio,hora_fim:t.hora_fim};
            if(tipoEsc)obj.tipo_escala=tipoEsc;
            novos.push(obj);
          }
          if(!novos.length)return;
          return sbPost('escalas',novos);
        });
        promises.push(p);
      })(semanasSelec[keys[ki2]]);}
      Promise.all(promises).then(function(){
        document.body.removeChild(ov);
        if(skiped>0)alert(skiped+' turno'+(skiped>1?'s':'')+' não copiado'+(skiped>1?'s':'')+' — funcionário de férias nesses dias.');
        if(onDone)onDone();
      }).catch(function(){errD.textContent='Erro ao copiar.';bg.textContent='Copiar';bg.disabled=false;bc.disabled=false;});
    }).catch(function(){errD.textContent='Erro ao verificar férias.';bg.textContent='Copiar';bg.disabled=false;bc.disabled=false;});
  };
  bts.appendChild(bc);bts.appendChild(bg);md.appendChild(bts);
  ov.appendChild(md);document.body.appendChild(ov);ov.onclick=function(e){if(e.target===ov)document.body.removeChild(ov);};
}

function renderChkForm(eq,cnt,histDiv,momento,tipo_chk){
  cnt.innerHTML='';
  // Verificar ultima verificacao para mostrar contador
  var h15=new Date();h15.setDate(h15.getDate()-15);var iso15=h15.toISOString();
  sbGet('checklists_registo','equipamento_id=eq.'+eq.id+'&momento=eq.'+momento+'&data_registo=gte.'+iso15+'&select=data_registo&order=data_registo.desc&limit=1').then(function(recente){
    // Contador de dias
    if(recente&&recente.length){
      var ultData=new Date(recente[0].data_registo);
      var diffDias=Math.floor((new Date()-ultData)/(1000*60*60*24));
      var proxDia=new Date(ultData);proxDia.setDate(proxDia.getDate()+15);
      var diasRestantes=Math.max(0,Math.ceil((proxDia-new Date())/(1000*60*60*24)));
      var contDiv=document.createElement('div');
      contDiv.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f8fafc;border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--cinza-medio);';
      var esq=document.createElement('span');esq.textContent='Ultima verificacao: '+formatarDataPT(recente[0].data_registo.substring(0,10))+' (ha '+diffDias+' dia'+(diffDias!==1?'s':'')+')';
      var dir=document.createElement('span');
      if(diasRestantes>0){dir.style.cssText='font-weight:700;color:'+(diasRestantes<=3?'var(--vermelho)':diasRestantes<=7?'var(--amarelo)':'var(--verde)')+';';dir.textContent='Proxima em '+diasRestantes+'d';}
      else{dir.style.cssText='font-weight:700;color:var(--verde);';dir.textContent='Em dia';}
      contDiv.appendChild(esq);contDiv.appendChild(dir);cnt.appendChild(contDiv);
    }
    var btnIniciar=document.createElement('button');btnIniciar.className='btn-sm btn-azul btn-bloco';btnIniciar.style.cssText='margin-bottom:14px;font-size:15px;padding:14px;';btnIniciar.textContent='Iniciar Verificacao';
    btnIniciar.onclick=function(){
      var load=document.createElement('div');load.className='vazio';load.textContent='...';cnt.appendChild(load);
      sbGet('checklist_itens','equipamento_id=eq.'+eq.id+'&momento=eq.'+momento+'&ativo=eq.true&order=ordem.asc').then(function(itens){
        cnt.removeChild(load);
        if(!itens||!itens.length){var msg=document.createElement('div');msg.className='vazio';msg.textContent='Sem itens configurados. Adiciona em Administracao -> Checklists.';cnt.appendChild(msg);return;}
        modalVerificacaoChk(eq,itens,momento,tipo_chk,function(){renderChkForm(eq,cnt,histDiv,momento,tipo_chk);renderHistoricoChk(eq,histDiv);});
      }).catch(function(){cnt.removeChild(load);});
    };
    cnt.appendChild(btnIniciar);
  }).catch(function(){
    var btnIniciar=document.createElement('button');btnIniciar.className='btn-sm btn-azul btn-bloco';btnIniciar.style.cssText='margin-bottom:14px;font-size:15px;padding:14px;';btnIniciar.textContent='Iniciar Verificacao';
    btnIniciar.onclick=function(){
      sbGet('checklist_itens','equipamento_id=eq.'+eq.id+'&momento=eq.'+momento+'&ativo=eq.true&order=ordem.asc').then(function(itens){
        if(!itens||!itens.length)return;
        modalVerificacaoChk(eq,itens,momento,tipo_chk,function(){renderChkForm(eq,cnt,histDiv,momento,tipo_chk);renderHistoricoChk(eq,histDiv);});
      }).catch(function(){});
    };
    cnt.appendChild(btnIniciar);
  });
  renderHistoricoChk(eq,histDiv);
}

function guardarChk(eq,itens,respostas,obs,momento,tipo_chk,btn,ov,onSave){
  btn.textContent='...';btn.disabled=true;
  var agora=new Date();var agoraISO=agora.toISOString();

function renderSemanaReservas(eq,corpo,semI){
  corpo.innerHTML='';
  var semF=addDias(semI,6);
  var nav=document.createElement('div');nav.className='escala-nav';
  var bA=document.createElement('button');bA.className='btn-nav';bA.textContent='< Ant';bA.onclick=function(){renderSemanaReservas(eq,corpo,addDias(semI,-7));};
  var lbl=document.createElement('div');lbl.className='escala-sem-label';
  lbl.textContent=semI.getDate()+' '+MESES_C[semI.getMonth()]+' - '+semF.getDate()+' '+MESES_C[semF.getMonth()]+' '+semF.getFullYear();
  var bD=document.createElement('button');bD.className='btn-nav';bD.textContent='Pro >';bD.onclick=function(){renderSemanaReservas(eq,corpo,addDias(semI,7));};
  nav.appendChild(bA);nav.appendChild(lbl);nav.appendChild(bD);corpo.appendChild(nav);
  var btnN=document.createElement('button');btnN.className='btn-sm btn-azul btn-bloco';btnN.style.marginBottom='10px';btnN.textContent='+ Nova Reserva';
  btnN.onclick=function(){modalFormReserva(eq,null,function(){renderSemanaReservas(eq,corpo,semI);});};
  corpo.appendChild(btnN);
  var iniISO=dataISO(semI);var fimISO=dataISO(semF);
  var load=document.createElement('div');load.className='vazio';load.textContent='...';corpo.appendChild(load);
  sbGet('reservas','equipamento_id=eq.'+eq.id+'&select=*&order=hora_inicio.asc').then(function(todas){
    corpo.removeChild(load);
    // Expandir recorrentes para esta semana
    var porDia={};
    if(todas&&todas.length){
      for(var i=0;i<todas.length;i++){
        var r=todas[i];
        if(r.recorrente&&r.data_inicio&&r.data_fim&&r.dias_semana){
          var dias=r.dias_semana.split(',');
          var cur=new Date(r.data_inicio+'T12:00:00');
          var fimR=new Date(r.data_fim+'T12:00:00');
          for(var di2=0;di2<7;di2++){
            var diaD2=addDias(semI,di2);var dISO2=dataISO(diaD2);
            var dw=''+diaD2.getDay();
            var diaCheck=new Date(diaD2);diaCheck.setHours(12,0,0,0);
            if(diaCheck>=cur&&diaCheck<=fimR&&dias.indexOf(dw)!==-1){
              if(!porDia[dISO2])porDia[dISO2]=[];
              var copia={};for(var ck in r){if(r.hasOwnProperty(ck))copia[ck]=r[ck];}
              copia._dataExpandida=dISO2;porDia[dISO2].push(copia);
            }
          }
        } else if(r.data&&r.data>=iniISO&&r.data<=fimISO){
          if(!porDia[r.data])porDia[r.data]=[];porDia[r.data].push(r);
        }
      }
    }
    // Calcular slots ocupados nesta semana
    var slotsOcupados={};// chave "HH:MM" -> true
    var temReservas=false;
    for(var di5=0;di5<7;di5++){
      var dISOx=dataISO(addDias(semI,di5));
      var ress5=porDia[dISOx]||[];
      for(var ri5=0;ri5<ress5.length;ri5++){
        var rv5=ress5[ri5];
        if(!rv5.hora_inicio||!rv5.hora_fim)continue;
        temReservas=true;
        var hIni=parseInt(rv5.hora_inicio.split(':')[0]);
        var mIni=parseInt(rv5.hora_inicio.split(':')[1])||0;
        var hFim=parseInt(rv5.hora_fim.split(':')[0]);
        var mFim=parseInt(rv5.hora_fim.split(':')[1])||0;
        // Marcar cada slot de 30min dentro do intervalo
        var slotH=hIni;var slotM=mIni<30?0:30;
        while(slotH<hFim||(slotH===hFim&&slotM<mFim)){
          var slotKey=('0'+slotH).slice(-2)+':'+('0'+slotM).slice(-2);
          slotsOcupados[slotKey]=true;
          slotM+=30;if(slotM>=60){slotH++;slotM=0;}
        }
      }
    }
    if(!temReservas){
      var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem reservas esta semana.';corpo.appendChild(sem);
      var leg2=document.createElement('div');leg2.style.cssText='margin-top:8px;font-size:11px;color:var(--cinza-medio);';leg2.textContent='\u21ba = Recorrente (periodo)';corpo.appendChild(leg2);
      return;
    }
    // Construir lista ordenada de slots a mostrar
    var slotsArr=[];
    for(var sk in slotsOcupados){if(slotsOcupados.hasOwnProperty(sk))slotsArr.push(sk);}
    slotsArr.sort();
    // Adicionar 1 slot antes e 1 depois para contexto

function renderMemoInt(eq,corpo){
  var load=document.createElement('div');load.className='vazio';load.textContent='...';corpo.appendChild(load);
  sbGet('memorandos_reparacao','equipamento_id=eq.'+eq.id+'&estado=neq.concluido&select=*&order=created_at.desc&limit=20').then(function(memos){
    corpo.removeChild(load);
    var btnN=document.createElement('button');btnN.className='btn-sm btn-azul btn-bloco';btnN.style.marginBottom='12px';btnN.textContent='+ Novo Pedido / Memorando';
    var lista=document.createElement('div');
    btnN.onclick=function(){formMemoInt(eq,corpo,lista);};corpo.appendChild(btnN);
    if(!memos||!memos.length){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem pedidos.';lista.appendChild(sem);}
    else{for(var i=0;i<memos.length;i++)lista.appendChild(cardMemoInt(memos[i]));}
    corpo.appendChild(lista);
  }).catch(function(){load.textContent='Erro.';});

function cardMemoInt(m,lista){
  var card=document.createElement('div');card.className='memo-card';
  var top=document.createElement('div');top.className='memo-topo';
  var dat=document.createElement('div');dat.className='memo-data-txt';dat.textContent=m.data||(m.created_at?m.created_at.substring(0,10):'-');
  var urgClass={'baixo':'tag-cinza','medio':'tag-amarelo','urgente':'tag-vermelho'};
  var ec=m.estado==='concluido'?'tag-verde':(urgClass[m.urgencia]||'tag-amarelo');
  var est=document.createElement('span');est.className='tag '+ec;
  est.textContent=m.estado==='concluido'?'Concluído':(m.urgencia||m.estado||'pendente');
  top.appendChild(dat);top.appendChild(est);card.appendChild(top);
  var desc=document.createElement('div');desc.className='memo-desc';desc.textContent=m.descricao||'-';card.appendChild(desc);
  if(m.estado!=='concluido'){
    var dr=m.data?new Date(m.data):new Date(m.created_at);var dias=diasEntre(dr,new Date());
    if(dias>0){var d=document.createElement('div');d.style.cssText='font-size:11px;font-weight:700;color:var(--amarelo);';d.textContent=dias+(dias===1?' dia em aberto':' dias em aberto');card.appendChild(d);}
    var acoes=document.createElement('div');acoes.style.cssText='margin-top:8px;';
    var btnC=document.createElement('button');btnC.className='btn-sm btn-verde';btnC.style.fontSize='12px';btnC.textContent='Concluir';
    btnC.onclick=function(){
      btnC.textContent='...';btnC.disabled=true;
      var hoje2=dataISO(new Date());
      sbPatch('memorandos_reparacao','id=eq.'+m.id,{estado:'concluido',data_conclusao:hoje2}).then(function(){
        if(card.parentElement)card.parentElement.removeChild(card);
        if(lista&&!lista.firstChild){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem pedidos em aberto.';lista.appendChild(sem);}
        if(m.dds_id){sbPatch('memorandos_dds','id=eq.'+m.dds_id,{estado:'concluido',data_conclusao:hoje2}).catch(function(){});}
      }).catch(function(){btnC.textContent='Erro';btnC.disabled=false;});
    };
    acoes.appendChild(btnC);card.appendChild(acoes);
  }
  return card;
}
function formMemoInt(eq,corpo,lista){

  var ft=document.createElement('div');ft.className='form-titulo';ft.textContent='Novo Pedido - '+eq.nome;form.appendChild(ft);

      corpo.removeChild(form);

function gerarRelatorioEquipamentoPDF(eq,mes,ano){

    var nomesMes=MESES_PT[mes];
    var css='body{font-family:Arial,sans-serif;padding:20px;color:#1e3a5f;font-size:12px;}';

    css+='.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:10px;}';
    css+='.campo-l{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;}';

    css+='th{background:#e8f0fb;color:#1a5fa8;padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;}';

        h+='<tr><td>'+dataRv+'</td><td>'+horaRv+'</td><td>'+(rv.nome_responsavel||'-')+'</td><td>'+(rv.espaco||'-')+'</td><td>'+(rv.recorrente?'Sim':'Não')+'</td></tr>';
      }
      h+='</table>';
    }

    // ── 3. ESCALA
    h+='<div class="sec">3. Escala — '+nomesMes+' '+ano+'</div>';
    if(!turnos.length){h+='<div class="vazio">Sem escala registada neste período.</div>';}
    else{

      for(var ti=0;ti<turnos.length;ti++){
        var t=turnos[ti];var uid=t.utilizador_id;var unm=(t.utilizadores&&t.utilizadores.nome)||uid;

function gerarNumeroMemo(){
  var agora=new Date();var ano=agora.getFullYear();var mes=agora.getMonth()+1;var mesStr=mes<10?'0'+mes:''+mes;var prefixo=ano+'/'+mesStr+'/';
  return sbGet('memorandos_dds','numero=like.'+ano+'%2F'+mesStr+'%2F*&select=numero&order=numero.desc&limit=1').then(function(res){
    var seq=1;if(res&&res.length&&res[0].numero){var p=res[0].numero.split('/');if(p.length===3){var ul=parseInt(p[2],10);if(!isNaN(ul))seq=ul+1;}}
    var ss=seq<10?'00'+seq:(seq<100?'0'+seq:''+seq);return prefixo+ss;
  }).catch(function(){return prefixo+'001';});
}

function proximaQuarta(){
  var hoje=new Date();var dow=hoje.getDay();var diasAte=dow<=3?(3-dow):(10-dow);
  if(diasAte===0)diasAte=7;
  var q=new Date(hoje);q.setDate(hoje.getDate()+diasAte);return q;
}

function formatarDataPT(iso){if(!iso)return '-';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

function textoCopiarMemo(memo){
  var linhas=[];
  var nEnvios=(memo.num_reforcos||0)+1;
  if(nEnvios>1)linhas.push('*** REFORCO DE PEDIDO - '+(nEnvios)+'a vez ***');
  linhas.push('MEMORANDO N. '+(memo.numero||'-'));
  linhas.push('Data: '+formatarDataPT(memo.data));
  if(memo.brigada)linhas.push('Brigada: '+memo.brigada);
  if(memo.equipamentos&&memo.equipamentos.nome)linhas.push('Equipamento: '+memo.equipamentos.nome);
  linhas.push('');linhas.push(memo.descricao||'');
  if(memo.observacoes){linhas.push('');linhas.push('Observações: '+memo.observacoes);}
  if(nEnvios>1)linhas.push('');linhas.push('Este pedido foi enviado '+nEnvios+(nEnvios===1?' vez.':' vezes.'));
  return linhas.join('\n');
}

function copiarMemo(memo,btn){
  var txt=textoCopiarMemo(memo);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){btn.textContent='Copiado!';setTimeout(function(){btn.textContent='Copiar para E-mail';},2000);}).catch(function(){fallbackCopiar(txt,btn);});
  } else {fallbackCopiar(txt,btn);}
}

function fallbackCopiar(txt,btn){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');btn.textContent='Copiado!';}catch(e){btn.textContent='Erro';}
  setTimeout(function(){btn.textContent='Copiar para E-mail';},2000);document.body.removeChild(ta);
}

function estadoTag(memo){
  if(memo.estado==='concluido')return{cls:'tag-verde',txt:'Concluído'};
  if(memo.num_reforcos&&memo.num_reforcos>0&&memo.estado!=='concluido')return{cls:'tag-vermelho',txt:'Reforço '+(memo.num_reforcos+1)+'x'};
  if(memo.estado==='reforco_pedido'&&memo.aprovado_dds)return{cls:'tag-azul',txt:'A Enviar'};
  if(memo.estado==='pendente'&&memo.aprovado_dds)return{cls:'tag-verde',txt:'Enviado'};
  return{cls:'tag-amarelo',txt:'Pendente'};
}

function renderDDS(){
  var a=area();a.innerHTML='';
  var btnN=document.createElement('button');btnN.className='btn-sm btn-azul btn-bloco';btnN.style.marginBottom='10px';btnN.textContent='+ Novo Memorando';btnN.onclick=function(){formDDS(a);};a.appendChild(btnN);
  var btnAp=document.createElement('button');btnAp.className='btn-sm btn-cinza btn-bloco';btnAp.style.marginBottom='14px';btnAp.textContent='Apagar todos os memorandos';
  btnAp.onclick=function(){
    if(!confirm('Tens a certeza? Apaga todos os memorandos e a numeracao volta ao inicio.'))return;
    btnAp.textContent='...';btnAp.disabled=true;
    sbGet('memorandos_dds','select=id').then(function(todos){
      if(!todos||!todos.length){renderDDS();return;}
      var ids=[];for(var i=0;i<todos.length;i++)ids.push(todos[i].id);
      return fetch(SB_URL+'/rest/v1/memorandos_dds?id=in.('+ids.join(',')+')',{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}}).then(function(){renderDDS();});
    }).catch(function(){btnAp.textContent='Erro';btnAp.disabled=false;});
  };
  a.appendChild(btnAp);
  var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';a.appendChild(load);
  sbGet('memorandos_dds','select=*,equipamentos(nome)&order=data.desc').then(function(todos){
    a.removeChild(load);
    if(!todos||todos.error){var err=document.createElement('div');err.className='erro-inline';err.textContent='Erro ao carregar.';a.appendChild(err);return;}

    // Secção 1: Recebidos dos Equipamentos (criado_por_dds=false, nao concluido)
    var recebidos=[];for(var i=0;i<todos.length;i++)if(!todos[i].criado_por_dds&&todos[i].estado!=='concluido')recebidos.push(todos[i]);
    a.appendChild(buildSecDDS('recebidos','Recebidos dos Equipamentos',recebidos,null));

    // Secção 2: Criados por Mim (criado_por_dds=true, nao concluido)
    var criados=[];for(var i=0;i<todos.length;i++)if(todos[i].criado_por_dds&&todos[i].estado!=='concluido')criados.push(todos[i]);
    a.appendChild(buildSecDDS('criados','Criados por Mim',criados,null));

    // Secção 3: A Enviar (estado=reforço_pedido + aprovado_dds=true)
    var aEnviar=[];for(var i=0;i<todos.length;i++)if(todos[i].estado==='reforco_pedido'&&todos[i].aprovado_dds)aEnviar.push(todos[i]);
    var avisoQ=null;
    if(aEnviar.length>0){var q=proximaQuarta();var diff=Math.ceil((q-new Date())/86400000);var mm=q.getMonth()+1;avisoQ='Enviar ate quarta-feira '+q.getDate()+'/'+(mm<10?'0'+mm:mm)+' ('+diff+(diff===1?' dia':' dias')+')';}
    a.appendChild(buildSecDDS('aenviar','A Enviar para os Serviços',aEnviar,avisoQ));

    // Secção 4: Enviados/Em Curso (estado=pendente + aprovado_dds=true)
    var emCurso=[];for(var i=0;i<todos.length;i++)if(todos[i].estado==='pendente'&&todos[i].aprovado_dds)emCurso.push(todos[i]);

function cardDDS(memo,secId){
  var card=document.createElement('div');card.className='dds-card';
  if(memo.num_reforcos&&memo.num_reforcos>0&&memo.estado!=='concluido'){card.style.borderLeft='3px solid var(--vermelho)';card.style.background='#fff8f8';}

  var esq=document.createElement('div');

  var dat=document.createElement('div');dat.className='dds-data';dat.textContent=formatarDataPT(memo.data);
  esq.appendChild(num);esq.appendChild(dat);
  var tag=estadoTag(memo);

  top.appendChild(esq);top.appendChild(est);card.appendChild(top);

  if(memo.equipamentos&&memo.equipamentos.nome){var eqTag=document.createElement('div');eqTag.style.cssText='display:inline-block;font-size:11px;font-weight:600;color:var(--azul-menu);background:var(--azul-pale);border-radius:6px;padding:2px 8px;margin-bottom:6px;';eqTag.textContent=memo.equipamentos.nome;card.appendChild(eqTag);}
  var rod=document.createElement('div');rod.className='dds-rodape';

  if(memo.estado!=='concluido'){var dr=memo.data?new Date(memo.data):(memo.created_at?new Date(memo.created_at):new Date());var dias=diasEntre(dr,new Date());if(dias>0){var dd2=document.createElement('div');dd2.className='dds-dias';dd2.textContent=dias+(dias===1?' dia':' dias');rod.appendChild(dd2);}}
  else if(memo.data_conclusao){var dc=document.createElement('div');dc.style.cssText='font-size:11px;color:var(--verde);';dc.textContent='Concluído: '+formatarDataPT(memo.data_conclusao);rod.appendChild(dc);}
  if(memo.num_reforcos&&memo.num_reforcos>0){var nr=document.createElement('div');nr.style.cssText='font-size:11px;font-weight:700;color:var(--vermelho);margin-top:4px;';nr.textContent='Reforço enviado '+(memo.num_reforcos+1)+'x';rod.appendChild(nr);}
  card.appendChild(rod);
  if(memo.observacoes){var obs2=document.createElement('div');obs2.style.cssText='font-size:12px;color:var(--cinza);margin-top:6px;font-style:italic;';obs2.textContent=memo.observacoes;card.appendChild(obs2);}
  // Botoes
  var acoes=document.createElement('div');acoes.style.cssText='display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;';
  if(secId!=='arquivo'){var btnCop=document.createElement('button');btnCop.className='btn-sm btn-cinza';btnCop.style.fontSize='12px';btnCop.textContent='Copiar para E-mail';btnCop.onclick=function(){copiarMemo(memo,btnCop);};acoes.appendChild(btnCop);}
  // Mover para A Enviar (so nos recebidos ainda nao aprovados)
  if(secId==='recebidos'&&!memo.aprovado_dds){
    var btnApr=document.createElement('button');btnApr.className='btn-sm btn-azul';btnApr.style.fontSize='12px';btnApr.textContent='Mover para A Enviar';
    btnApr.onclick=function(){btnApr.textContent='...';btnApr.disabled=true;sbPatch('memorandos_dds','id=eq.'+memo.id,{estado:'reforco_pedido',aprovado_dds:true}).then(function(){renderDDS();}).catch(function(){btnApr.textContent='Erro';btnApr.disabled=false;});};
    acoes.appendChild(btnApr);
  }
  // Marcar como Enviado (na seccao A Enviar)
  if(secId==='aenviar'){
    var btnEnv=document.createElement('button');btnEnv.className='btn-sm btn-azul';btnEnv.style.fontSize='12px';btnEnv.textContent='Marcar como Enviado';
    btnEnv.onclick=function(){btnEnv.textContent='...';btnEnv.disabled=true;sbPatch('memorandos_dds','id=eq.'+memo.id,{estado:'pendente',aprovado_dds:true}).then(function(){renderDDS();}).catch(function(){btnEnv.textContent='Erro';btnEnv.disabled=false;});};
    acoes.appendChild(btnEnv);
  }
  // Reforçar Pedido (em Enviados/Em Curso) - volta para A Enviar com contador incrementado
  if(secId==='emcurso'){
    var btnRef=document.createElement('button');btnRef.className='btn-sm btn-vermelho';btnRef.style.fontSize='12px';btnRef.textContent='Reforçar Pedido';
    btnRef.onclick=function(){
      btnRef.textContent='...';btnRef.disabled=true;
      var novoReforço=(memo.num_reforcos||0)+1;
      sbPatch('memorandos_dds','id=eq.'+memo.id,{estado:'reforco_pedido',aprovado_dds:true,num_reforcos:novoReforço}).then(function(){renderDDS();}).catch(function(){btnRef.textContent='Erro';btnRef.disabled=false;});
    };
    acoes.appendChild(btnRef);
  }
  // Concluir apenas em Criados por Mim e Enviados/Em Curso
  var podeConc=(secId==='emcurso')||(secId==='criados');
  if(podeConc){
    var btnConc=document.createElement('button');btnConc.className='btn-sm btn-verde';btnConc.style.fontSize='12px';btnConc.textContent='Concluir';
    btnConc.onclick=function(){btnConc.textContent='...';btnConc.disabled=true;sbPatch('memorandos_dds','id=eq.'+memo.id,{estado:'concluido',data_conclusao:dataISO(new Date())}).then(function(){renderDDS();}).catch(function(){btnConc.textContent='Erro';btnConc.disabled=false;});};
    acoes.appendChild(btnConc);
  }
  card.appendChild(acoes);return card;
}

function renderPainelChk(){
  var a=area();a.innerHTML='';var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';a.appendChild(load);
  sbGet('checklists_registo','select=*,utilizadores(nome),equipamentos(nome),checklist_itens(descricao)&order=data_registo.desc&limit=200').then(function(regs){
    a.removeChild(load);
    if(!regs||!regs.length){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem checklists registadas.';a.appendChild(sem);return;}
    // Agrupar por numero_registo (ou chave unica se sem numero)
    var grupos=[];var mapa={};
    for(var i=0;i<regs.length;i++){
      var r=regs[i];
      var key=r.numero_registo?(r.equipamento_id+'|'+r.numero_registo):(r.equipamento_id+'|'+r.data_registo+'|'+r.utilizador_id+'|'+r.momento);
      if(!mapa[key]){
        mapa[key]={nr:r.numero_registo||'s/n',eqN:r.equipamentos?r.equipamentos.nome:'-',uN:r.utilizadores?r.utilizadores.nome:'-',mom:r.momento||'-',dat:r.data_registo?r.data_registo.substring(0,10):'-',itens:[],obs:null};
        grupos.push(mapa[key]);
      }
      mapa[key].itens.push(r);
      if(r.observacoes&&!mapa[key].obs)mapa[key].obs=r.observacoes;
    }
    for(var g=0;g<grupos.length;g++){(function(grp){
      var nNao=0;for(var k=0;k<grp.itens.length;k++)if(!grp.itens[k].conforme)nNao++;
      var card=document.createElement('div');card.className='modulo-card';card.style.marginBottom='8px';

      var esq=document.createElement('div');esq.className='modulo-header-esq';

      ic.style.cssText='background:'+(nNao>0?'var(--vermelho)':'var(--verde)')+';color:#fff;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;';
      ic.textContent=nNao>0?nNao+' ✗':'OK';

      var sub=document.createElement('div');sub.style.cssText='font-size:11px;color:var(--cinza-medio);margin-top:2px;';
      sub.textContent=grp.nr+' · '+grp.uN+' · '+formatarDataPT(grp.dat);
      info.appendChild(nm);info.appendChild(sub);esq.appendChild(ic);esq.appendChild(info);
      var seta=document.createElement('div');seta.className='modulo-seta';seta.textContent='v';
      hdr.appendChild(esq);hdr.appendChild(seta);
      var corpo=document.createElement('div');corpo.className='modulo-corpo';
      hdr.onclick=function(){var ab=corpo.classList.contains('aberto');if(ab){corpo.classList.remove('aberto');seta.classList.remove('aberto');}else{corpo.classList.add('aberto');seta.classList.add('aberto');}};
      for(var ii=0;ii<grp.itens.length;ii++){
        var item=grp.itens[ii];
        var linha=document.createElement('div');linha.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--cinza-claro);';
        var ck=document.createElement('div');ck.style.cssText='width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;';
        if(item.conforme){ck.style.background='var(--verde)';ck.style.color='#fff';ck.textContent='✓';}
        else{ck.style.background='var(--vermelho)';ck.style.color='#fff';ck.textContent='✗';}
        var tx=document.createElement('div');tx.style.cssText='font-size:13px;color:var(--cinza-escuro);flex:1;';tx.textContent=(item.checklist_itens&&item.checklist_itens.descricao)||'-';
        linha.appendChild(ck);linha.appendChild(tx);corpo.appendChild(linha);
      }
      if(grp.obs){var obsl=document.createElement('div');obsl.style.cssText='font-size:12px;color:var(--cinza-escuro);margin-top:8px;padding:8px;background:#f8fafc;border-radius:6px;font-style:italic;';obsl.textContent='Anomalia: '+grp.obs;corpo.appendChild(obsl);}

        var btnDel=document.createElement('button');btnDel.className='btn-sm btn-vermelho';btnDel.style.cssText='margin-top:10px;font-size:11px;width:100%;';btnDel.textContent='Apagar este registo';

          .then(function(){renderPainelChk();}).catch(function(){btnDel.textContent='Erro';btnDel.disabled=false;});
        };})(grp,card);
        corpo.appendChild(btnDel);
      }
      card.appendChild(hdr);card.appendChild(corpo);a.appendChild(card);
    })(grupos[g]);}
  }).catch(function(){load.textContent='Erro.';});
}
