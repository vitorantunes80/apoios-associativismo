  function mkFiltro(lbl,opts){var g=document.createElement('div');g.style.flex='1';var l=document.createElement('label');l.className='campo-label';l.textContent=lbl;var s=document.createElement('select');s.className='campo-select';for(var i=0;i<opts.length;i++){var op=document.createElement('option');op.value=opts[i][0];op.textContent=opts[i][1];s.appendChild(op);}g.appendChild(l);g.appendChild(s);fRow.appendChild(g);return s;}
  var eqOpts=[['todos','Todos os Equipamentos']];for(var ei=0;ei<app.equipamentos.length;ei++)eqOpts.push([app.equipamentos[ei].id,app.equipamentos[ei].nome]);
  var selEq=mkFiltro('Equipamento',eqOpts);
  var mesesOpts=[['0','Todos os Meses']];for(var m2=1;m2<=12;m2++)mesesOpts.push([''+m2,MESES_PT[m2-1]]);
  var selMes=mkFiltro('Mes',mesesOpts);selMes.value=''+(agora.getMonth()+1);
  var anos=[['todos','Todos']];for(var y=anoAtual;y>=anoAtual-3;y--)anos.push([''+y,''+y]);
  var selAno=mkFiltro('Ano',anos);selAno.value=''+anoAtual;
  var btnApl=document.createElement('button');btnApl.className='btn-sm btn-azul';btnApl.style.cssText='flex-shrink:0;height:42px;';btnApl.textContent='Filtrar';
  fRow.appendChild(btnApl);fCard.appendChild(fRow);a.appendChild(fCard);
  var conteudo=document.createElement('div');a.appendChild(conteudo);

  function carregarRelRes(){
    conteudo.innerHTML='';
    var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';conteudo.appendChild(load);
    var eqId=selEq.value;var mes=selMes.value;var ano=selAno.value;
    // Sempre filtrar pelos equipamentos do utilizador
    var params='select=*,equipamentos(nome)&order=data.asc,data_inicio.asc';
    if(eqId!=='todos'){
      params=params+'&equipamento_id=eq.'+eqId;
    } else if(app.utilizador.perfil!=='admin'&&app.utilizador.perfil!=='supervisor'&&app.equipamentos.length>0){
      var eqIdsRel=[];for(var eri=0;eri<app.equipamentos.length;eri++)eqIdsRel.push(app.equipamentos[eri].id);
      params=params+'&equipamento_id=in.('+eqIdsRel.join(',')+')';
    }
    sbGet('reservas',params).then(function(todas){
      conteudo.removeChild(load);
      // Filtrar por periodo no cliente
      var reservas=[];
      for(var i=0;i<(todas||[]).length;i++){
        var r=todas[i];
        if(r.recorrente&&r.data_inicio&&r.data_fim){
          // Recorrente: verifica se o periodo cruza com o mes/ano seleccionado
          if(ano!=='todos'){
            var mm2=mes!=='0'?(parseInt(mes)<10?'0'+mes:mes):null;
            var iniPer=ano+'-'+(mm2||'01')+'-01';
            var fimPer=ano+'-'+(mm2||'12')+'-'+(mm2?'31':'31');
            if(r.data_inicio>fimPer||r.data_fim<iniPer)continue;
          }
          reservas.push(r);
        } else if(r.data){
          // Pontual: verifica data exacta
          if(ano!=='todos'){
            if(r.data.substring(0,4)!==ano)continue;
            if(mes!=='0'&&r.data.substring(5,7)!==(parseInt(mes)<10?'0'+mes:mes))continue;
          }
          reservas.push(r);
        }
      }
      if(!reservas.length){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem reservas para o periodo seleccionado.';conteudo.appendChild(sem);return;}
      // Resumo
      var resumoDiv=document.createElement('div');resumoDiv.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;';
      function cardRes(val,lbl,ic){var c=document.createElement('div');c.style.cssText='background:var(--branco);border-radius:var(--radius);padding:12px 10px;box-shadow:var(--sombra);text-align:center;';var ci=document.createElement('div');ci.style.cssText='font-size:18px;margin-bottom:4px;';ci.textContent=ic;var cv=document.createElement('div');cv.style.cssText='font-size:22px;font-weight:800;color:var(--azul-menu);';cv.textContent=val;var cl=document.createElement('div');cl.style.cssText='font-size:10px;color:var(--cinza-medio);margin-top:3px;';cl.textContent=lbl;c.appendChild(ci);c.appendChild(cv);c.appendChild(cl);return c;}
      var pontuais=0;var recorrentes=0;for(var i=0;i<reservas.length;i++){if(reservas[i].recorrente)recorrentes++;else pontuais++;}
      resumoDiv.appendChild(cardRes(reservas.length,'Total','📋'));
      resumoDiv.appendChild(cardRes(pontuais,'Pontuais','📅'));
      resumoDiv.appendChild(cardRes(recorrentes,'Recorrentes','↺'));
      conteudo.appendChild(resumoDiv);
      var tit=document.createElement('div');tit.className='dash-secao-titulo';tit.textContent='Listagem';conteudo.appendChild(tit);
      var btnXls=document.createElement('button');btnXls.className='btn-sm btn-verde';btnXls.style.cssText='margin-bottom:10px;width:100%;';btnXls.textContent='Exportar Excel';
      btnXls.onclick=function(){exportarReservasXLS(reservas);};conteudo.appendChild(btnXls);
      var espacoLabel={'campo_principal':'Campo Principal','sala_ginastica':'Sala de Ginástica','pavilhao_completo':'Pavilhão Completo','merendas_1':'Parque de Merendas 1','merendas_2':'Parque de Merendas 2','merendas_3':'Parque de Merendas 3','espaco_completo':'Espaço Completo','picadeiro_coberto':'Picadeiro Coberto','picadeiro_exterior':'Picadeiro Exterior','outro':'Outro'};
      for(var j=0;j<reservas.length;j++){
        var r=reservas[j];
        var card2=document.createElement('div');card2.style.cssText='background:var(--branco);border-radius:var(--radius-sm);box-shadow:var(--sombra);padding:10px 12px;border-left:3px solid '+(r.recorrente?'var(--azul)':'var(--verde)')+';margin-bottom:6px;';
        var rTop=document.createElement('div');rTop.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;';
        var rNm=document.createElement('div');rNm.style.cssText='font-size:14px;font-weight:700;color:var(--azul-menu);flex:1;';
        rNm.textContent=(r.nome_responsavel||r.entidade||'-')+(r.recorrente?' ↺':'');
        var rDt=document.createElement('div');rDt.style.cssText='font-size:12px;color:var(--cinza-medio);white-space:nowrap;flex-shrink:0;';
        rDt.textContent=r.recorrente?(formatarDataPT(r.data_inicio)+' a '+formatarDataPT(r.data_fim)):formatarDataPT(r.data);
        rTop.appendChild(rNm);rTop.appendChild(rDt);card2.appendChild(rTop);
        var partes=[];
        if(r.equipamentos&&r.equipamentos.nome)partes.push(r.equipamentos.nome);
        if(r.hora_inicio)partes.push(r.hora_inicio.substring(0,5)+(r.hora_fim?' - '+r.hora_fim.substring(0,5):''));
        if(r.espaco)partes.push(espacoLabel[r.espaco]||r.espaco);
        if(r.num_pessoas)partes.push(r.num_pessoas+' pessoas');
        var rSub=document.createElement('div');rSub.style.cssText='font-size:12px;color:var(--cinza-medio);';rSub.textContent=partes.join(' · ');card2.appendChild(rSub);
        if(r.entidade&&r.entidade!==r.nome_responsavel){var rEnt=document.createElement('div');rEnt.style.cssText='font-size:11px;color:var(--cinza-medio);margin-top:2px;';rEnt.textContent=r.entidade+(r.tipo_entidade?' ('+r.tipo_entidade+')':'');card2.appendChild(rEnt);}
        conteudo.appendChild(card2);
      }
    }).catch(function(){load.textContent='Erro ao carregar dados.';});
  }
  btnApl.onclick=carregarRelRes;carregarRelRes();
}

function exportarReservasXLS(reservas){
  var rows=[['Data','Equipamento','Entidade','Tipo Entidade','Responsavel','Telemovel','Espaco','Pessoas','Hora Inicio','Hora Fim','Recorrente','Data Fim','FDoc','Observacoes']];
  for(var i=0;i<reservas.length;i++){var r=reservas[i];rows.push([r.data||'',r.equipamentos&&r.equipamentos.nome?r.equipamentos.nome:'',r.entidade||'',r.tipo_entidade||'',r.nome_responsável||'',r.telemóvel||'',r.espaco||'',r.num_pessoas||'',r.hora_inicio||'',r.hora_fim||'',r.recorrente?'Sim':'Nao',r.data_fim||'',r.fdoc||'',r.observacoes||'']);}
  var script=document.createElement('script');script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload=function(){var wb=XLSX.utils.book_new();var ws=XLSX.utils.aoa_to_sheet(rows);XLSX.utils.book_append_sheet(wb,'Reservas',ws);XLSX.writeFile(wb,'reservas.xlsx');};
  script.onerror=function(){alert('Nao foi possivel carregar o exportador Excel.');};
  document.head.appendChild(script);
}

function carregarListaAvisos(lista){
  lista.innerHTML='';
  var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';lista.appendChild(load);
  // Carregar avisos e utilizadores separadamente para evitar joins complexos
  Promise.all([
    sbGet('avisos','select=*&order=created_at.desc'),
    sbGet('utilizadores','ativo=eq.true&select=id,nome')
  ]).then(function(rs){
    lista.innerHTML='';
    var avisos=rs[0]||[];var utils=rs[1]||[];
    var utilMap={};for(var i=0;i<utils.length;i++)utilMap[utils[i].id]=utils[i].nome;
    if(!avisos.length){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem avisos enviados.';lista.appendChild(sem);return;}
    for(var j=0;j<avisos.length;j++)lista.appendChild(cardAviso(avisos[j],utilMap,lista));
  }).catch(function(){lista.innerHTML='';var e=document.createElement('div');e.className='erro-inline';e.textContent='Erro ao carregar. Verifica se a tabela "avisos" foi criada.';lista.appendChild(e);});

function carregarListaFerias(eq,lista,podeEditar,corpo,meuId){
  lista.innerHTML='';var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';lista.appendChild(load);
  Promise.all([
    sbGet('ferias','equipamento_id=eq.'+eq.id+'&select=*&order=data_inicio.desc'),
    sbGet('utilizadores','ativo=eq.true&select=id,nome')
  ]).then(function(rs){
    lista.innerHTML='';
    var feriasAll=rs[0]||[];var utils=rs[1]||[];
    var utilMap={};for(var ui=0;ui<utils.length;ui++)utilMap[utils[ui].id]=utils[ui].nome;
    // Nao-editores so veem as suas proprias ferias
    var podeVerTodos=(app.utilizador.perfil==='admin'||app.utilizador.perfil==='supervisor'||app.utilizador.perfil==='responsavel');
    var feriasVisiveis=podeVerTodos?feriasAll:feriasAll.filter(function(f){return f.utilizador_id===app.utilizador.id;});
    // Agrupar por funcionario
    var porUtil={};var utilOrder=[];
    for(var i=0;i<feriasVisiveis.length;i++){
      var f=feriasVisiveis[i];var uid=f.utilizador_id;
      if(!porUtil[uid]){porUtil[uid]=[];utilOrder.push(uid);}
      porUtil[uid].push(f);
    }
    if(!utilOrder.length){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem ferias registadas.';lista.appendChild(sem);return;}
    for(var ui2=0;ui2<utilOrder.length;ui2++){(function(uid){
      var fList=porUtil[uid];var nomeUtil=utilMap[uid]||uid;
      var secTit=document.createElement('div');secTit.style.cssText='font-size:12px;font-weight:700;color:var(--azul-menu);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;margin-top:10px;';
      secTit.textContent='🏖️ '+nomeUtil;lista.appendChild(secTit);
      for(var fi=0;fi<fList.length;fi++){(function(fer){
        var card=document.createElement('div');card.style.cssText='background:#fff;border-radius:var(--radius-sm);box-shadow:var(--sombra);padding:10px 12px;margin-bottom:6px;border-left:3px solid #f59e0b;display:flex;align-items:center;gap:10px;';
        var ic=document.createElement('div');ic.style.cssText='font-size:20px;flex-shrink:0;';ic.textContent='🏖️';
        var info=document.createElement('div');info.style.flex='1';

function exportarFeriasPDF(eq){

    var totalDiasPDF=0;
    for(var i=0;i<ferias.length;i++){totalDiasPDF+=Math.round((new Date(ferias[i].data_fim)-new Date(ferias[i].data_inicio))/(1000*60*60*24))+1;}
    var h='<html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;padding:20px;color:#1e3a5f;}h1{color:#1a5fa8;font-size:18px;margin-bottom:4px;}h2{font-size:13px;color:#64748b;margin:0 0 20px;}table{width:100%;border-collapse:collapse;font-size:12px;}th{background:#1a5fa8;color:#fff;padding:8px 10px;text-align:left;}td{padding:7px 10px;border-bottom:1px solid #e2e8f0;}.total{font-weight:700;background:#f0f7ff;}.rodape{margin-top:30px;font-size:10px;color:#94a3b8;text-align:center;}</style></head><body>';
    h+='<h1>Registo de Ferias \u2014 '+eq.nome+'</h1><h2>Gerado em '+new Date().toLocaleDateString('pt-PT')+' por '+(app.utilizador.nome||'')+'</h2>';
    h+='<table><tr><th>Funcionario</th><th>Data Inicio</th><th>Data Fim</th><th>Dias</th><th>Observacoes</th></tr>';
    for(var i=0;i<ferias.length;i++){

      var dias=Math.round((new Date(f.data_fim)-new Date(f.data_inicio))/(1000*60*60*24))+1;
      h+='<tr><td>'+nome+'</td><td>'+formatarDataPT(f.data_inicio)+'</td><td>'+formatarDataPT(f.data_fim)+'</td><td>'+dias+'d</td><td>'+(f.observacoes||'')+'</td></tr>';
    }

    h+='</body></html>';
    var blob=new Blob([h],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.target='_blank';a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
  }).catch(function(e){alert('Erro ao gerar PDF: '+(e&&e.message?e.message:''));});
}

function exportarFeriasXLS(eq){
  Promise.all([
    sbGet('ferias','equipamento_id=eq.'+eq.id+'&select=*&order=data_inicio.asc'),
    sbGet('utilizadores','ativo=eq.true&select=id,nome')
  ]).then(function(rs){
    var feriasAll=rs[0]||[];var utils=rs[1]||[];
    if(!feriasAll.length){alert('Sem ferias para exportar.');return;}
    var um={};for(var i=0;i<utils.length;i++)um[utils[i].id]=utils[i].nome;
    // Filtrar por utilizador se nao for editor
    var podeVerTodos=(app.utilizador.perfil==='admin'||app.utilizador.perfil==='supervisor'||app.utilizador.perfil==='responsavel');
    var ferias=podeVerTodos?feriasAll:feriasAll.filter(function(f){return f.utilizador_id===app.utilizador.id;});
    if(!ferias.length){alert('Sem ferias para exportar.');return;}
    var rows=[['Funcionario','Data Inicio','Data Fim','Dias','Observacoes']];
    for(var i=0;i<ferias.length;i++){
      var f=ferias[i];var nome=um[f.utilizador_id]||'-';
      var dias=Math.round((new Date(f.data_fim)-new Date(f.data_inicio))/(1000*60*60*24))+1;
      rows.push([nome,f.data_inicio,f.data_fim,dias,f.observacoes||'']);
    }
    function gerarXLS(){
      try{
        var wb=XLSX.utils.book_new();var ws=XLSX.utils.aoa_to_sheet(rows);XLSX.utils.book_append_sheet(wb,'Ferias',ws);
        XLSX.writeFile(wb,'ferias_'+eq.nome.replace(/ /g,'_')+'.xlsx');
      }catch(err){
        // Fallback CSV para Safari
        var csv=rows.map(function(r){return r.map(function(c){return'"'+(c||'').toString().replace(/"/g,'""')+'"';}).join(',');}).join('\n');
        var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
        var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='ferias_'+eq.nome.replace(/ /g,'_')+'.csv';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
      }
    }
    if(typeof XLSX!=='undefined'){gerarXLS();return;}
    var script=document.createElement('script');script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload=gerarXLS;script.onerror=function(){alert('Erro ao carregar exportador.');};
    document.head.appendChild(script);
  }).catch(function(e){alert('Erro ao exportar: '+(e&&e.message?e.message:JSON.stringify(e)));});
}

          card.appendChild(ic);card.appendChild(info);conteudo.appendChild(card);

      })(eqOrder[ei2]);}
    })(ferias);
    }).catch(function(){load.textContent='Erro ao carregar.';});
  }
  btnApl.onclick=carregarRelFerias;carregarRelFerias();
}

function modalEscolherPeriodoEscala(onConfirm){
  var ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;';
  var md=document.createElement('div');md.style.cssText='background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 44px;box-shadow:0 -4px 24px rgba(0,0,0,0.18);';
  var tit=document.createElement('div');tit.style.cssText='font-size:16px;font-weight:800;color:var(--azul-menu);margin-bottom:16px;';tit.textContent='Escolher Período';md.appendChild(tit);
  // Tipo: semana ou mês
  var tipoDiv=document.createElement('div');tipoDiv.style.cssText='display:flex;gap:8px;margin-bottom:14px;';
  var btnSem=document.createElement('button');btnSem.className='btn-sm btn-azul';btnSem.style.flex='1';btnSem.textContent='Semana';
  var btnMes=document.createElement('button');btnMes.className='btn-sm btn-cinza';btnMes.style.flex='1';btnMes.textContent='Mês';
  var tipo='semana';
  btnSem.onclick=function(){tipo='semana';btnSem.className='btn-sm btn-azul';btnMes.className='btn-sm btn-cinza';semDiv.style.display='block';mesDiv.style.display='none';};
  btnMes.onclick=function(){tipo='mes';btnMes.className='btn-sm btn-azul';btnSem.className='btn-sm btn-cinza';semDiv.style.display='none';mesDiv.style.display='block';};
  tipoDiv.appendChild(btnSem);tipoDiv.appendChild(btnMes);md.appendChild(tipoDiv);
  // Selector semana
  var semDiv=document.createElement('div');semDiv.style.display='block';
  var lSem=document.createElement('label');lSem.className='campo-label';lSem.textContent='Semana de início';
  var inpSem=document.createElement('input');inpSem.type='date';inpSem.className='campo-input-sm';inpSem.value=dataISO(inicioSemana(new Date()));
  semDiv.appendChild(lSem);semDiv.appendChild(inpSem);md.appendChild(semDiv);
  // Selector mês
  var mesDiv=document.createElement('div');mesDiv.style.display='none';
  var lMes=document.createElement('label');lMes.className='campo-label';lMes.textContent='Mês';
  var selMes=document.createElement('select');selMes.className='campo-select';
  var agora=new Date();
  for(var m=0;m<12;m++){var op=document.createElement('option');op.value=''+m;op.textContent=MESES_PT[m];if(m===agora.getMonth())op.selected=true;selMes.appendChild(op);}
  var lAno=document.createElement('label');lAno.className='campo-label';lAno.style.marginTop='8px';lAno.textContent='Ano';
  var selAno=document.createElement('select');selAno.className='campo-select';
  var anoAtual=agora.getFullYear();
  for(var a=anoAtual;a>=anoAtual-2;a--){var opA=document.createElement('option');opA.value=''+a;opA.textContent=''+a;selAno.appendChild(opA);}
  mesDiv.appendChild(lMes);mesDiv.appendChild(selMes);mesDiv.appendChild(lAno);mesDiv.appendChild(selAno);md.appendChild(mesDiv);
  var bts=document.createElement('div');bts.className='row-btns';
  var bc=document.createElement('button');bc.className='btn-sm btn-cinza';bc.textContent='Cancelar';bc.onclick=function(){document.body.removeChild(ov);};
  var bg=document.createElement('button');bg.className='btn-sm btn-azul';bg.textContent='Gerar PDF';
  bg.onclick=function(){
    document.body.removeChild(ov);
    if(tipo==='semana'){
      var semI=new Date(inpSem.value+'T12:00:00');var semF=addDias(semI,6);
      onConfirm(semI,semF,'semana');
    } else {
      var mes=parseInt(selMes.value);var ano=parseInt(selAno.value);
      var mesI=new Date(ano,mes,1);
      onConfirm(mesI,null,'mes');
    }
  };
  bts.appendChild(bc);bts.appendChild(bg);md.appendChild(bts);
  ov.appendChild(md);document.body.appendChild(ov);ov.onclick=function(e){if(e.target===ov)document.body.removeChild(ov);};
}

function gerarEscalaPessoalMesPDF(eq,u,mesI){

    var turnosMapa={};for(var i=0;i<(turnos||[]).length;i++){var d=turnos[i].data;if(!turnosMapa[d])turnosMapa[d]=[];turnosMapa[d].push(turnos[i]);}
    var nomesDias=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
    var h='<html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;padding:20px;color:#1e3a5f;}h1{color:#1a5fa8;font-size:18px;margin-bottom:4px;}h2{font-size:13px;color:#64748b;margin:0 0 16px;}table{width:100%;border-collapse:collapse;font-size:11px;}th{background:#1a5fa8;color:#fff;padding:6px;text-align:center;}td{padding:5px 6px;border:1px solid #e2e8f0;vertical-align:top;}.dia{font-size:10px;color:#94a3b8;}.turno{font-size:11px;font-weight:700;color:#1a5fa8;}.folga{font-size:10px;color:#cbd5e1;}.rodape{margin-top:20px;font-size:10px;color:#94a3b8;text-align:center;}</style></head><body>';
    h+='<h1>Escala — '+(u.nome||u.codigo_visivel)+'</h1>';

      h+='</td>';col++;if(col%7===0&&dia<diasNoMes)h+='</tr><tr>';
    }
    while(col%7!==0){h+='<td></td>';col++;}
    h+='</tr></table>';
    h+='<div class="rodape">Município de Cabeceiras de Basto &bull; GestEq V2.1</div>';
    h+='<br><button onclick="window.print()" style="padding:10px 20px;background:#1a5fa8;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Imprimir</button>';

    var blob=new Blob([h],{type:'text/html;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.target='_blank';a.click();setTimeout(function(){URL.revokeObjectURL(url);},3000);
  }).catch(function(){alert('Erro ao gerar.');});
}

function gerarEscalaSemanalMesPDF(eq,mesI){
  var ano=mesI.getFullYear();var mes=mesI.getMonth();
  var diasNoMes=new Date(ano,mes+1,0).getDate();
  var dataInicio=new Date(ano,mes,1);var dataFim=new Date(ano,mes,diasNoMes);
  Promise.all([
    sbGet('escalas','equipamento_id=eq.'+eq.id+'&data=gte.'+dataISO(dataInicio)+'&data=lte.'+dataISO(dataFim)+'&select=*,utilizadores(nome)&order=data.asc,hora_inicio.asc'),
    sbGet('utilizador_equipamentos','equipamento_id=eq.'+eq.id+'&ativo=eq.true&select=utilizadores(id,nome)')
  ]).then(function(rs){
    var turnos=rs[0]||[];var rels=rs[1]||[];

    var turnosMapa={};for(var i=0;i<turnos.length;i++){var key=turnos[i].utilizador_id+'-'+turnos[i].data;if(!turnosMapa[key])turnosMapa[key]=[];turnosMapa[key].push(turnos[i]);}
    // Gerar semanas do mes
    var semanas=[];var cur=inicioSemana(dataInicio);
    while(cur<=dataFim){semanas.push(new Date(cur));cur=addDias(cur,7);}
    var nomesDias=['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];
    var h='<html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;padding:15px;color:#1e3a5f;font-size:11px;}h1{color:#1a5fa8;font-size:16px;margin-bottom:4px;}h2{font-size:12px;color:#64748b;margin:0 0 12px;}h3{font-size:12px;color:#1a5fa8;margin:16px 0 6px;border-bottom:1px solid #e2e8f0;padding-bottom:4px;}table{width:100%;border-collapse:collapse;margin-bottom:8px;}th{background:#1a5fa8;color:#fff;padding:5px 4px;text-align:center;font-size:10px;}td{padding:4px;border:1px solid #e2e8f0;text-align:center;font-size:10px;vertical-align:top;}.fn{text-align:left;font-weight:600;padding-left:6px;font-size:10px;}.turno{color:#1a5fa8;font-weight:700;font-size:9px;}.folga{color:#cbd5e1;font-size:9px;}.rodape{margin-top:20px;font-size:9px;color:#94a3b8;text-align:center;}</style></head><body>';
    h+='<h1>Escala — '+eq.nome+'</h1><h2>'+MESES_PT[mes]+' '+ano+'</h2>';
    for(var si=0;si<semanas.length;si++){
      var semI2=semanas[si];var semF2=addDias(semI2,6);
      h+='<h3>'+semI2.getDate()+' a '+semF2.getDate()+' de '+MESES_PT[semF2.getMonth()]+'</h3>';
      h+='<table><tr><th class="fn">Funcionário</th>';
      for(var di=0;di<7;di++){var diaD=addDias(semI2,di);h+='<th>'+nomesDias[di]+'<br>'+diaD.getDate()+'</th>';}
      h+='</tr>';
      for(var ui=0;ui<utils.length;ui++){
        h+='<tr><td class="fn">'+utils[ui].nome.split(' ')[0]+'</td>';
        for(var di2=0;di2<7;di2++){
          var iso=dataISO(addDias(semI2,di2));var key2=utils[ui].id+'-'+iso;
          var tDia=turnosMapa[key2]||[];
          if(!tDia.length){h+='<td class="folga">—</td>';}
          else{h+='<td>';for(var ti=0;ti<tDia.length;ti++)h+='<div class="turno">'+(tDia[ti].hora_inicio?tDia[ti].hora_inicio.substring(0,5):'')+(tDia[ti].hora_fim?'-'+tDia[ti].hora_fim.substring(0,5):'')+'</div>';h+='</td>';}
        }
        h+='</tr>';
      }
      h+='</table>';
    }
    h+='<div class="rodape">Município de Cabeceiras de Basto &bull; GestEq V2.1</div>';
    h+='<br><button onclick="window.print()" style="padding:10px 20px;background:#1a5fa8;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Imprimir</button>';
    h+='</body></html>';
    var blob=new Blob([h],{type:'text/html;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.target='_blank';a.click();setTimeout(function(){URL.revokeObjectURL(url);},3000);
  }).catch(function(){alert('Erro ao gerar.');});
}

function fazerLogin(){var inp=document.getElementById('inp-codigo');var erro=document.getElementById('login-erro');var codigo=inp.value.trim().toUpperCase();erro.textContent='';if(!codigo){erro.textContent='Introduz o teu código de acesso.';return;}sbGet('utilizadores','codigo_visivel=eq.'+encodeURIComponent(codigo)+'&select=*').then(function(d){if(!d||!d.length){erro.textContent='Código inválido.';return;}var u=d[0];if(!u.ativo){erro.textContent='Conta inactiva.';return;}guardarSessao(u.id);app.utilizador=u;carregarEquipamentos();}).catch(function(){erro.textContent='Erro de ligação.';});}
