<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GestEq — Cabeceiras de Basto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
:root{
  --azul:#1B3A6B;--azul-m:#2D5FA6;--azul-c:#4A90D9;
  --verde:#2A7A4B;--verde-c:#E8F5EE;
  --verm:#C0392B;--verm-c:#FDECEA;
  --amar:#D4820A;--amar-c:#FEF3E2;
  --cinza-e:#1A1A2E;--cinza:#4A4A6A;--cinza-m:#8A8AAA;--cinza-c:#F0F2F8;
  --borda:#DDE2F0;--s1:0 2px 12px rgba(27,58,107,.10);--s2:0 8px 32px rgba(27,58,107,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#F0F2F8;color:#1A1A2E;min-height:100vh;font-size:14px}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--azul),var(--azul-c));padding:20px}
.lc{background:#fff;border-radius:16px;padding:44px 36px;width:100%;max-width:380px;box-shadow:var(--s2);text-align:center}
.lc h1{font-size:22px;color:var(--azul);margin-bottom:6px}
.lc p{color:var(--cinza-m);font-size:13px;margin-bottom:28px}
.lc input{width:100%;padding:13px;border:2px solid var(--borda);border-radius:10px;font-size:16px;letter-spacing:3px;text-align:center;font-weight:700;color:var(--azul);outline:none;transition:.2s;text-transform:uppercase;font-family:inherit}
.lc input:focus{border-color:var(--azul-c)}
.lbtn{width:100%;margin-top:14px;padding:13px;background:var(--azul);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;transition:.15s}
.lbtn:hover{background:var(--azul-m)}
.lerr{color:var(--verm);font-size:12px;margin-top:10px;min-height:18px}

/* LAYOUT */
.sb{width:256px;background:var(--azul);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;transition:transform .3s}
.sb-hdr{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-ico{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sb-logo h2{color:#fff;font-size:14px;line-height:1.2}
.sb-logo span{color:rgba(255,255,255,.45);font-size:10px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-un{color:#fff;font-size:13px;font-weight:600}
.rb{display:inline-block;margin-top:3px;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase}
.r-admin{background:#F39C12;color:#000}.r-supervisor{background:#8E44AD;color:#fff}
.r-responsavel{background:#27AE60;color:#fff}.r-responsavel_dds{background:#E74C3C;color:#fff}.r-funcionario{background:#2980B9;color:#fff}
.sb-nav{flex:1;padding:8px 0}
.nsec{padding:7px 16px 3px;color:rgba(255,255,255,.35);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;color:rgba(255,255,255,.72);cursor:pointer;transition:.13s;font-size:13px;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.on{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--azul-c);font-weight:600}
.ni-ico{width:17px;text-align:center;font-size:14px;flex-shrink:0}
.ni-sub{padding-left:26px}
.ni-sub .ni{font-size:12px;padding:6px 16px 6px 6px}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sb-out{width:100%;padding:8px;background:rgba(255,255,255,.08);border:none;border-radius:7px;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.sb-out:hover{background:rgba(255,255,255,.15);color:#fff}

.main{margin-left:256px;padding:22px;min-height:100vh}
.hbtn{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--azul);border:none;border-radius:8px;padding:7px 10px;cursor:pointer;color:#fff;font-size:17px}

/* BUTTONS */
.btn{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:.13s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--azul);color:#fff}.bp:hover{background:var(--azul-m)}
.bs{background:var(--cinza-c);color:var(--cinza);border:1px solid var(--borda)}.bs:hover{background:var(--borda)}
.bok{background:var(--verde);color:#fff}.bok:hover{opacity:.9}
.bdel{background:var(--verm);color:#fff}.bdel:hover{opacity:.9}
.bw{background:var(--amar);color:#fff}.bw:hover{opacity:.9}
.bol{background:transparent;border:1.5px solid var(--azul);color:var(--azul)}.bol:hover{background:var(--azul);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}

/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:var(--s1);border:1px solid var(--borda);transition:.2s}
.card:hover{box-shadow:var(--s2);transform:translateY(-2px)}
.bdg{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600}
.bdg-ok{background:var(--verde-c);color:var(--verde)}.bdg-s{background:var(--amar-c);color:var(--amar)}

/* TABLES */
.tw{background:#fff;border-radius:14px;box-shadow:var(--s1);border:1px solid var(--borda);overflow:hidden}
.tsc{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:460px}
thead th{background:var(--cinza-c);color:var(--cinza);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:10px 13px;text-align:left;border-bottom:1px solid var(--borda)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--borda);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8f9fd}

/* FORMS */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--cinza);margin-bottom:4px;text-transform:uppercase;letter-spacing:.2px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1.5px solid var(--borda);border-radius:8px;font-size:13px;font-family:inherit;color:var(--cinza-e);outline:none;transition:.15s;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--azul-c)}
.fg textarea{resize:vertical;min-height:68px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(2px)}
.mod{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:520px;box-shadow:var(--s2);max-height:90vh;overflow-y:auto}
.mod-lg{max-width:680px}
.mod h2{font-size:16px;color:var(--azul);margin-bottom:16px}
.mf{display:flex;gap:9px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--borda)}

/* STATUS */
.st{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase}
.st-p{background:var(--amar-c);color:var(--amar)}.st-r{background:#EDE7F6;color:#6A1B9A}
.st-c{background:var(--verde-c);color:var(--verde)}.st-ok{background:var(--verde-c);color:var(--verde)}
.st-can{background:var(--verm-c);color:var(--verm)}.st-env{background:#E8F4FD;color:var(--azul-m)}

/* URGENCIA */
.urg{padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700}
.urg-u{background:var(--verm-c);color:var(--verm)}.urg-m{background:var(--amar-c);color:var(--amar)}.urg-b{background:var(--verde-c);color:var(--verde)}

/* SECTION BOX */
.sbox{background:#fff;border-radius:14px;border:1px solid var(--borda);box-shadow:var(--s1);margin-bottom:14px;overflow:hidden}
.sbox-hdr{padding:12px 16px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;background:var(--cinza-c)}
.sbox-hdr h3{font-size:14px;color:var(--azul)}
.sbox-body{padding:16px}

/* STATS */
.strow{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:11px;margin-bottom:18px}
.stcard{background:#fff;border-radius:10px;padding:13px;border:1px solid var(--borda);box-shadow:var(--s1)}
.stn{font-size:24px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--azul)}
.stl{font-size:11px;color:var(--cinza-m);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--borda);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--cinza-m);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.13s;white-space:nowrap}
.tab:hover{color:var(--azul);background:var(--cinza-c)}
.tab.on{color:var(--azul);border-bottom-color:var(--azul);background:#EEF3FF}

/* ALERTS */
.al{padding:9px 13px;border-radius:8px;margin-bottom:12px;font-size:12px;display:flex;gap:7px;line-height:1.5}
.al-i{background:#EEF3FF;color:var(--azul);border:1px solid #C7D7F5}
.al-ok{background:var(--verde-c);color:var(--verde);border:1px solid #A8D5B8}
.al-w{background:var(--amar-c);color:var(--amar);border:1px solid #F5D6A0}
.al-e{background:var(--verm-c);color:var(--verm);border:1px solid #F5AEAC}

/* CHECKLIST */
.ci{display:flex;align-items:center;gap:9px;padding:10px;border:1px solid var(--borda);border-radius:8px;margin-bottom:6px;background:#fff;transition:.13s}
.ci.ok{border-color:var(--verde);background:var(--verde-c)}.ci.nok{border-color:var(--verm);background:var(--verm-c)}
.cbtns{display:flex;gap:4px}
.cbtn{width:27px;height:27px;border-radius:50%;border:2px solid var(--borda);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;background:#fff;transition:.13s}
.cbtn.sim{border-color:var(--verde);color:var(--verde)}.cbtn.sim.on{background:var(--verde);color:#fff}
.cbtn.nao{border-color:var(--verm);color:var(--verm)}.cbtn.nao.on{background:var(--verm);color:#fff}

/* DIAS CONTADOR */
.dc{display:inline-block;background:var(--azul);color:#fff;border-radius:12px;padding:1px 8px;font-size:11px;font-weight:700}
.dc.u{background:var(--verm)}.dc.a{background:var(--amar)}

/* CODIGO */
.codbox{background:var(--cinza-c);border:2px dashed var(--borda);border-radius:10px;padding:12px;text-align:center;margin:9px 0}
.codbox .cod{font-size:24px;font-weight:700;letter-spacing:5px;color:var(--azul);font-family:'Space Grotesk',sans-serif}
.codbox p{font-size:11px;color:var(--cinza-m);margin-top:3px}

/* TOAST */
.tct{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--cinza-e);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;box-shadow:var(--s2);display:flex;align-items:center;gap:7px;max-width:290px;animation:tsi .3s ease}
.toast.tok{background:var(--verde)}.toast.terr{background:var(--verm)}
@keyframes tsi{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}

/* LOADING */
.ld{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--cinza-m);gap:9px}
.sp{width:17px;height:17px;border:2px solid var(--borda);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:36px 16px;color:var(--cinza-m)}
.es-i{font-size:34px;margin-bottom:9px}

/* CALENDAR */
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--cinza-m);padding:4px 0;text-transform:uppercase}
.cd{background:#fff;border:1px solid var(--borda);border-radius:7px;padding:5px 3px;min-height:66px;cursor:pointer;transition:.13s}
.cd:hover{border-color:var(--azul-c);background:#EEF3FF}
.cd.oth{opacity:.3}.cd.tod{border-color:var(--azul);background:#EEF3FF}
.cdn{font-size:11px;font-weight:700;color:var(--cinza);margin-bottom:2px}
.cd.tod .cdn{color:var(--azul)}
.cev{border-radius:3px;padding:1px 3px;font-size:9px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff}
.cev.campo{background:var(--azul)}.cev.sala_ginastica{background:var(--verde)}.cev.geral{background:var(--amar)}

/* WATER PARAMS */
.pr{display:flex;align-items:center;gap:9px;padding:10px;border:1px solid var(--borda);border-radius:8px;margin-bottom:6px;background:#fff}
.pi{width:85px;padding:6px 8px;border:1.5px solid var(--borda);border-radius:6px;font-size:14px;font-weight:700;text-align:center;font-family:inherit}
.pst{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.pok{background:var(--verde-c);color:var(--verde)}.pnok{background:var(--verm-c);color:var(--verm)}

/* DDS SECTIONS */
.dsec{background:#fff;border-radius:14px;border:1px solid var(--borda);box-shadow:var(--s1);margin-bottom:10px;overflow:hidden}
.dsh{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:.13s}
.dsh:hover{background:var(--cinza-c)}
.dsh h3{font-size:13px;color:var(--azul);display:flex;align-items:center;gap:9px}
.dsc{background:var(--azul);color:#fff;border-radius:12px;padding:1px 9px;font-size:11px;font-weight:700}
.dsc.u{background:var(--verm)}.dsc.z{background:var(--cinza-m)}
.dschev{font-size:11px;color:var(--cinza-m);transition:transform .2s}
.dsh.op .dschev{transform:rotate(180deg)}
.dsb{border-top:1px solid var(--borda);display:none}
.dsb.op{display:block}
.dmi{padding:13px 16px;border-bottom:1px solid var(--borda);border-left:4px solid var(--borda)}
.dmi:last-child{border-bottom:none}
.dmi.uu{border-left-color:var(--verm)}.dmi.um{border-left-color:var(--amar)}.dmi.ub{border-left-color:var(--verde)}
.dmt{font-weight:700;font-size:13px;margin-bottom:3px}
.dmm{font-size:11px;color:var(--cinza-m);display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.dma{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.dav{background:var(--amar-c);border:1px solid var(--amar);border-radius:7px;padding:9px 13px;margin-bottom:10px;font-size:12px;color:var(--amar);display:flex;align-items:center;gap:7px;font-weight:600}
.dem{padding:22px;text-align:center;color:var(--cinza-m);font-size:13px}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ph h1{font-size:19px;color:var(--azul)}
.ph p{color:var(--cinza-m);font-size:12px;margin-top:2px}

/* ESCALA */
.esc-dia{border-bottom:1px solid var(--borda)}
.esc-dia:last-child{border-bottom:none}
.esc-hdr{padding:9px 15px;display:flex;align-items:center;justify-content:space-between}
.esc-turno{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--borda);border-radius:8px;padding:7px 11px;margin:0 15px 7px;border-left:4px solid var(--azul-c)}

@media(max-width:768px){
  .hbtn{display:flex}
  .sb{transform:translateX(-100%)}
  .sb.op{transform:translateX(0)}
  .main{margin-left:0;padding:14px;padding-top:52px}
  .fr{grid-template-columns:1fr}
  .cgrid{grid-template-columns:1fr}
}
@media print{.sb,.hbtn,.no-print{display:none!important}.main{margin-left:0;padding:0}}
</style>
</head>
<body>
<div id="hbwrap"></div>
<div class="tct" id="toasts"></div>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F0F2F8"><div style="font-size:14px;color:#8A8AAA">A carregar...</div></div></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var r = document.getElementById('root');
  if(r) r.innerHTML = '<div style="padding:20px;color:red;font-family:monospace;font-size:12px;background:#fff;min-height:100vh"><strong>Erro JS:</strong><br>' + msg + '<br>Linha: ' + line + '</div>';
  return false;
};
const SU='https://jpojyhvocspksumljslx.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impwb2p5aHZvY3Nwa3N1bWxqc2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE3NDUsImV4cCI6MjA5NzQ0Nzc0NX0.qwAyl_zBx31Z6a3KbaHns8gWceRrjQPcdN3RDBTkGkA';
const SH={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};

async function sbGet(t,p){
  var r=await fetch(SU+'/rest/v1/'+t+'?'+p,{headers:SH});
  if(!r.ok){var x=await r.text();throw new Error(x)}
  return r.json();
}
async function sbPost(t,d){
  var r=await fetch(SU+'/rest/v1/'+t,{method:'POST',headers:Object.assign({},SH,{'Prefer':'return=representation'}),body:JSON.stringify(d)});
  if(!r.ok){var x=await r.text();throw new Error(x)}
  return r.json();
}
async function sbPatch(t,f,d){
  var r=await fetch(SU+'/rest/v1/'+t+'?'+f,{method:'PATCH',headers:Object.assign({},SH,{'Prefer':'return=representation'}),body:JSON.stringify(d)});
  if(!r.ok){var x=await r.text();throw new Error(x)}
  return r.json();
}
async function sbDel(t,f){
  var r=await fetch(SU+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:SH});
  if(!r.ok){var x=await r.text();throw new Error(x)}
}

var S={user:null,page:'dash',eq:null,eqs:[],ueqIds:[],tab:'esc',calM:new Date().getMonth(),calY:new Date().getFullYear(),escW:new Date(),sbo:false};
var Tico={pavilhao:'🏟️',piscina_coberta:'🏊',piscina_descoberta:'🌊',complexo:'🌿',casa_juventude:'🏠'};
var TLBL={pavilhao:'Pavilhão',piscina_coberta:'Piscina Coberta',piscina_descoberta:'Piscina Descoberta',complexo:'Complexo',casa_juventude:'Casa da Juventude'};
var PLBL={admin:'Admin',supervisor:'Supervisor',responsavel:'Responsável',responsavel_dds:'Resp. DDS',funcionario:'Funcionário'};
var PCLS={admin:'r-admin',supervisor:'r-supervisor',responsavel:'r-responsavel',responsavel_dds:'r-responsavel_dds',funcionario:'r-funcionario'};
var ULBL={urgente:'🔴 Urgente',medio:'🟡 Médio',baixo:'🟢 Baixo'};
var UCLS={urgente:'urg-u',medio:'urg-m',baixo:'urg-b'};

function isAdmin(){return S.user&&S.user.perfil==='admin'}
function isSA(){return S.user&&(S.user.perfil==='admin'||S.user.perfil==='supervisor')}
function isRDDS(){return S.user&&(S.user.perfil==='admin'||S.user.perfil==='supervisor'||S.user.perfil==='responsavel_dds')}
function canR(){return S.user&&(S.user.perfil==='admin'||S.user.perfil==='supervisor'||S.user.perfil==='responsavel')}
function canE(){return S.user&&(S.user.perfil==='admin'||S.user.perfil==='supervisor'||S.user.perfil==='responsavel')}

function fmt(d){if(!d)return'—';return new Date(d).toLocaleDateString('pt-PT')}
function dias(d){if(!d)return 0;return Math.floor((Date.now()-new Date(d))/86400000)}
function dcls(d){var n=dias(d);return n>30?'u':n>14?'a':''}
function gerarCod(){var L='ABCDEFGHJKLMNPQRSTUVWXYZ',N='0123456789',c='';for(var i=0;i<2;i++)c+=L[Math.floor(Math.random()*L.length)];c+='-';for(var i=0;i<4;i++)c+=N[Math.floor(Math.random()*N.length)];return c}

function toast(msg,type){
  var t=document.createElement('div');
  t.className='toast'+(type?' t'+type:'');
  t.innerHTML=(type==='ok'?'✅':type==='err'?'❌':'ℹ️')+' '+msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(function(){t.remove()},3200);
}
function closeModal(){var m=document.getElementById('modal-r');if(m)m.remove()}

// AUTH
async function checkSession(){
  var sv=localStorage.getItem('gs');if(!sv)return false;
  try{
    var o=JSON.parse(sv);if(!o.uid||Date.now()>o.exp){localStorage.removeItem('gs');return false}
    var u=await sbGet('utilizadores','id=eq.'+o.uid+'&ativo=eq.true&select=*');
    if(!Array.isArray(u)||!u.length){localStorage.removeItem('gs');return false}
    S.user=u[0];return true;
  }catch(e){localStorage.removeItem('gs');return false}
}
function logout(){localStorage.removeItem('gs');S.user=null;S.eq=null;S.page='dash';render()}

async function loadEqs(){
  try{
    var all=await sbGet('equipamentos','ativo=eq.true&order=nome.asc');
    var aa=Array.isArray(all)?all:[];
    if(isSA()){S.eqs=aa;S.ueqIds=aa.map(function(e){return e.id});return}
    var ue=await sbGet('utilizador_equipamentos','utilizador_id=eq.'+S.user.id+'&ativo=eq.true');
    var ua=Array.isArray(ue)?ue:[];
    S.ueqIds=ua.map(function(x){return x.equipamento_id});
    S.eqs=aa.filter(function(e){return S.ueqIds.indexOf(e.id)>=0});
  }catch(e){S.eqs=[];S.ueqIds=[]}
}

function attachLogin(){
  var inp=document.getElementById('li'),btn=document.getElementById('lb'),err=document.getElementById('le');
  if(!inp||!btn)return;
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click()});

    btn.textContent='A verificar...';btn.disabled=true;err.textContent='';
    try{

    var rs=await sbGet('reservas','equipamento_id=eq.'+eqId+'&data=eq.'+data+'&order=hora_inicio.asc');

    if(!a.length){h+='<div class="es"><div class="es-i">📅</div><p>Sem reservas.</p></div>'}
    else{
      h+='<div class="tw tsc"><table><thead><tr><th>Hora</th><th>Entidade</th><th>Espaço</th><th>Pessoas</th><th></th></tr></thead><tbody>';

        h+='<tr><td>'+r.hora_inicio.slice(0,5)+'–'+r.hora_fim.slice(0,5)+'</td><td><strong>'+r.nome_entidade+'</strong></td>';

async function loadDDS(){
  var el=document.getElementById('dds-r');if(!el)return;
  el.innerHTML='<div class="ld"><div class="sp"></div></div>';
  try{
    var us=await sbGet('utilizadores','select=id,nome'),ua=Array.isArray(us)?us:[];
    var ae=await sbGet('equipamentos','select=id,nome&ativo=eq.true'),ea=Array.isArray(ae)?ae:[];
    var rReceb=await sbGet('memorandos_reparacao','aprovado_dds=eq.false&estado=neq.devolvido&estado=neq.concluido&order=urgencia.asc,criado_em.desc');
    var mMeus=await sbGet('memorandos_dds','origem=eq.dds&estado=neq.enviado&estado=neq.concluido&estado=neq.a_enviar&order=urgencia.asc,criado_em.desc');
    var rAEnv=await sbGet('memorandos_reparacao','estado=eq.a_enviar&order=urgencia.asc,criado_em.desc');
    var mAEnv=await sbGet('memorandos_dds','estado=eq.a_enviar&order=urgencia.asc,criado_em.desc');
    var rEnv=await sbGet('memorandos_reparacao','estado=eq.enviado&order=urgencia.asc,criado_em.desc');
    var mEnv=await sbGet('memorandos_dds','estado=eq.enviado&order=urgencia.asc,criado_em.desc');
    var rR=Array.isArray(rReceb)?rReceb:[],mM=Array.isArray(mMeus)?mMeus:[];
    var rAE=Array.isArray(rAEnv)?rAEnv:[],mAE=Array.isArray(mAEnv)?mAEnv:[];
    var rE=Array.isArray(rEnv)?rEnv:[],mE=Array.isArray(mEnv)?mEnv:[];
    var urgR=rR.filter(function(r){return r.urgencia==='urgente'}).length;
    var hoje=new Date(),isQ=hoje.getDay()===3,dQ=(3-hoje.getDay()+7)%7||7;
    var pQ=new Date(hoje);pQ.setDate(hoje.getDate()+dQ);

    function mkItem(m,tipo,btns){
      var u=ua.filter(function(x){return x.id===(m.funcionario_id||m.criado_por)})[0];
      var eq=m.equipamento_id?ea.filter(function(x){return x.id===m.equipamento_id})[0]:null;
      var d=dias(m.data_pedido),cls=dcls(m.data_pedido),urg=m.urgencia||'baixo';
      var h='<div class="dmi '+(urg==='urgente'?'uu':urg==='medio'?'um':'ub')+'">';
      h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:9px;flex-wrap:wrap">';
      h+='<div style="flex:1"><div class="dmt">#'+m.numero+' — '+m.descricao+'</div>';
      h+='<div class="dmm">';
      if(eq)h+='<span>📍 <strong>'+eq.nome+'</strong></span>';
      h+='<span>👤 '+(u?u.nome:'—')+'</span><span>📅 '+fmt(m.data_pedido)+'</span><span class="dc '+cls+'">'+d+'d</span>';
      if(m.brigada)h+='<span>🔨 '+m.brigada+'</span>';
      h+='</div>';
      if(m.devolvido_motivo)h+='<div style="font-size:12px;color:var(--verm);background:var(--verm-c);padding:5px 8px;border-radius:6px;margin-bottom:5px">↩️ '+m.devolvido_motivo+'</div>';
      if(m.observacoes)h+='<div style="font-size:12px;color:var(--cinza)">'+m.observacoes+'</div>';
      h+='</div><span class="urg '+(UCLS[urg]||'urg-b')+'" style="flex-shrink:0">'+(ULBL[urg]||urg)+'</span></div>';
      h+='<div class="dma">'+btns+'</div></div>';
      return h;
    }

    function mkSec(id,icon,title,count,isU,open,content,extra){
      var cls=count===0?'z':isU?'u':'';
      var h='<div class="dsec">';
      h+='<div class="dsh'+(open?' op':'')+'" onclick="tgDDS(this)">';
      h+='<h3>'+icon+' '+title+' <span class="dsc '+cls+'">'+count+'</span></h3>';
      h+='<span class="dschev">'+(open?'▲':'▼')+'</span></div>';
      h+='<div class="dsb'+(open?' op':'')+'">';
      if(extra)h+=extra;
      h+=content;
      h+='</div></div>';
      return h;
    }

    var h='';

    // SEC 1 — Recebidos equipamentos
    var s1='';
    if(!rR.length)s1='<div class="dem">✅ Sem pedidos pendentes dos equipamentos.</div>';
    else rR.forEach(function(m){s1+=mkItem(m,'rep','<button class="btn btn-xs bok" onclick="ddsMove(\'rep\',\''+m.id+'\',\'a_enviar\')">📤 Para A Enviar</button><button class="btn btn-xs bw" onclick="ddsDev(\'rep\',\''+m.id+'\')">↩️ Devolver</button><button class="btn btn-xs bol" onclick="ddsEditRep(\''+m.id+'\')">✏️</button>')});
    h+=mkSec('s1','📥','Recebidos dos Equipamentos',rR.length,urgR>0,rR.length>0,s1,'');

    // SEC 2 — Criados por mim
    var s2='';
    if(!mM.length)s2='<div class="dem">Sem memorandos criados por si.</div>';
    else mM.forEach(function(m){s2+=mkItem(m,'dds','<button class="btn btn-xs bok" onclick="ddsMove(\'dds\',\''+m.id+'\',\'a_enviar\')">📤 Para A Enviar</button><button class="btn btn-xs bol" onclick="ddsEditMemo(\''+m.id+'\')">✏️ Editar</button>')});
    h+=mkSec('s2','✏️','Criados por Mim',mM.length,false,false,s2,'');

    // SEC 3 — A enviar
    var tot3=rAE.length+mAE.length;
    var av='<div class="dav">'+(isQ?'⚠️ Hoje é quarta-feira — dia de envio! Use "Relatório Semanal".':'📅 Próximo envio: Quarta '+pQ.toLocaleDateString('pt-PT')+' ('+dQ+'d)')+'</div>';
    var s3='';
    if(!tot3)s3='<div class="dem">Sem itens prontos para envio.</div>';
    else{
      rAE.forEach(function(m){s3+=mkItem(m,'rep','<button class="btn btn-xs bp" onclick="ddsMove(\'rep\',\''+m.id+'\',\'enviado\')">✅ Marcar Enviado</button><button class="btn btn-xs bol" onclick="ddsEditRep(\''+m.id+'\')">✏️</button>')});
      mAE.forEach(function(m){s3+=mkItem(m,'dds','<button class="btn btn-xs bp" onclick="ddsMove(\'dds\',\''+m.id+'\',\'enviado\')">✅ Marcar Enviado</button><button class="btn btn-xs bol" onclick="ddsEditMemo(\''+m.id+'\')">✏️</button>')});
      s3+='<div style="padding:11px 15px;border-top:1px solid var(--borda)"><button class="btn bok btn-sm" id="brs2">📄 Gerar Relatório Semanal</button></div>';
    }
    h+=mkSec('s3','📤','A Enviar para os Serviços',tot3,false,tot3>0,s3,av);

    // SEC 4 — Enviados
    var tot4=rE.length+mE.length;
    var s4='';
    if(!tot4)s4='<div class="dem">Sem pedidos em curso.</div>';
    else{
      s4='<div style="padding:7px 15px;font-size:12px;color:var(--cinza-m);background:var(--cinza-c);border-bottom:1px solid var(--borda)">Aguardam marcação como Concluído — pelo Responsável do Equipamento ou pelo Responsável DDS.</div>';
      rE.forEach(function(m){s4+=mkItem(m,'rep','<button class="btn btn-xs bok" onclick="ddsConcluir(\'rep\',\''+m.id+'\')">✅ Concluído → Arquivo</button><button class="btn btn-xs bol" onclick="ddsEditRep(\''+m.id+'\')">✏️</button>')});
      mE.forEach(function(m){s4+=mkItem(m,'dds','<button class="btn btn-xs bok" onclick="ddsConcluir(\'dds\',\''+m.id+'\')">✅ Concluído → Arquivo</button><button class="btn btn-xs bol" onclick="ddsEditMemo(\''+m.id+'\')">✏️</button>')});
    }
    h+=mkSec('s4','🔄','Enviados / Em Curso',tot4,false,false,s4,'');

    el.innerHTML=h;
    var b=document.getElementById('brs2');if(b)b.addEventListener('click',function(){relSemanal()});
  }catch(e){el.innerHTML='<div class="al al-e">Erro ao carregar: '+e.message+'</div>'}
}

async function relSemanal(){
  try{
    var hoje=new Date(),seg=new Date(hoje);seg.setDate(hoje.getDate()-hoje.getDay()+1);
    var iS=seg.toISOString().slice(0,10);
    var memos=await sbGet('memorandos_dds','aprovado_dds=eq.true&data_pedido=gte.'+iS+'&order=urgencia.asc');
    var reps=await sbGet('memorandos_reparacao','aprovado_dds=eq.true&data_pedido=gte.'+iS+'&order=urgencia.asc');
    var ae=await sbGet('equipamentos','select=id,nome'),ea=Array.isArray(ae)?ae:[];
    var us=await sbGet('utilizadores','select=id,nome'),ua=Array.isArray(us)?us:[];
    var mA=Array.isArray(memos)?memos:[],rA=Array.isArray(reps)?reps:[];
    var qua=new Date(seg);qua.setDate(seg.getDate()+2);
    var total=mA.length+rA.length;
    var txt='MEMORANDO SEMANAL — DDS\n';
    txt+='Período: '+seg.toLocaleDateString('pt-PT')+' a '+hoje.toLocaleDateString('pt-PT')+'\n';
    txt+='Data de envio: '+qua.toLocaleDateString('pt-PT')+'\n';
    txt+='──────────────────────────────────\n\n';
    if(rA.length){
      txt+='PEDIDOS DE REPARAÇÃO ('+rA.length+')\n────────────────────────\n';
      rA.forEach(function(m,i){var eq=ea.filter(function(x){return x.id===m.equipamento_id})[0];var u=ua.filter(function(x){return x.id===m.funcionario_id||x.id===m.criado_por})[0];txt+=(i+1)+'. ['+(m.urgencia||'baixo').toUpperCase()+'] '+m.descricao+'\n   '+( eq?eq.nome:'—')+' | '+(u?u.nome:'—')+' | '+new Date(m.data_pedido).toLocaleDateString('pt-PT')+'\n'+(m.observacoes?'   Obs: '+m.observacoes+'\n':'')+'\n'});
    }
    if(mA.length){
      txt+='\nMEMORANDOS DDS ('+mA.length+')\n────────────────────────\n';
      mA.forEach(function(m,i){var u=ua.filter(function(x){return x.id===m.criado_por})[0];txt+=(i+1)+'. ['+(m.urgencia||'baixo').toUpperCase()+'] '+m.descricao+'\n   '+(u?u.nome:'—')+' | '+new Date(m.data_pedido).toLocaleDateString('pt-PT')+(m.brigada?' | Brigada: '+m.brigada:'')+'\n'+(m.observacoes?'   Obs: '+m.observacoes+'\n':'')+'\n'});
    }
    if(!total)txt+='Sem itens aprovados esta semana.\n';
    txt+='\n──────────────────────────────────\nDivisão de Desporto e Saúde — Cabeceiras de Basto';
    showModal('<div class="mod mod-lg"><h2>📄 Relatório Semanal</h2><div class="al al-i">Total: <strong>'+total+'</strong> · Envio sugerido: <strong>Quarta, '+qua.toLocaleDateString('pt-PT')+'</strong></div><div id="rtxt" style="background:var(--cinza-c);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;line-height:1.7;max-height:300px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--borda)">'+txt+'</div><div class="al al-w" style="margin-top:10px">📧 Copie e envie por email.</div><div class="mf"><button class="btn bs" onclick="closeModal()">Fechar</button><button class="btn bp" onclick="navigator.clipboard.writeText(document.getElementById(\'rtxt\').textContent).then(function(){toast(\'Copiado!\',\'ok\')})">📋 Copiar</button></div></div>');
  }catch(e){toast('Erro: '+e.message,'err')}
}

// USERS
async function loadUsers(){
  var el=document.getElementById('ul');if(!el)return;
  try{
    var us=await sbGet('utilizadores','order=nome.asc');var a=Array.isArray(us)?us:[];
    var ae=await sbGet('equipamentos','select=id,nome&ativo=eq.true'),ea=Array.isArray(ae)?ae:[];
    var ue=await sbGet('utilizador_equipamentos','ativo=eq.true'),uea=Array.isArray(ue)?ue:[];
    var h='';
    a.forEach(function(u){
      var ueqs=uea.filter(function(x){return x.utilizador_id===u.id}).map(function(x){var e=ea.filter(function(y){return y.id===x.equipamento_id})[0];return e?e.nome:null}).filter(Boolean);
      h+='<div class="card" style="margin-bottom:9px"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap"><div>';
      h+='<div style="font-weight:700;font-size:14px">'+u.nome+'</div>';
      h+='<div style="margin-top:4px"><span class="rb '+(PCLS[u.perfil]||'r-funcionario')+'">'+(PLBL[u.perfil]||u.perfil)+'</span> <span class="st '+(u.ativo?'st-ok':'st-can')+'">'+(u.ativo?'Ativo':'Inativo')+'</span></div>';
      h+='<div style="margin-top:7px"><code style="background:var(--cinza-c);padding:2px 8px;border-radius:4px;font-size:13px;letter-spacing:2px">'+u.codigo_visivel+'</code></div>';
      if(ueqs.length)h+='<div style="font-size:11px;color:var(--cinza-m);margin-top:5px">📍 '+ueqs.join(', ')+'</div>';
      else h+='<div style="font-size:11px;color:var(--amar);margin-top:5px">⚠️ Sem equipamentos atribuídos</div>';
      h+='</div><div style="display:flex;flex-direction:column;gap:5px">';
      h+='<button class="btn btn-xs bol" onclick="mEditUser(\''+u.id+'\')">✏️ Editar</button>';
      h+='<button class="btn btn-xs bw" onclick="mNovoCod(\''+u.id+'\')">🔄 Código</button>';
      h+='<button class="btn btn-xs bol" onclick="mAcessos(\''+u.id+'\',\''+u.nome.replace(/'/g,"\\'")+'\')" >🏛️ Acessos</button>';
      h+='<button class="btn btn-xs '+(u.ativo?'bdel':'bok')+'" onclick="tgUser(\''+u.id+'\','+(!u.ativo)+')">'+(u.ativo?'🚫':'✅')+'</button>';
      if(u.id!==S.user.id)h+='<button class="btn btn-xs bdel" onclick="dUser(\''+u.id+'\')">🗑️</button>';
      h+='</div></div></div>';
    });
    el.innerHTML=h||'<div class="es"><div class="es-i">👥</div><p>Sem utilizadores.</p></div>';
  }catch(e){el.innerHTML='<div class="al al-e">Erro: '+e.message+'</div>'}
}
function mNovoUser(){var c=gerarCod();showModal('<div class="mod"><h2>👤 Novo Utilizador</h2><div class="fg"><label>Nome Completo</label><input type="text" id="nun"/></div><div class="fg"><label>Perfil</label><select id="nup"><option value="funcionario">Funcionário</option><option value="responsavel">Responsável</option><option value="responsavel_dds">Responsável DDS</option><option value="supervisor">Supervisor</option><option value="admin">Admin</option></select></div><div class="codbox"><div class="cod" id="ncd">'+c+'</div><p>Código gerado — copie e envie ao utilizador</p></div><input type="hidden" id="ncc" value="'+c+'"/><button class="btn btn-sm bs" onclick="rCod()">🔄 Novo código</button><div class="mf"><button class="btn bs" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="gNovoUser()">💾 Criar</button></div></div>')}
function rCod(){var c=gerarCod();var d=document.getElementById('ncd');var h=document.getElementById('ncc');if(d)d.textContent=c;if(h)h.value=c}
async function gNovoUser(){var n=document.getElementById('nun')&&document.getElementById('nun').value.trim(),p=document.getElementById('nup')&&document.getElementById('nup').value,c=document.getElementById('ncc')&&document.getElementById('ncc').value;if(!n){toast('Nome obrigatório.','err');return}try{await sbPost('utilizadores',{nome:n,codigo_hash:'n/a',codigo_visivel:c,perfil:p,ativo:true});closeModal();toast('Utilizador criado! Código: '+c,'ok');loadUsers()}catch(e){toast('Erro: '+e.message,'err')}}
async function mEditUser(id){try{var a=await sbGet('utilizadores','id=eq.'+id);var u=Array.isArray(a)&&a[0];if(!u)return;showModal('<div class="mod"><h2>✏️ Editar Utilizador</h2><div class="fg"><label>Nome</label><input type="text" id="eun" value="'+u.nome+'"/></div><div class="fg"><label>Perfil</label><select id="eup"><option value="funcionario"'+(u.perfil==='funcionario'?' selected':'')+'>Funcionário</option><option value="responsavel"'+(u.perfil==='responsavel'?' selected':'')+'>Responsável</option><option value="responsavel_dds"'+(u.perfil==='responsavel_dds'?' selected':'')+'>Responsável DDS</option><option value="supervisor"'+(u.perfil==='supervisor'?' selected':'')+'>Supervisor</option><option value="admin"'+(u.perfil==='admin'?' selected':'')+'>Admin</option></select></div><div class="codbox"><div class="cod">'+u.codigo_visivel+'</div><p>Código atual</p></div><div class="mf"><button class="btn bs" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="sEditUser(\''+id+'\')">💾 Guardar</button></div></div>')}catch(e){toast('Erro','err')}}
async function sEditUser(id){try{await sbPatch('utilizadores','id=eq.'+id,{nome:document.getElementById('eun')&&document.getElementById('eun').value,perfil:document.getElementById('eup')&&document.getElementById('eup').value});closeModal();toast('Atualizado!','ok');loadUsers()}catch(e){toast('Erro: '+e.message,'err')}}
async function mNovoCod(id){if(!confirm('Gerar novo código? O anterior deixa de funcionar.'))return;var c=gerarCod();try{await sbPatch('utilizadores','id=eq.'+id,{codigo_visivel:c,codigo_hash:'n/a'});toast('Novo código: '+c,'ok');showModal('<div class="mod"><h2>🔄 Novo Código</h2><div class="codbox"><div class="cod">'+c+'</div><p>Envie este código ao utilizador. O anterior já não funciona.</p></div><div class="mf"><button class="btn bp" onclick="closeModal();loadUsers()">OK</button></div></div>')}catch(e){toast('Erro: '+e.message,'err')}}
async function mAcessos(uid,nome){
  try{
    var ae=await sbGet('equipamentos','select=id,nome,tipo&ativo=eq.true&order=nome.asc'),ea=Array.isArray(ae)?ae:[];
    var ue=await sbGet('utilizador_equipamentos','utilizador_id=eq.'+uid+'&ativo=eq.true'),uea=Array.isArray(ue)?ue:[];
    var sel=new Set(uea.map(function(x){return x.equipamento_id}));
    var rows='';
    ea.forEach(function(e){var ch=sel.has(e.id);rows+='<label style="display:flex;align-items:center;gap:9px;padding:9px;border:1px solid var(--borda);border-radius:8px;cursor:pointer;'+(ch?'background:var(--verde-c);border-color:var(--verde)':'')+'"><input type="checkbox" value="'+e.id+'" '+(ch?'checked':'')+' style="width:15px;height:15px"/><span>'+(TICO[e.tipo]||'🏛️')+' '+e.nome+'</span></label>'});
    showModal('<div class="mod mod-lg"><h2>🏛️ Acessos — '+nome+'</h2><div class="al al-i">Selecione os equipamentos a que este utilizador tem acesso.</div><div style="display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto">'+rows+'</div><div class="mf"><button class="btn bs" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="sAcessos(\''+uid+'\')">💾 Guardar</button></div></div>');
  }catch(e){toast('Erro: '+e.message,'err')}
}
async function sAcessos(uid){
  try{
    var checks=document.querySelectorAll('#modal-r input[type=checkbox]');
    var sel=Array.from(checks).filter(function(c){return c.checked}).map(function(c){return c.value});
    try{await sbPatch('utilizador_equipamentos','utilizador_id=eq.'+uid,{ativo:false})}catch(e){}
    for(var i=0;i<sel.length;i++){try{await sbPost('utilizador_equipamentos',{utilizador_id:uid,equipamento_id:sel[i],ativo:true})}catch(e){try{await sbPatch('utilizador_equipamentos','utilizador_id=eq.'+uid+'&equipamento_id=eq.'+sel[i],{ativo:true})}catch(e2){}}}
    closeModal();toast('Acessos guardados!','ok');loadUsers();
  }catch(e){toast('Erro: '+e.message,'err')}
}
async function tgUser(id,ativo){if(!confirm((ativo?'Ativar':'Desativar')+' utilizador?'))return;try{await sbPatch('utilizadores','id=eq.'+id,{ativo:ativo});toast(ativo?'Ativado!':'Desativado!','ok');loadUsers()}catch(e){toast('Erro','err')}}
async function dUser(id){if(!confirm('Eliminar utilizador permanentemente?'))return;try{await sbDel('utilizadores','id=eq.'+id);toast('Eliminado.','ok');loadUsers()}catch(e){toast('Erro','err')}}

async function mEditEq(id){
  var e=null;
  if(id){try{var a=await sbGet('equipamentos','id=eq.'+id);e=Array.isArray(a)&&a[0]}catch(ex){toast('Erro','err');return}}
  showModal('<div class="mod"><h2>'+(e?'✏️ Editar':'+ Novo')+' Equipamento</h2><div class="fg"><label>Nome</label><input type="text" id="en" value="'+(e?e.nome:'')+'" placeholder="Nome do equipamento"/></div><div class="fr"><div class="fg"><label>Tipo</label><select id="et"><option value="pavilhao"'+(e&&e.tipo==='pavilhao'?' selected':'')+'>🏟️ Pavilhão</option><option value="piscina_coberta"'+(e&&e.tipo==='piscina_coberta'?' selected':'')+'>🏊 Piscina Coberta</option><option value="piscina_descoberta"'+(e&&e.tipo==='piscina_descoberta'?' selected':'')+'>🌊 Piscina Descoberta</option><option value="complexo"'+(e&&e.tipo==='complexo'?' selected':'')+'>🌿 Complexo</option><option value="casa_juventude"'+(e&&e.tipo==='casa_juventude'?' selected':'')+'>🏠 Casa da Juventude</option></select></div><div class="fg"><label>Localização</label><input type="text" id="el" value="'+(e?e.localizacao||'':'')+'" placeholder="Ex: Refojos"/></div></div><div class="fg"><label>Responsável</label><input type="text" id="er" value="'+(e?e.responsavel_nome||'':'')+'" placeholder="Nome"/></div><div class="fg"><label><input type="checkbox" id="es" '+(e&&e.sazonal?'checked':'')+'/> Equipamento Sazonal (Jul–Ago)</label></div><div class="mf"><button class="btn bs" onclick="closeModal()">Cancelar</button>'+(e?'<button class="btn '+(e.ativo?'bdel':'bok')+' btn-sm" onclick="tgEq(\''+id+'\','+(!e.ativo)+')">'+(e.ativo?'Desativar':'Ativar')+'</button>':'')+'<button class="btn bp" onclick="gEq('+(id?'\''+id+'\'':'null')+')">💾 Guardar</button></div></div>');
}
async function gEq(id){var n=document.getElementById('en')&&document.getElementById('en').value.trim();if(!n){toast('Nome obrigatório.','err');return}var d={nome:n,tipo:document.getElementById('et')&&document.getElementById('et').value,localizacao:document.getElementById('el')&&document.getElementById('el').value||null,responsavel_nome:document.getElementById('er')&&document.getElementById('er').value||null,sazonal:document.getElementById('es')&&document.getElementById('es').checked||false};try{if(id)await sbPatch('equipamentos','id=eq.'+id,d);else await sbPost('equipamentos',d);closeModal();toast(id?'Atualizado!':'Criado!','ok');await loadEqs();render()}catch(e){toast('Erro: '+e.message,'err')}}
async function tgEq(id,ativo){try{await sbPatch('equipamentos','id=eq.'+id,{ativo:ativo});closeModal();toast(ativo?'Ativado!':'Desativado!','ok');await loadEqs();render()}catch(e){toast('Erro','err')}}
function mResp(eqId,atual){showModal('<div class="mod"><h2>👤 Alterar Responsável</h2><div class="fg"><label>Nome</label><input type="text" id="rn" value="'+atual+'"/></div><div class="mf"><button class="btn bs" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="sResp(\''+eqId+'\')">💾 Guardar</button></div></div>')}
async function sResp(eqId){try{await sbPatch('equipamentos','id=eq.'+eqId,{responsavel_nome:document.getElementById('rn')&&document.getElementById('rn').value||null});closeModal();toast('Atualizado!','ok');await loadEqs();render()}catch(e){toast('Erro','err')}}
