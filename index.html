<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GestEq</title>
<style>
:root {
  --verde: #2d6a4f;
  --verde2: #40916c;
  --verde-claro: #52b788;
  --verde-pale: #d8f3dc;
  --cinza-escuro: #1a1a1a;
  --cinza: #444;
  --cinza-medio: #888;
  --cinza-claro: #e8e8e8;
  --cinza-fundo: #f0f0f0;
  --branco: #ffffff;
  --fundo: #f4f6f4;
  --vermelho: #c0392b;
  --vermelho-pale: #fdecea;
  --amarelo: #e67e22;
  --amarelo-pale: #fef3e2;
  --azul: #2471a3;
  --azul-pale: #eaf4fb;
  --sombra: 0 2px 10px rgba(0,0,0,0.10);
  --sombra-forte: 0 4px 24px rgba(0,0,0,0.18);
  --radius: 12px;
  --radius-sm: 8px;
  --fonte: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --topo-h: 54px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: var(--fonte); background: var(--fundo); color: var(--cinza-escuro); font-size: 15px; overflow-x: hidden; }
button { font-family: var(--fonte); cursor: pointer; -webkit-appearance: none; }

/* ── DIAGNÓSTICO ── */
#diag { position:fixed; bottom:0; left:0; right:0; background:#111; color:#0f0; font-family:monospace; font-size:11px; padding:6px 10px; max-height:100px; overflow-y:auto; z-index:9999; display:none; }

/* ── TOPO ── */
#topo { position:fixed; top:0; left:0; right:0; height:var(--topo-h); background:var(--verde); display:flex; align-items:center; padding:0 14px; gap:12px; z-index:150; box-shadow:var(--sombra); }
#btn-menu { background:none; border:none; color:#fff; font-size:22px; padding:4px; line-height:1; flex-shrink:0; }
#topo-info { flex:1; min-width:0; }
#topo-eq-nome { font-size:15px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#topo-eq-tipo { font-size:11px; color:rgba(255,255,255,0.72); margin-top:1px; }
#btn-sair { background:rgba(255,255,255,0.15); border:none; color:#fff; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; flex-shrink:0; }

/* ── OVERLAY MENU ── */
#menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0); z-index:200; pointer-events:none; transition:background 0.25s; }
#menu-overlay.visivel { background:rgba(0,0,0,0.45); pointer-events:all; }

/* ── MENU LATERAL ── */
#menu-lateral { position:fixed; top:0; left:0; bottom:0; width:290px; background:var(--branco); z-index:201; transform:translateX(-100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); display:flex; flex-direction:column; box-shadow:var(--sombra-forte); overflow:hidden; }
#menu-lateral.aberto { transform:translateX(0); }

#menu-topo { background:var(--verde); padding:20px 16px 16px; flex-shrink:0; }
#menu-logo { font-size:22px; font-weight:800; color:#fff; letter-spacing:-0.3px; }
#menu-logo-sub { font-size:11px; color:rgba(255,255,255,0.7); margin-top:2px; }
#menu-utilizador { margin-top:12px; background:rgba(255,255,255,0.12); border-radius:8px; padding:10px 12px; }
#menu-util-nome { font-size:13px; font-weight:600; color:#fff; }
#menu-util-perfil { font-size:11px; color:rgba(255,255,255,0.7); margin-top:2px; text-transform:capitalize; }

#menu-corpo { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 0 20px; }

.menu-grupo-titulo { font-size:10px; font-weight:700; color:var(--cinza-medio); text-transform:uppercase; letter-spacing:0.8px; padding:16px 16px 6px; }
.menu-grupo-titulo:first-child { padding-top:8px; }

.menu-eq-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; border:none; background:none; width:100%; text-align:left; }
.menu-eq-item:active { background:var(--verde-pale); }
.menu-eq-item.ativo { background:var(--verde-pale); }
.menu-eq-dot { width:8px; height:8px; border-radius:50%; background:var(--cinza-claro); flex-shrink:0; }
.menu-eq-item.ativo .menu-eq-dot { background:var(--verde-claro); }
.menu-eq-nome { font-size:14px; color:var(--cinza-escuro); line-height:1.3; }
.menu-eq-item.ativo .menu-eq-nome { color:var(--verde); font-weight:600; }

.menu-sep { height:1px; background:var(--cinza-claro); margin:8px 16px; }

.menu-acao { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; border:none; background:none; width:100%; text-align:left; font-size:14px; color:var(--cinza); }
.menu-acao:active { background:var(--cinza-fundo); }
.menu-acao-icone { font-size:18px; }

/* ── CONTEÚDO PRINCIPAL ── */
#conteudo { padding-top:var(--topo-h); min-height:100vh; }
#area-eq { padding:16px; padding-bottom:40px; }

/* ── ECRÃS ESPECIAIS ── */
#ecra-carregar { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid var(--cinza-claro); border-top-color:var(--verde); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#ecra-login { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:90vh; padding:24px; }
.login-card { background:var(--branco); border-radius:var(--radius); box-shadow:var(--sombra); padding:32px 24px; width:100%; max-width:360px; }
.login-logo-nome { font-size:30px; font-weight:800; color:var(--verde); text-align:center; letter-spacing:-0.5px; }
.login-logo-sub { font-size:12px; color:var(--cinza-medio); text-align:center; margin-top:4px; margin-bottom:28px; }
.campo-label { display:block; font-size:11px; font-weight:700; color:var(--cinza); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.campo-input { width:100%; padding:13px 14px; border:1.5px solid var(--cinza-claro); border-radius:var(--radius-sm); font-size:17px; font-family:var(--fonte); background:var(--fundo); color:var(--cinza-escuro); outline:none; -webkit-appearance:none; text-transform:uppercase; letter-spacing:2px; }
.campo-input:focus { border-color:var(--verde-claro); }
.btn-primario { width:100%; background:var(--verde); color:#fff; border:none; border-radius:var(--radius-sm); padding:14px; font-size:15px; font-weight:700; margin-top:18px; }
.btn-primario:active { background:#1e4d38; }
.erro-msg { color:var(--vermelho); font-size:13px; text-align:center; margin-top:12px; min-height:18px; }

/* ── RESPONSÁVEL ── */
.resp-card { background:var(--verde-pale); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
.resp-icone { font-size:20px; }
.resp-info { flex:1; }
.resp-label { font-size:10px; font-weight:700; color:var(--verde2); text-transform:uppercase; letter-spacing:0.4px; }
.resp-nome { font-size:14px; font-weight:600; color:var(--verde); margin-top:2px; }

/* ── MÓDULO CARD ── */
.modulo-card { background:var(--branco); border-radius:var(--radius); box-shadow:var(--sombra); margin-bottom:10px; overflow:hidden; }
.modulo-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; user-select:none; -webkit-user-select:none; }
.modulo-header-esq { display:flex; align-items:center; gap:10px; }
.modulo-icone { width:34px; height:34px; border-radius:9px; background:var(--verde-pale); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.modulo-nome { font-size:15px; font-weight:600; color:var(--cinza-escuro); }
.modulo-seta { font-size:12px; color:var(--cinza-medio); transition:transform 0.2s; }
.modulo-seta.aberto { transform:rotate(180deg); }
.modulo-corpo { display:none; border-top:1.5px solid var(--cinza-claro); padding:16px; }
.modulo-corpo.aberto { display:block; }

/* ── UTILITÁRIOS ── */
.vazio { text-align:center; padding:28px 16px; color:var(--cinza-medio); font-size:14px; }
.tag { display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:10px; text-transform:uppercase; letter-spacing:0.3px; }
.tag-verde { background:var(--verde-pale); color:var(--verde); }
.tag-cinza { background:var(--cinza-claro); color:var(--cinza); }
.tag-vermelho { background:var(--vermelho-pale); color:var(--vermelho); }
.tag-amarelo { background:var(--amarelo-pale); color:var(--amarelo); }
.tag-azul { background:var(--azul-pale); color:var(--azul); }
.btn-sm { display:inline-block; padding:8px 14px; border-radius:7px; font-size:13px; font-weight:600; border:none; }
.btn-verde { background:var(--verde); color:#fff; }
.btn-cinza { background:var(--cinza-claro); color:var(--cinza-escuro); }
.btn-vermelho { background:var(--vermelho); color:#fff; }
hr.sep { border:none; border-top:1.5px solid var(--cinza-claro); margin:12px 0; }
.mt8 { margin-top:8px; }
.mt16 { margin-top:16px; }

/* ── ESCALA ── */
.escala-semana-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.escala-semana-label { font-size:14px; font-weight:600; color:var(--cinza-escuro); }
.btn-nav { background:var(--cinza-claro); border:none; border-radius:7px; padding:7px 14px; font-size:14px; color:var(--cinza-escuro); font-weight:600; }
.escala-dia { background:var(--fundo); border-radius:var(--radius-sm); padding:10px 12px; margin-bottom:8px; }
.escala-dia-titulo { font-size:12px; font-weight:700; color:var(--cinza-medio); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.escala-turno { display:flex; align-items:center; justify-content:space-between; background:var(--branco); border-radius:7px; padding:8px 10px; margin-bottom:5px; }
.escala-turno-nome { font-size:14px; font-weight:500; color:var(--cinza-escuro); }
.escala-turno-horas { font-size:12px; color:var(--cinza-medio); }
.escala-vazio { font-size:13px; color:var(--cinza-medio); text-align:center; padding:8px; }

/* ── PARÂMETROS ÁGUA ── */
.agua-linha { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--cinza-claro); }
.agua-linha:last-child { border-bottom:none; }
.agua-param { font-size:14px; font-weight:500; color:var(--cinza-escuro); }
.agua-val { font-size:14px; font-weight:700; }
.agua-ok { color:var(--verde); }
.agua-alerta { color:var(--vermelho); }
.agua-input-row { display:flex; gap:8px; margin-bottom:10px; }
.agua-input-row input { flex:1; padding:10px 12px; border:1.5px solid var(--cinza-claro); border-radius:var(--radius-sm); font-size:15px; font-family:var(--fonte); background:var(--fundo); color:var(--cinza-escuro); -webkit-appearance:none; outline:none; }
.agua-input-row input:focus { border-color:var(--verde-claro); }

/* ── RESERVAS ── */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-mes { font-size:15px; font-weight:700; color:var(--cinza-escuro); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-cabecalho { text-align:center; font-size:10px; font-weight:700; color:var(--cinza-medio); text-transform:uppercase; padding:4px 0; }
.cal-dia { text-align:center; padding:8px 4px; border-radius:7px; font-size:14px; cursor:pointer; }
.cal-dia.vazio { pointer-events:none; }
.cal-dia.hoje { background:var(--verde); color:#fff; font-weight:700; }
.cal-dia.tem-reserva { background:var(--verde-pale); color:var(--verde); font-weight:600; }
.cal-dia:active { background:var(--cinza-claro); }

/* ── MEMORANDOS DDS ── */
.memo-linha { background:var(--fundo); border-radius:var(--radius-sm); padding:12px; margin-bottom:8px; }
.memo-cabecalho { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
.memo-numero { font-size:12px; font-weight:700; color:var(--cinza-medio); }
.memo-data { font-size:12px; color:var(--cinza-medio); }
.memo-descricao { font-size:14px; font-weight:500; color:var(--cinza-escuro); margin-bottom:6px; line-height:1.4; }
.memo-rodape { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
.memo-brigada { font-size:12px; color:var(--cinza-medio); }
.memo-dias { font-size:11px; font-weight:700; color:var(--amarelo); }

/* ── CHECKLIST ── */
.check-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--cinza-claro); }
.check-item:last-child { border-bottom:none; }
.check-checkbox { width:22px; height:22px; border:2px solid var(--cinza-claro); border-radius:6px; background:var(--branco); flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
.check-checkbox.marcado { background:var(--verde); border-color:var(--verde); color:#fff; }
.check-texto { font-size:14px; color:var(--cinza-escuro); flex:1; }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:300; display:flex; align-items:flex-end; justify-content:center; }
.modal-caixa { background:var(--branco); border-radius:16px 16px 0 0; padding:20px 18px 36px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.modal-titulo { font-size:17px; font-weight:700; margin-bottom:16px; }
.modal-fechar { float:right; background:none; border:none; font-size:24px; color:var(--cinza-medio); line-height:1; padding:0 0 4px 10px; }
.campo-group { margin-bottom:14px; }
.campo-textarea { width:100%; padding:11px 13px; border:1.5px solid var(--cinza-claro); border-radius:var(--radius-sm); font-size:15px; font-family:var(--fonte); background:var(--fundo); color:var(--cinza-escuro); -webkit-appearance:none; outline:none; resize:vertical; min-height:80px; }
.campo-textarea:focus { border-color:var(--verde-claro); }
.campo-select { width:100%; padding:12px 13px; border:1.5px solid var(--cinza-claro); border-radius:var(--radius-sm); font-size:15px; font-family:var(--fonte); background:var(--fundo); color:var(--cinza-escuro); -webkit-appearance:none; outline:none; }
.campo-select:focus { border-color:var(--verde-claro); }
</style>
</head>

<div id="diag"></div>

<!-- TOPO -->
<div id="topo" style="display:none">
  <button id="btn-menu" onclick="abrirMenu()">☰</button>

    <div id="topo-eq-nome">GestEq</div>

  </div>

</div>

<!-- MENU OVERLAY -->

<!-- MENU LATERAL -->
<div id="menu-lateral">
  <div id="menu-topo">
    <div id="menu-logo">GestEq</div>
    <div id="menu-logo-sub">Gestão de Equipamentos · Cabeceiras de Basto</div>
    <div id="menu-utilizador">
      <div id="menu-util-nome">—</div>
      <div id="menu-util-perfil">—</div>

<!-- CONTEÚDO -->
<div id="conteudo">
  <!-- CARREGAMENTO -->

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var SB_URL = 'https://jpojyhvocspksumljslx.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impwb2p5aHZvY3Nwa3N1bWxqc2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE3NDUsImV4cCI6MjA5NzQ0Nzc0NX0.qwAyl_zBx31Z6a3KbaHns8gWceRrjQPcdN3RDBTkGkA';
var SESSAO_HORAS = 8;
var diagAtivo = (window.location.search.indexOf('diag') !== -1);

// ── DIAGNÓSTICO ───────────────────────────────────────────────────────────────
function log(msg) {
  if (!diagAtivo) return;
  var d = document.getElementById('diag');
  if (!d) return;
  d.style.display = 'block';
  var linha = document.createElement('div');
  linha.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  d.appendChild(linha);
  d.scrollTop = d.scrollHeight;
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
var app = {
  utilizador: null,
  equipamentos: [],
  eqAtivo: null,
  menuAberto: false
};

// ── GRUPOS DE EQUIPAMENTOS ────────────────────────────────────────────────────
var GRUPOS = [
  {
    id: 'pavilhoes',
    nome: 'Pavilhões Gimnodesportivos',
    tipos: ['pavilhao']
  },
  {
    id: 'piscinas_cobertas',
    nome: 'Piscinas Municipais Cobertas',
    tipos: ['piscina_coberta']
  },
  {
    id: 'piscinas_descobertas',
    nome: 'Piscinas Municipais Descobertas',
    tipos: ['piscina_descoberta']
  },
  {
    id: 'complexo',
    nome: 'Complexo de Vinha de Mouros',
    tipos: ['complexo', 'ceavm']
  },
  {
    id: 'casa_juventude',
    nome: 'Casa da Juventude',
    tipos: ['casa_juventude']
  }
];

// ── SUPABASE ──────────────────────────────────────────────────────────────────
function sbGet(tabela, params) {
  var url = SB_URL + '/rest/v1/' + tabela + '?' + (params || '');
  return fetch(url, {
    method: 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json'
    }
  }).then(function(r) { return r.json(); });
}

function sbPost(tabela, corpo) {
  var url = SB_URL + '/rest/v1/' + tabela;
  return fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(corpo)
  }).then(function(r) { return r.json(); });
}

function sbPatch(tabela, filtro, corpo) {
  var url = SB_URL + '/rest/v1/' + tabela + '?' + filtro;
  return fetch(url, {
    method: 'PATCH',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(corpo)
  }).then(function(r) { return r.json(); });
}

function sbDelete(tabela, filtro) {
  var url = SB_URL + '/rest/v1/' + tabela + '?' + filtro;
  return fetch(url, {
    method: 'DELETE',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json'
    }
  }).then(function(r) {
    if (r.status === 204) return [];
    return r.json();
  });
}

// ── SESSÃO ────────────────────────────────────────────────────────────────────
function guardarSessao(uid) {
  try {
    var exp = new Date().getTime() + SESSAO_HORAS * 3600 * 1000;
    localStorage.setItem('gestEqSessao', JSON.stringify({ uid: uid, exp: exp }));
  } catch(e) { log('Erro guardar sessao: ' + e); }
}

function lerSessao() {
  try {
    var raw = localStorage.getItem('gestEqSessao');
    if (!raw) return null;
    var obj = JSON.parse(raw);
    if (!obj || !obj.uid || !obj.exp) return null;
    if (new Date().getTime() > obj.exp) { localStorage.removeItem('gestEqSessao'); return null; }
    return obj.uid;
  } catch(e) { log('Erro ler sessao: ' + e); return null; }
}

function limparSessao() {
  try { localStorage.removeItem('gestEqSessao'); } catch(e) {}
}

// ── ECRÃS ─────────────────────────────────────────────────────────────────────
function mostrarEcra(qual) {
  document.getElementById('ecra-carregar').style.display = 'none';
  document.getElementById('ecra-login').style.display = 'none';
  document.getElementById('area-eq').style.display = 'none';
  document.getElementById('topo').style.display = 'none';

function abrirMenu() {
  document.getElementById('menu-lateral').classList.add('aberto');
  document.getElementById('menu-overlay').classList.add('visivel');

}

function fecharMenu() {
  document.getElementById('menu-lateral').classList.remove('aberto');

}

function renderMenu() {
  var corpo = document.getElementById('menu-corpo');
  corpo.innerHTML = '';
  var u = app.utilizador;

  document.getElementById('menu-util-nome').textContent = u.nome || u.codigo_visivel;
  document.getElementById('menu-util-perfil').textContent = u.perfil.replace('_', ' ');

  // agrupar equipamentos
  for (var g = 0; g < GRUPOS.length; g++) {
    var grupo = GRUPOS[g];
    var eqsGrupo = [];
    for (var i = 0; i < app.equipamentos.length; i++) {
      var eq = app.equipamentos[i];
      for (var t = 0; t < grupo.tipos.length; t++) {
        if (eq.tipo === grupo.tipos[t]) { eqsGrupo.push(eq); break; }
      }
    }
    if (!eqsGrupo.length) continue;

    var titulo = document.createElement('div');
    titulo.className = 'menu-grupo-titulo';
    titulo.textContent = grupo.nome;
    corpo.appendChild(titulo);

    for (var j = 0; j < eqsGrupo.length; j++) {
      (function(eq) {
        var item = document.createElement('button');
        item.className = 'menu-eq-item';
        item.id = 'menu-item-' + eq.id;

        var dot = document.createElement('div');
        dot.className = 'menu-eq-dot';

        var nome = document.createElement('div');
        nome.className = 'menu-eq-nome';
        nome.textContent = eq.nome;

        item.appendChild(dot);
        item.appendChild(nome);

        item.onclick = function() {
          seleccionarEq(eq.id);
          fecharMenu();
        };

        corpo.appendChild(item);
      })(eqsGrupo[j]);
    }
  }

  // DDS (se tiver acesso)
  if (u.perfil !== 'funcionario') {
    var sep = document.createElement('div');
    sep.className = 'menu-sep';
    corpo.appendChild(sep);

    var btnDDS = document.createElement('button');
    btnDDS.className = 'menu-acao';
    var iconeDDS = document.createElement('span');
    iconeDDS.className = 'menu-acao-icone';
    iconeDDS.textContent = '📨';
    var textoDDS = document.createElement('span');
    textoDDS.textContent = 'Memorandos DDS';
    btnDDS.appendChild(iconeDDS);
    btnDDS.appendChild(textoDDS);
    btnDDS.onclick = function() { seleccionarDDS(); fecharMenu(); };
    corpo.appendChild(btnDDS);
  }

  // Admin
  if (u.perfil === 'admin') {
    var btnAdm = document.createElement('button');
    btnAdm.className = 'menu-acao';
    var iconeAdm = document.createElement('span');
    iconeAdm.className = 'menu-acao-icone';
    iconeAdm.textContent = '⚙️';
    var textoAdm = document.createElement('span');
    textoAdm.textContent = 'Administração';
    btnAdm.appendChild(iconeAdm);
    btnAdm.appendChild(textoAdm);
    btnAdm.onclick = function() { seleccionarAdmin(); fecharMenu(); };
    corpo.appendChild(btnAdm);
  }
}

// ── INÍCIO ────────────────────────────────────────────────────────────────────
function iniciar() {
  log('iniciar()');
  mostrarEcra('carregar');
  var uid = lerSessao();
  log('uid=' + uid);
  if (!uid) { mostrarEcra('login'); return; }

  sbGet('utilizadores', 'id=eq.' + uid + '&select=*')
    .then(function(dados) {
      log('utilizador: ' + JSON.stringify(dados));
      if (!dados || !dados.length) { limparSessao(); mostrarEcra('login'); return; }
      var u = dados[0];
      if (!u.ativo) { limparSessao(); mostrarEcra('login'); return; }
      app.utilizador = u;
      return carregarEquipamentos();
    })
    .catch(function(e) { log('erro init: ' + e); mostrarEcra('login'); });
}

// ── CARREGAR EQUIPAMENTOS ─────────────────────────────────────────────────────
function carregarEquipamentos() {
  log('carregarEquipamentos()');
  var u = app.utilizador;

  if (u.perfil === 'responsavel_dds') {
    app.equipamentos = [];
    arrancarApp();
    return;
  }

  if (u.perfil === 'admin' || u.perfil === 'supervisor') {
    return sbGet('equipamentos', 'select=*&order=nome.asc')
      .then(function(eqs) {
        log('eqs: ' + (eqs ? eqs.length : 0));
        app.equipamentos = eqs || [];
        arrancarApp();
      })
      .catch(function(e) { log('erro eqs: ' + e); mostrarEcra('login'); });
  }

  return sbGet('utilizador_equipamentos',
    'utilizador_id=eq.' + u.id + '&ativo=eq.true&select=equipamento_id,equipamentos(id,nome,tipo,responsavel)'
  ).then(function(rels) {
    log('rels: ' + JSON.stringify(rels));
    var eqs = [];
    if (rels && rels.length) {
      for (var i = 0; i < rels.length; i++) {
        if (rels[i].equipamentos) eqs.push(rels[i].equipamentos);
      }
    }
    app.equipamentos = eqs;
    arrancarApp();
  }).catch(function(e) { log('erro rels: ' + e); mostrarEcra('login'); });
}

// ── ARRANCAR APP ──────────────────────────────────────────────────────────────
function arrancarApp() {
  log('arrancarApp()');
  mostrarEcra('principal');
  renderMenu();

  if (app.utilizador.perfil === 'responsavel_dds') {
    seleccionarDDS();

    var area = document.getElementById('area-eq');

    var msg = document.createElement('div');
    msg.className = 'vazio';
    msg.textContent = 'Nenhum equipamento atribuído. Contacta o administrador.';
    area.appendChild(msg);
  }
}

// ── SELECCIONAR EQUIPAMENTO ───────────────────────────────────────────────────
function seleccionarEq(eqId) {
  app.eqAtivo = eqId;

  var eq = null;
  for (var i = 0; i < app.equipamentos.length; i++) {
    if (app.equipamentos[i].id === eqId) { eq = app.equipamentos[i]; break; }
  }
  if (!eq) return;

  // actualizar topo
  document.getElementById('topo-eq-nome').textContent = eq.nome;
  document.getElementById('topo-eq-tipo').textContent = tipoLabel(eq.tipo);

  // actualizar menu
  var items = document.querySelectorAll('.menu-eq-item');
  for (var j = 0; j < items.length; j++) items[j].classList.remove('ativo');
  var itemAtivo = document.getElementById('menu-item-' + eqId);
  if (itemAtivo) itemAtivo.classList.add('ativo');

  renderAreaEq(eq);
}

function seleccionarDDS() {

// ── CRIAR CARD COLAPSÁVEL ─────────────────────────────────────────────────────
function criarCard(modulo, eq) {
  var card = document.createElement('div');
  card.className = 'modulo-card';

  var header = document.createElement('div');
  header.className = 'modulo-header';

  var esq = document.createElement('div');
  esq.className = 'modulo-header-esq';

  var ic = document.createElement('div');
  ic.className = 'modulo-icone';
  ic.textContent = modulo.icone;

  var nm = document.createElement('div');
  nm.className = 'modulo-nome';
  nm.textContent = modulo.nome;

  esq.appendChild(ic);
  esq.appendChild(nm);

  var seta = document.createElement('div');
  seta.className = 'modulo-seta';
  seta.textContent = '▾';

  header.appendChild(esq);
  header.appendChild(seta);

  var corpo = document.createElement('div');
  corpo.className = 'modulo-corpo';

  var carregado = false;

  header.onclick = function() {
    var aberto = corpo.classList.contains('aberto');
    if (aberto) {
      corpo.classList.remove('aberto');
      seta.classList.remove('aberto');
    } else {
      corpo.classList.add('aberto');
      seta.classList.add('aberto');
      if (!carregado) {
        carregado = true;
        carregarConteudoModulo(modulo.id, eq, corpo);
      }
    }
  };

  card.appendChild(header);
  card.appendChild(corpo);
  return card;
}

// ── CARREGAR CONTEÚDO MÓDULO ──────────────────────────────────────────────────
function carregarConteudoModulo(moduloId, eq, corpo) {
  corpo.innerHTML = '';

  if (moduloId === 'escala') { renderEscala(eq, corpo); return; }
  if (moduloId === 'escala_pd') { renderEscalaPD(eq, corpo); return; }
  if (moduloId === 'checklist_inicio') { renderChecklist(eq, corpo, 'inicio'); return; }
  if (moduloId === 'checklist_termo') { renderChecklist(eq, corpo, 'termo'); return; }
  if (moduloId === 'agua') { renderAgua(eq, corpo); return; }
  if (moduloId === 'reservas') { renderReservas(eq, corpo); return; }
  if (moduloId === 'relatorios') { renderRelatorios(eq, corpo); return; }
  if (moduloId === 'reparacoes') { renderReparacoes(eq, corpo); return; }

  var msg = document.createElement('div');
  msg.className = 'vazio';
  msg.textContent = 'Em desenvolvimento.';
  corpo.appendChild(msg);
}

// ── HELPER DATAS ──────────────────────────────────────────────────────────────
var DIAS_PT = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
var MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DIAS_CURTOS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var MESES_CURTOS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function dataISO(d) {
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  return d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd < 10 ? '0' + dd : dd);
}

function inicioSemana(d) {
  var c = new Date(d);
  var dia = c.getDay();
  var diff = (dia === 0) ? -6 : 1 - dia;
  c.setDate(c.getDate() + diff);
  c.setHours(0,0,0,0);
  return c;
}

function adicionarDias(d, n) {
  var c = new Date(d);
  c.setDate(c.getDate() + n);
  return c;
}

function diasEntre(d1, d2) {
  return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
}

// ── MÓDULO: ESCALA ────────────────────────────────────────────────────────────
var escalasCache = {};

function renderEscala(eq, corpo) {
  var hoje = new Date();
  var semAtual = inicioSemana(hoje);
  renderEscalaSemana(eq, corpo, semAtual);
}

function renderEscalaSemana(eq, corpo, semInicio) {
  corpo.innerHTML = '';
  var semFim = adicionarDias(semInicio, 6);

  // nav semana
  var nav = document.createElement('div');
  nav.className = 'escala-semana-nav';

  var btnAntes = document.createElement('button');
  btnAntes.className = 'btn-nav';
  btnAntes.textContent = '‹ Anterior';
  btnAntes.onclick = function() {
    renderEscalaSemana(eq, corpo, adicionarDias(semInicio, -7));
  };

  var labelSem = document.createElement('div');
  labelSem.className = 'escala-semana-label';
  labelSem.textContent = semInicio.getDate() + ' ' + MESES_CURTOS[semInicio.getMonth()] + ' — ' + semFim.getDate() + ' ' + MESES_CURTOS[semFim.getMonth()];

  var btnDepois = document.createElement('button');
  btnDepois.className = 'btn-nav';
  btnDepois.textContent = 'Seguinte ›';
  btnDepois.onclick = function() {
    renderEscalaSemana(eq, corpo, adicionarDias(semInicio, 7));
  };

  nav.appendChild(btnAntes);
  nav.appendChild(labelSem);
  nav.appendChild(btnDepois);
  corpo.appendChild(nav);

  var loading = document.createElement('div');
  loading.className = 'vazio';
  loading.textContent = 'A carregar...';
  corpo.appendChild(loading);

  var dataInicio = dataISO(semInicio);
  var dataFim = dataISO(semFim);

  sbGet('escalas',
    'equipamento_id=eq.' + eq.id +
    '&data=gte.' + dataInicio +
    '&data=lte.' + dataFim +
    '&select=*,utilizadores(nome)&order=data.asc'
  ).then(function(turnos) {
    corpo.removeChild(loading);
    for (var d = 0; d < 7; d++) {
      var dia = adicionarDias(semInicio, d);
      var isoD = dataISO(dia);
      var turnosDia = [];
      if (turnos) {
        for (var t = 0; t < turnos.length; t++) {
          if (turnos[t].data === isoD) turnosDia.push(turnos[t]);
        }
      }

      var diaDiv = document.createElement('div');
      diaDiv.className = 'escala-dia';

      var diaTit = document.createElement('div');
      diaTit.className = 'escala-dia-titulo';
      diaTit.textContent = DIAS_PT[dia.getDay()] + ', ' + dia.getDate() + ' ' + MESES_CURTOS[dia.getMonth()];
      diaDiv.appendChild(diaTit);

      if (!turnosDia.length) {
        var sem = document.createElement('div');
        sem.className = 'escala-vazio';
        sem.textContent = 'Sem turnos registados';
        diaDiv.appendChild(sem);
      } else {
        for (var ti = 0; ti < turnosDia.length; ti++) {
          var turno = turnosDia[ti];
          var tDiv = document.createElement('div');
          tDiv.className = 'escala-turno';

          var tNome = document.createElement('div');
          tNome.className = 'escala-turno-nome';
          tNome.textContent = (turno.utilizadores && turno.utilizadores.nome) ? turno.utilizadores.nome : '—';

          var tHoras = document.createElement('div');
          tHoras.className = 'escala-turno-horas';
          tHoras.textContent = (turno.hora_inicio || '') + (turno.hora_fim ? ' — ' + turno.hora_fim : '');

          tDiv.appendChild(tNome);
          tDiv.appendChild(tHoras);
          diaDiv.appendChild(tDiv);
        }
      }
      corpo.appendChild(diaDiv);
    }
  }).catch(function(e) {
    loading.textContent = 'Erro ao carregar escala.';
    log('erro escala: ' + e);
  });
}

        s.style.cssText = 'font-size:12px;color:var(--cinza-medio);';
        s.textContent = 'Sem turno';
        dDiv.appendChild(s);
      } else {
        for (var ti2 = 0; ti2 < tDia.length; ti2++) {

          var r = document.createElement('div');
          r.style.cssText = 'display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px;';
          var n = document.createElement('span');
          n.textContent = (t2.utilizadores && t2.utilizadores.nome) ? t2.utilizadores.nome : '—';
          var h = document.createElement('span');
          h.style.color = 'var(--cinza-medio)';
          h.textContent = (t2.hora_inicio || '') + (t2.hora_fim ? '–' + t2.hora_fim : '');
          r.appendChild(n);
          r.appendChild(h);

        }
      }
      subCorpo.appendChild(dDiv);
    }
  }).catch(function(e) { load.textContent = 'Erro.'; });
}

// ── MÓDULO: CHECKLIST ─────────────────────────────────────────────────────────
function renderChecklist(eq, corpo, momento) {
  var load = document.createElement('div');
  load.className = 'vazio';
  load.textContent = 'A carregar...';
  corpo.appendChild(load);

  sbGet('checklist_itens',
    'equipamento_id=eq.' + eq.id + '&momento=eq.' + momento + '&ativo=eq.true&order=ordem.asc'
  ).then(function(itens) {
    corpo.removeChild(load);

    if (!itens || !itens.length) {
      var msg = document.createElement('div');
      msg.className = 'vazio';
      msg.textContent = 'Sem itens configurados para este momento.';
      corpo.appendChild(msg);
      return;
    }

    var estadoCheck = {};
    for (var i = 0; i < itens.length; i++) {
      estadoCheck[itens[i].id] = false;
    }

    var lista = document.createElement('div');

    for (var j = 0; j < itens.length; j++) {
      (function(item) {
        var linha = document.createElement('div');
        linha.className = 'check-item';

        var chk = document.createElement('div');
        chk.className = 'check-checkbox';
        chk.id = 'chk-' + item.id;

        var txt = document.createElement('div');
        txt.className = 'check-texto';
        txt.textContent = item.descricao;

        chk.onclick = function() {
          estadoCheck[item.id] = !estadoCheck[item.id];
          if (estadoCheck[item.id]) {
            chk.classList.add('marcado');
            chk.textContent = '✓';
          } else {
            chk.classList.remove('marcado');
            chk.textContent = '';
          }
        };

        linha.appendChild(chk);
        linha.appendChild(txt);
        lista.appendChild(linha);
      })(itens[j]);
    }

    corpo.appendChild(lista);

    var sep = document.createElement('hr');
    sep.className = 'sep';
    sep.style.marginTop = '14px';
    corpo.appendChild(sep);

    var obs = document.createElement('div');
    obs.className = 'campo-group';
    var obsLabel = document.createElement('label');
    obsLabel.className = 'campo-label';
    obsLabel.textContent = 'Observações';
    var obsInput = document.createElement('textarea');
    obsInput.className = 'campo-textarea';
    obsInput.placeholder = 'Observações ou notas adicionais...';
    obsInput.rows = 3;
    obs.appendChild(obsLabel);
    obs.appendChild(obsInput);
    corpo.appendChild(obs);

    var btn = document.createElement('button');
    btn.className = 'btn-sm btn-verde';
    btn.style.width = '100%';
    btn.style.marginTop = '8px';
    btn.textContent = 'Guardar Checklist';
    btn.onclick = function() {
      guardarChecklist(eq, itens, estadoCheck, obsInput.value, momento, btn);
    };
    corpo.appendChild(btn);

  }).catch(function(e) {
    load.textContent = 'Erro ao carregar checklist.';
    log('erro checklist: ' + e);
  });
}

function guardarChecklist(eq, itens, estadoCheck, observacoes, momento, btn) {
  var u = app.utilizador;
  var agora = new Date();
  var registos = [];

  for (var i = 0; i < itens.length; i++) {
    registos.push({
      checklist_item_id: itens[i].id,
      equipamento_id: eq.id,
      utilizador_id: u.id,
      conforme: estadoCheck[itens[i].id],
      momento: momento,
      data_registo: agora.toISOString(),
      observacoes: observacoes || null
    });
  }

  btn.textContent = 'A guardar...';
  btn.disabled = true;

  sbPost('checklists_registo', registos)
    .then(function() {
      btn.textContent = 'Guardado ✓';
      btn.style.background = 'var(--verde-claro)';
      setTimeout(function() {
        btn.textContent = 'Guardar Checklist';
        btn.style.background = '';
        btn.disabled = false;
      }, 2000);
    })
    .catch(function(e) {
      btn.textContent = 'Erro — tenta novamente';
      btn.disabled = false;
      log('erro guardar checklist: ' + e);
    });
}

// ── MÓDULO: PARÂMETROS ÁGUA ───────────────────────────────────────────────────

function guardarAgua(eq, params, observacoes, btn) {
  var registos = [];
  var agora = new Date();
  var u = app.utilizador;

  for (var i = 0; i < params.length; i++) {
    var inp = document.getElementById('agua-inp-' + params[i].id);
    if (!inp || inp.value === '') continue;
    registos.push({
      parametro_id: params[i].id,
      equipamento_id: eq.id,
      utilizador_id: u.id,
      valor: parseFloat(inp.value),
      data_registo: agora.toISOString(),
      observacoes: observacoes || null
    });
  }

  if (!registos.length) {
    alert('Introduz pelo menos um valor.');
    return;
  }

  btn.textContent = 'A guardar...';
  btn.disabled = true;

  sbPost('parametros_agua_registo', registos)
    .then(function() {
      btn.textContent = 'Registado ✓';
      btn.style.background = 'var(--verde-claro)';
      setTimeout(function() {
        btn.textContent = 'Registar Parâmetros';
        btn.style.background = '';
        btn.disabled = false;
        for (var i = 0; i < params.length; i++) {
          var inp = document.getElementById('agua-inp-' + params[i].id);
          if (inp) inp.value = '';
        }
      }, 2000);
    })
    .catch(function(e) {
      btn.textContent = 'Erro — tenta novamente';
      btn.disabled = false;
    });
}

// ── MÓDULO: RESERVAS ──────────────────────────────────────────────────────────
function renderReservas(eq, corpo) {
  var hoje = new Date();
  renderCalMes(eq, corpo, hoje.getFullYear(), hoje.getMonth());
}

function renderCalMes(eq, corpo, ano, mes) {
  corpo.innerHTML = '';

  var nav = document.createElement('div');
  nav.className = 'cal-nav';

  var btnA = document.createElement('button');
  btnA.className = 'btn-nav';
  btnA.textContent = '‹';
  var prevMes = mes - 1;
  var prevAno = ano;
  if (prevMes < 0) { prevMes = 11; prevAno--; }
  btnA.onclick = function() { renderCalMes(eq, corpo, prevAno, prevMes); };

  var mesLabel = document.createElement('div');
  mesLabel.className = 'cal-mes';
  mesLabel.textContent = MESES_PT[mes] + ' ' + ano;

  var btnD = document.createElement('button');
  btnD.className = 'btn-nav';
  btnD.textContent = '›';
  var nextMes = mes + 1;
  var nextAno = ano;
  if (nextMes > 11) { nextMes = 0; nextAno++; }
  btnD.onclick = function() { renderCalMes(eq, corpo, nextAno, nextMes); };

  nav.appendChild(btnA);
  nav.appendChild(mesLabel);
  nav.appendChild(btnD);
  corpo.appendChild(nav);

  var grid = document.createElement('div');
  grid.className = 'cal-grid';

  for (var dc = 0; dc < 7; dc++) {
    var cab = document.createElement('div');
    cab.className = 'cal-cabecalho';
    cab.textContent = DIAS_CURTOS[dc === 0 ? 0 : dc];
    grid.appendChild(cab);
  }

  var primeiroDia = new Date(ano, mes, 1).getDay();
  var diasNoMes = new Date(ano, mes + 1, 0).getDate();
  var offset = (primeiroDia === 0) ? 6 : primeiroDia - 1;

  for (var v = 0; v < offset; v++) {
    var vazio = document.createElement('div');
    vazio.className = 'cal-dia vazio';
    grid.appendChild(vazio);
  }

  var hojeISO = dataISO(new Date());

  for (var d = 1; d <= diasNoMes; d++) {
    (function(dia) {
      var dDiv = document.createElement('div');
      dDiv.className = 'cal-dia';
      var dISO = ano + '-' + ((mes+1) < 10 ? '0'+(mes+1) : (mes+1)) + '-' + (dia < 10 ? '0'+dia : dia);
      if (dISO === hojeISO) dDiv.classList.add('hoje');
      dDiv.textContent = dia;
      dDiv.onclick = function() { abrirDiaReservas(eq, dISO, dDiv); };
      grid.appendChild(dDiv);
    })(d);
  }

  corpo.appendChild(grid);

  // carregar dias com reservas
  var inicio = ano + '-' + ((mes+1) < 10 ? '0'+(mes+1) : (mes+1)) + '-01';
  var fim = ano + '-' + ((mes+1) < 10 ? '0'+(mes+1) : (mes+1)) + '-' + (diasNoMes < 10 ? '0'+diasNoMes : diasNoMes);

  sbGet('reservas',
    'equipamento_id=eq.' + eq.id + '&data=gte.' + inicio + '&data=lte.' + fim + '&select=data'
  ).then(function(res) {
    if (!res || !res.length) return;
    var diasComReserva = {};
    for (var i = 0; i < res.length; i++) diasComReserva[res[i].data] = true;

    var diasCal = grid.querySelectorAll('.cal-dia:not(.vazio)');
    for (var j = 0; j < diasCal.length; j++) {
      var txt = diasCal[j].textContent;
      var ddd = parseInt(txt, 10);
      var dISO2 = ano + '-' + ((mes+1) < 10 ? '0'+(mes+1) : (mes+1)) + '-' + (ddd < 10 ? '0'+ddd : ddd);
      if (diasComReserva[dISO2] && !diasCal[j].classList.contains('hoje')) {
        diasCal[j].classList.add('tem-reserva');
      }
    }
  }).catch(function() {});

  // painel reservas do dia
  var painelDia = document.createElement('div');
  painelDia.id = 'painel-dia-' + eq.id;
  painelDia.style.marginTop = '16px';
  corpo.appendChild(painelDia);
}

function abrirDiaReservas(eq, dataISO2, dDiv) {
  var painel = document.getElementById('painel-dia-' + eq.id);
  if (!painel) return;
  painel.innerHTML = '';

  var tit = document.createElement('div');
  tit.style.cssText = 'font-size:14px;font-weight:700;color:var(--cinza-escuro);margin-bottom:10px;';
  tit.textContent = 'Reservas — ' + dataISO2;
  painel.appendChild(tit);

  var load = document.createElement('div');
  load.className = 'vazio';
  load.style.padding = '12px';
  load.textContent = 'A carregar...';
  painel.appendChild(load);

  sbGet('reservas',
    'equipamento_id=eq.' + eq.id + '&data=eq.' + dataISO2 + '&select=*&order=hora_inicio.asc'
  ).then(function(res) {
    painel.removeChild(load);

    if (!res || !res.length) {
      var sem = document.createElement('div');
      sem.style.cssText = 'font-size:13px;color:var(--cinza-medio);margin-bottom:12px;';
      sem.textContent = 'Sem reservas para este dia.';
      painel.appendChild(sem);
    } else {
      for (var i = 0; i < res.length; i++) {
        var r = res[i];
        var card = document.createElement('div');
        card.style.cssText = 'background:var(--verde-pale);border-radius:8px;padding:10px 12px;margin-bottom:8px;';

        var rTopo = document.createElement('div');
        rTopo.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;';

        var rNome = document.createElement('div');
        rNome.style.cssText = 'font-size:14px;font-weight:600;color:var(--cinza-escuro);';
        rNome.textContent = r.entidade || r.nome || '—';

        var rHoras = document.createElement('div');
        rHoras.style.cssText = 'font-size:12px;color:var(--verde);font-weight:700;';
        rHoras.textContent = (r.hora_inicio || '') + (r.hora_fim ? '–' + r.hora_fim : '');

        rTopo.appendChild(rNome);
        rTopo.appendChild(rHoras);
        card.appendChild(rTopo);

        if (r.espaco) {
          var rEsp = document.createElement('div');
          rEsp.style.cssText = 'font-size:12px;color:var(--cinza-medio);';
          rEsp.textContent = r.espaco + (r.num_pessoas ? ' · ' + r.num_pessoas + ' pessoas' : '');
          card.appendChild(rEsp);
        }

        painel.appendChild(card);
      }
    }

    // Botão nova reserva
    var btnNova = document.createElement('button');
    btnNova.className = 'btn-sm btn-verde';
    btnNova.style.cssText = 'width:100%;padding:11px;font-size:14px;margin-top:4px;';
    btnNova.textContent = '+ Nova Reserva';
    btnNova.onclick = function() { abrirFormReserva(eq, dataISO2, painel, btnNova); };
    painel.appendChild(btnNova);

  }).catch(function() { load.textContent = 'Erro ao carregar.'; });
}

function abrirFormReserva(eq, dataStr, painel, btnNova) {
  btnNova.style.display = 'none';

  var form = document.createElement('div');
  form.style.cssText = 'background:var(--fundo);border-radius:10px;padding:14px;margin-top:10px;';

  var fTit = document.createElement('div');
  fTit.style.cssText = 'font-size:14px;font-weight:700;margin-bottom:12px;color:var(--cinza-escuro);';
  fTit.textContent = 'Nova Reserva — ' + dataStr;
  form.appendChild(fTit);

  function campoTexto(labelTxt, placeholder) {
    var g = document.createElement('div');
    g.className = 'campo-group';
    var l = document.createElement('label');
    l.className = 'campo-label';
    l.textContent = labelTxt;
    var inp = document.createElement('input');
    inp.className = 'campo-input';
    inp.style.cssText = 'font-size:14px;padding:10px 12px;text-transform:none;letter-spacing:0;';
    inp.placeholder = placeholder;
    g.appendChild(l);
    g.appendChild(inp);
    form.appendChild(g);
    return inp;
  }

  function campoHora(labelTxt) {
    var g = document.createElement('div');
    g.className = 'campo-group';
    var l = document.createElement('label');
    l.className = 'campo-label';
    l.textContent = labelTxt;
    var inp = document.createElement('input');
    inp.type = 'time';
    inp.className = 'campo-input';
    inp.style.cssText = 'font-size:14px;padding:10px 12px;text-transform:none;letter-spacing:0;';
    g.appendChild(l);
    g.appendChild(inp);
    form.appendChild(g);
    return inp;
  }

  var inpEntidade = campoTexto('Entidade / Nome', 'Ex: Clube Desportivo X');
  var inpHI = campoHora('Hora de início');
  var inpHF = campoHora('Hora de fim');

  // espaço (apenas pavilhões)
  var inpEspaco = null;
  if (eq.tipo === 'pavilhao') {
    var gEsp = document.createElement('div');
    gEsp.className = 'campo-group';
    var lEsp = document.createElement('label');
    lEsp.className = 'campo-label';
    lEsp.textContent = 'Espaço';
    var selEsp = document.createElement('select');
    selEsp.className = 'campo-select';
    var ops = ['Campo Principal', 'Sala de Ginástica'];
    for (var oi = 0; oi < ops.length; oi++) {
      var op = document.createElement('option');
      op.value = ops[oi];
      op.textContent = ops[oi];
      selEsp.appendChild(op);
    }
    gEsp.appendChild(lEsp);
    gEsp.appendChild(selEsp);
    form.appendChild(gEsp);
    inpEspaco = selEsp;
  }

  // num pessoas (CEAVM)
  var inpPessoas = null;
  if (eq.tipo === 'ceavm') {
    var gPes = document.createElement('div');
    gPes.className = 'campo-group';
    var lPes = document.createElement('label');
    lPes.className = 'campo-label';
    lPes.textContent = 'Número de pessoas';
    var inpP = document.createElement('input');
    inpP.type = 'number';
    inpP.className = 'campo-input';
    inpP.style.cssText = 'font-size:14px;padding:10px 12px;text-transform:none;letter-spacing:0;';
    inpP.placeholder = '0';
    inpP.min = '1';
    gPes.appendChild(lPes);
    gPes.appendChild(inpP);
    form.appendChild(gPes);
    inpPessoas = inpP;
  }

  var inpObs = document.createElement('textarea');
  var gObs = document.createElement('div');
  gObs.className = 'campo-group';
  var lObs = document.createElement('label');
  lObs.className = 'campo-label';
  lObs.textContent = 'Observações';
  inpObs.className = 'campo-textarea';
  inpObs.placeholder = 'Notas adicionais...';
  inpObs.rows = 2;
  gObs.appendChild(lObs);
  gObs.appendChild(inpObs);
  form.appendChild(gObs);

  var bts = document.createElement('div');
  bts.style.cssText = 'display:flex;gap:8px;margin-top:10px;';

  var btnCancelar = document.createElement('button');
  btnCancelar.className = 'btn-sm btn-cinza';
  btnCancelar.style.flex = '1';
  btnCancelar.textContent = 'Cancelar';
  btnCancelar.onclick = function() {
    painel.removeChild(form);
    btnNova.style.display = '';
  };

  var btnGuardar = document.createElement('button');
  btnGuardar.className = 'btn-sm btn-verde';
  btnGuardar.style.flex = '1';
  btnGuardar.textContent = 'Guardar';
  btnGuardar.onclick = function() {
    var corpo2 = {
      equipamento_id: eq.id,
      utilizador_id: app.utilizador.id,
      data: dataStr,
      hora_inicio: inpHI.value || null,
      hora_fim: inpHF.value || null,
      entidade: inpEntidade.value.trim() || null,
      espaco: inpEspaco ? inpEspaco.value : null,
      num_pessoas: inpPessoas ? (parseInt(inpPessoas.value) || null) : null,
      observacoes: inpObs.value.trim() || null
    };
    if (!corpo2.entidade) { alert('Introduz a entidade/nome.'); return; }
    btnGuardar.textContent = 'A guardar...';
    btnGuardar.disabled = true;
    sbPost('reservas', corpo2).then(function() {
      painel.removeChild(form);
      abrirDiaReservas(eq, dataStr, null);
    }).catch(function() {
      btnGuardar.textContent = 'Erro';
      btnGuardar.disabled = false;
    });
  };

  bts.appendChild(btnCancelar);
  bts.appendChild(btnGuardar);
  form.appendChild(bts);
  painel.appendChild(form);
}

      listaDiv.appendChild(sem);
    } else {
      for (var i = 0; i < memos.length; i++) {
        listaDiv.appendChild(criarCardReparacao(memos[i]));
      }
    }

    corpo.appendChild(listaDiv);
  }).catch(function(e) {
    load.textContent = 'Erro ao carregar.';
  });
}

function criarCardReparacao(memo) {
  var card = document.createElement('div');
  card.className = 'memo-linha';

  var cab = document.createElement('div');
  cab.className = 'memo-cabecalho';

  var num = document.createElement('div');
  num.className = 'memo-numero';
  num.textContent = memo.numero ? 'N.º ' + memo.numero : '—';

  var dataDiv = document.createElement('div');
  dataDiv.className = 'memo-data';
  dataDiv.textContent = memo.data ? memo.data : (memo.created_at ? memo.created_at.substring(0,10) : '—');

  cab.appendChild(num);
  cab.appendChild(dataDiv);
  card.appendChild(cab);

  var desc = document.createElement('div');
  desc.className = 'memo-descricao';
  desc.textContent = memo.descricao || '—';
  card.appendChild(desc);

  var rodape = document.createElement('div');
  rodape.className = 'memo-rodape';

  var estadoClass = 'tag-cinza';
  var estadoTxt = memo.estado || 'pendente';
  if (estadoTxt === 'pendente') estadoClass = 'tag-amarelo';
  if (estadoTxt === 'reforco_pedido') estadoClass = 'tag-azul';
  if (estadoTxt === 'concluido') estadoClass = 'tag-verde';

  var estadoTag = document.createElement('span');
  estadoTag.className = 'tag ' + estadoClass;
  estadoTag.textContent = estadoTxt.replace('_', ' ');
  rodape.appendChild(estadoTag);

  // dias em aberto
  if (memo.estado !== 'concluido') {
    var dataRef = memo.data ? new Date(memo.data) : new Date(memo.created_at);
    var dias = diasEntre(dataRef, new Date());
    if (dias > 0) {
      var diaDiv = document.createElement('div');
      diaDiv.className = 'memo-dias';
      diaDiv.textContent = dias + (dias === 1 ? ' dia em aberto' : ' dias em aberto');
      rodape.appendChild(diaDiv);
    }
  }

  card.appendChild(rodape);
  return card;
}

function abrirFormReparacao(eq, corpo, listaDiv) {
  var form = document.createElement('div');
  form.style.cssText = 'background:var(--fundo);border-radius:10px;padding:14px;margin-bottom:14px;';

  var fTit = document.createElement('div');
  fTit.style.cssText = 'font-size:14px;font-weight:700;margin-bottom:12px;';
  fTit.textContent = 'Novo Pedido de Reparação';
  form.appendChild(fTit);

  function campo(labelTxt, placeholder, tipo) {
    var g = document.createElement('div');
    g.className = 'campo-group';
    var l = document.createElement('label');
    l.className = 'campo-label';
    l.textContent = labelTxt;
    var inp = document.createElement('input');
    inp.type = tipo || 'text';
    inp.className = 'campo-input';
    inp.style.cssText = 'font-size:14px;padding:10px 12px;text-transform:none;letter-spacing:0;';
    inp.placeholder = placeholder;
    g.appendChild(l);
    g.appendChild(inp);
    form.appendChild(g);
    return inp;
  }

  var inpDesc = document.createElement('textarea');
  var gDesc = document.createElement('div');
  gDesc.className = 'campo-group';
  var lDesc = document.createElement('label');
  lDesc.className = 'campo-label';
  lDesc.textContent = 'Descrição do pedido';
  inpDesc.className = 'campo-textarea';
  inpDesc.placeholder = 'Descreve o problema...';
  inpDesc.rows = 3;
  gDesc.appendChild(lDesc);
  gDesc.appendChild(inpDesc);
  form.appendChild(gDesc);

  // urgência
  var gUrg = document.createElement('div');
  gUrg.className = 'campo-group';
  var lUrg = document.createElement('label');
  lUrg.className = 'campo-label';
  lUrg.textContent = 'Urgência';
  var selUrg = document.createElement('select');
  selUrg.className = 'campo-select';
  var urgencias = ['Baixo', 'Médio', 'Urgente'];
  for (var ui = 0; ui < urgencias.length; ui++) {
    var op = document.createElement('option');
    op.value = urgencias[ui].toLowerCase();
    op.textContent = urgencias[ui];
    selUrg.appendChild(op);
  }
  gUrg.appendChild(lUrg);
  gUrg.appendChild(selUrg);
  form.appendChild(gUrg);

  var inpObs = document.createElement('textarea');
  var gObs = document.createElement('div');
  gObs.className = 'campo-group';
  var lObs = document.createElement('label');
  lObs.className = 'campo-label';
  lObs.textContent = 'Observações';
  inpObs.className = 'campo-textarea';
  inpObs.placeholder = 'Informação adicional...';
  inpObs.rows = 2;
  gObs.appendChild(lObs);
  gObs.appendChild(inpObs);
  form.appendChild(gObs);

  var bts = document.createElement('div');
  bts.style.cssText = 'display:flex;gap:8px;margin-top:10px;';

  var btnC = document.createElement('button');
  btnC.className = 'btn-sm btn-cinza';
  btnC.style.flex = '1';
  btnC.textContent = 'Cancelar';
  btnC.onclick = function() { corpo.removeChild(form); };

  var btnG = document.createElement('button');
  btnG.className = 'btn-sm btn-verde';
  btnG.style.flex = '1';
  btnG.textContent = 'Enviar Pedido';
  btnG.onclick = function() {
    var descricao = inpDesc.value.trim();
    if (!descricao) { alert('Descreve o problema.'); return; }
    btnG.textContent = 'A enviar...';
    btnG.disabled = true;
    var hoje = dataISO(new Date());
    sbPost('memorandos_reparacao', {
      equipamento_id: eq.id,
      utilizador_id: app.utilizador.id,
      descricao: descricao,
      urgencia: selUrg.value,
      observacoes: inpObs.value.trim() || null,
      estado: 'pendente',
      data: hoje
    }).then(function(res) {
      corpo.removeChild(form);
      if (res && res.length) {
        var novoCard = criarCardReparacao(res[0]);
        if (listaDiv.firstChild && listaDiv.firstChild.className === 'vazio') {
          listaDiv.innerHTML = '';
        }
        if (listaDiv.firstChild) {
          listaDiv.insertBefore(novoCard, listaDiv.firstChild);
        } else {
          listaDiv.appendChild(novoCard);
        }
      }
    }).catch(function() {
      btnG.textContent = 'Erro';
      btnG.disabled = false;
    });
  };

  bts.appendChild(btnC);
  bts.appendChild(btnG);
  form.appendChild(bts);

  corpo.insertBefore(form, listaDiv);
}

// ── MÓDULO: DDS ───────────────────────────────────────────────────────────────
function renderAreaDDS() {
  var area = document.getElementById('area-eq');
  area.innerHTML = '';

  var load = document.createElement('div');
  load.className = 'vazio';
  load.textContent = 'A carregar...';
  area.appendChild(load);

  sbGet('memorandos_dds', 'select=*,equipamentos(nome)&order=data.desc')
    .then(function(memos) {
      area.removeChild(load);

      // botão novo
      var btnNovo = document.createElement('button');
      btnNovo.className = 'btn-sm btn-verde';
      btnNovo.style.cssText = 'width:100%;padding:13px;font-size:15px;margin-bottom:16px;';
      btnNovo.textContent = '+ Novo Memorando DDS';
      btnNovo.onclick = function() { abrirFormDDS(area, listaDiv); };
      area.appendChild(btnNovo);

      var listaDiv = document.createElement('div');
      area.appendChild(listaDiv);

      if (!memos || !memos.length) {
        var sem = document.createElement('div');
        sem.className = 'vazio';
        sem.textContent = 'Sem memorandos registados.';
        listaDiv.appendChild(sem);
        return;
      }

      for (var i = 0; i < memos.length; i++) {
        listaDiv.appendChild(criarCardDDS(memos[i]));
      }
    })
    .catch(function(e) {
      load.textContent = 'Erro ao carregar memorandos.';
    });
}

function criarCardDDS(memo) {
  var card = document.createElement('div');
  card.className = 'modulo-card';
  card.style.marginBottom = '10px';

  var cab = document.createElement('div');
  cab.style.cssText = 'padding:12px 14px;';

  var topo = document.createElement('div');
  topo.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;';

  var esq = document.createElement('div');
  var num = document.createElement('div');
  num.style.cssText = 'font-size:13px;font-weight:700;color:var(--cinza-medio);';
  num.textContent = memo.numero ? 'N.º ' + memo.numero : 'S/N';
  var dataDiv = document.createElement('div');
  dataDiv.style.cssText = 'font-size:12px;color:var(--cinza-medio);margin-top:2px;';
  dataDiv.textContent = memo.data || '—';
  esq.appendChild(num);
  esq.appendChild(dataDiv);

  var estadoClass = 'tag-amarelo';
  if (memo.estado === 'reforco_pedido') estadoClass = 'tag-azul';
  if (memo.estado === 'concluido') estadoClass = 'tag-verde';
  var estadoTag = document.createElement('span');
  estadoTag.className = 'tag ' + estadoClass;
  var estadoTextos = { 'pendente': 'Pendente', 'reforco_pedido': 'Reforço Pedido', 'concluido': 'Concluído' };
  estadoTag.textContent = estadoTextos[memo.estado] || memo.estado;

  topo.appendChild(esq);
  topo.appendChild(estadoTag);
  cab.appendChild(topo);

  var desc = document.createElement('div');
  desc.style.cssText = 'font-size:14px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:8px;';
  desc.textContent = memo.descricao || '—';
  cab.appendChild(desc);

  var rodape = document.createElement('div');
  rodape.style.cssText = 'display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;';

  if (memo.brigada) {
    var brigDiv = document.createElement('div');
    brigDiv.style.cssText = 'font-size:12px;color:var(--cinza-medio);';
    brigDiv.textContent = 'Brigada: ' + memo.brigada;
    rodape.appendChild(brigDiv);
  }

  if (memo.equipamentos && memo.equipamentos.nome) {
    var eqDiv = document.createElement('div');
    eqDiv.style.cssText = 'font-size:12px;color:var(--cinza-medio);';
    eqDiv.textContent = memo.equipamentos.nome;
    rodape.appendChild(eqDiv);
  }

  if (memo.estado !== 'concluido') {
    var dataRef = memo.data ? new Date(memo.data) : new Date(memo.created_at);
    var dias = diasEntre(dataRef, new Date());
    if (dias > 0) {
      var diasDiv = document.createElement('div');
      diasDiv.style.cssText = 'font-size:11px;font-weight:700;color:var(--amarelo);';
      diasDiv.textContent = dias + (dias === 1 ? ' dia' : ' dias');
      rodape.appendChild(diasDiv);
    }
  } else if (memo.data_conclusao) {
    var concDiv = document.createElement('div');
    concDiv.style.cssText = 'font-size:12px;color:var(--verde);';
    concDiv.textContent = 'Concluído em ' + memo.data_conclusao;
    rodape.appendChild(concDiv);
  }

  cab.appendChild(rodape);

  if (memo.observacoes) {
    var obs = document.createElement('div');
    obs.style.cssText = 'font-size:12px;color:var(--cinza);margin-top:8px;font-style:italic;';
    obs.textContent = memo.observacoes;
    cab.appendChild(obs);
  }

  card.appendChild(cab);
  return card;
}

function abrirFormDDS(area, listaDiv) {
  var form = document.createElement('div');
  form.style.cssText = 'background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);padding:16px;margin-bottom:16px;';

  var fTit = document.createElement('div');
  fTit.style.cssText = 'font-size:15px;font-weight:700;margin-bottom:14px;color:var(--cinza-escuro);';
  fTit.textContent = 'Novo Memorando DDS';
  form.appendChild(fTit);

  function campo(labelTxt, placeholder, tipo) {
    var g = document.createElement('div');
    g.className = 'campo-group';
    var l = document.createElement('label');
    l.className = 'campo-label';
    l.textContent = labelTxt;
    var inp = document.createElement('input');
    inp.type = tipo || 'text';
    inp.className = 'campo-input';
    inp.style.cssText = 'font-size:14px;padding:10px 12px;text-transform:none;letter-spacing:0;';
    inp.placeholder = placeholder;
    g.appendChild(l);
    g.appendChild(inp);
    form.appendChild(g);
    return inp;
  }

  var inpNum = campo('Número', 'Ex: 001/2026', 'text');
  var inpData = campo('Data', '', 'date');
  inpData.value = dataISO(new Date());

  var gDesc = document.createElement('div');
  gDesc.className = 'campo-group';
  var lDesc = document.createElement('label');
  lDesc.className = 'campo-label';
  lDesc.textContent = 'Descrição do pedido';
  var inpDesc = document.createElement('textarea');
  inpDesc.className = 'campo-textarea';
  inpDesc.placeholder = 'Descreve o pedido...';
  inpDesc.rows = 3;
  gDesc.appendChild(lDesc);
  gDesc.appendChild(inpDesc);
  form.appendChild(gDesc);

  var inpBrigada = campo('Brigada', 'Ex: Brigada de Manutenção');

  var gEq = document.createElement('div');
  gEq.className = 'campo-group';
  var lEq = document.createElement('label');
  lEq.className = 'campo-label';
  lEq.textContent = 'Equipamento (opcional)';
  var selEq = document.createElement('select');
  selEq.className = 'campo-select';
  var opVazio = document.createElement('option');
  opVazio.value = '';
  opVazio.textContent = '— Geral —';
  selEq.appendChild(opVazio);
  for (var ei = 0; ei < app.equipamentos.length; ei++) {
    var opE = document.createElement('option');
    opE.value = app.equipamentos[ei].id;
    opE.textContent = app.equipamentos[ei].nome;
    selEq.appendChild(opE);
  }
  gEq.appendChild(lEq);
  gEq.appendChild(selEq);
  form.appendChild(gEq);

  var gObs = document.createElement('div');
  gObs.className = 'campo-group';
  var lObs = document.createElement('label');
  lObs.className = 'campo-label';
  lObs.textContent = 'Observações';
  var inpObs = document.createElement('textarea');
  inpObs.className = 'campo-textarea';
  inpObs.placeholder = 'Notas adicionais...';
  inpObs.rows = 2;
  gObs.appendChild(lObs);
  gObs.appendChild(inpObs);
  form.appendChild(gObs);

  var bts = document.createElement('div');
  bts.style.cssText = 'display:flex;gap:8px;margin-top:12px;';

  var btnC = document.createElement('button');
  btnC.className = 'btn-sm btn-cinza';
  btnC.style.flex = '1';
  btnC.textContent = 'Cancelar';
  btnC.onclick = function() { area.removeChild(form); };

  var btnG = document.createElement('button');
  btnG.className = 'btn-sm btn-verde';
  btnG.style.flex = '1';
  btnG.textContent = 'Guardar';
  btnG.onclick = function() {
    var descricao = inpDesc.value.trim();
    if (!descricao) { alert('Introduz a descrição.'); return; }
    btnG.textContent = 'A guardar...';
    btnG.disabled = true;
    sbPost('memorandos_dds', {
      numero: inpNum.value.trim() || null,
      data: inpData.value || dataISO(new Date()),
      descricao: descricao,
      brigada: inpBrigada.value.trim() || null,
      equipamento_id: selEq.value || null,
      observacoes: inpObs.value.trim() || null,
      estado: 'pendente',
      aprovado_dds: false,
      criado_por: app.utilizador.id
    }).then(function(res) {
      area.removeChild(form);
      if (res && res.length) {
        var novo = criarCardDDS(res[0]);
        if (listaDiv.firstChild && listaDiv.firstChild.className === 'vazio') {
          listaDiv.innerHTML = '';
        }
        if (listaDiv.firstChild) {
          listaDiv.insertBefore(novo, listaDiv.firstChild);
        } else {
          listaDiv.appendChild(novo);
        }
      }
    }).catch(function() {
      btnG.textContent = 'Erro';
      btnG.disabled = false;
    });
  };

  bts.appendChild(btnC);
  bts.appendChild(btnG);
  form.appendChild(bts);

  area.insertBefore(form, area.firstChild);
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function fazerLogin() {
  var inp = document.getElementById('inp-codigo');
  var erro = document.getElementById('login-erro');
  var codigo = inp.value.trim().toUpperCase();
  erro.textContent = '';
  if (!codigo) { erro.textContent = 'Introduz o teu código de acesso.'; return; }
  log('login: ' + codigo);
  sbGet('utilizadores', 'codigo_visivel=eq.' + encodeURIComponent(codigo) + '&select=*')
    .then(function(dados) {
      if (!dados || !dados.length) { erro.textContent = 'Código inválido.'; return; }
      var u = dados[0];
      if (!u.ativo) { erro.textContent = 'Conta inactiva. Contacta o administrador.'; return; }
      guardarSessao(u.id);
      app.utilizador = u;
      return carregarEquipamentos();
    })
    .catch(function(e) { erro.textContent = 'Erro de ligação. Verifica a rede.'; log('erro login: ' + e); });
}

function fazerSair() {
  limparSessao();
  app.utilizador = null;
  app.equipamentos = [];
  app.eqAtivo = null;
  fecharMenu();
  mostrarEcra('login');
  var inp = document.getElementById('inp-codigo');
  if (inp) inp.value = '';
}

document.getElementById('inp-codigo').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.keyCode === 13) fazerLogin();
});

// ── ARRANCAR ──────────────────────────────────────────────────────────────────
iniciar();
