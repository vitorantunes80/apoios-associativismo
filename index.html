<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GestEq</title>
<style>
:root {
  --verde:#2d6a4f;--verde2:#40916c;--verde-claro:#52b788;--verde-pale:#d8f3dc;
  --azul-menu:#1a2744;--azul-menu2:#243357;--azul-menu-ativo:#2e4278;
  --azul-menu-titulo:#8899bb;--cinza-escuro:#1a1a1a;--cinza:#444;
  --cinza-medio:#888;--cinza-claro:#e8e8e8;--fundo:#f4f6f4;--branco:#fff;
  --vermelho:#c0392b;--vermelho-pale:#fdecea;--amarelo:#e67e22;--amarelo-pale:#fef3e2;
  --azul:#2471a3;--azul-pale:#eaf4fb;
  --sombra:0 2px 10px rgba(0,0,0,0.09);--sombra-forte:0 4px 24px rgba(0,0,0,0.22);
  --radius:12px;--radius-sm:8px;
  --fonte:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --topo-h:54px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);font-size:15px;overflow-x:hidden;}
button{font-family:var(--fonte);cursor:pointer;-webkit-appearance:none;}
#diag{position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;font-family:monospace;font-size:11px;padding:6px 10px;max-height:100px;overflow-y:auto;z-index:9999;display:none;}
#topo{position:fixed;top:0;left:0;right:0;height:var(--topo-h);background:var(--azul-menu);display:flex;align-items:center;padding:0 14px;gap:12px;z-index:150;box-shadow:var(--sombra);}
#btn-menu{background:none;border:none;color:#fff;font-size:22px;padding:4px 6px;line-height:1;flex-shrink:0;}
#topo-info{flex:1;min-width:0;}
#topo-eq-nome{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#topo-eq-tipo{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px;}
#btn-sair{background:rgba(255,255,255,0.12);border:none;color:#fff;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;flex-shrink:0;}
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background 0.25s;}
#menu-overlay.visivel{background:rgba(0,0,0,0.5);pointer-events:all;}
#menu-lateral{position:fixed;top:0;left:0;bottom:0;width:286px;background:var(--azul-menu);z-index:201;transform:translateX(-100%);transition:transform 0.27s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden;}
#menu-lateral.aberto{transform:translateX(0);}
#menu-topo{padding:20px 16px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
#menu-logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
#menu-logo-sub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;letter-spacing:0.3px;}
#menu-util{margin-top:14px;background:rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
#menu-util-avatar{width:34px;height:34px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
#menu-util-nome{font-size:13px;font-weight:600;color:#fff;}
#menu-util-perfil{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;text-transform:capitalize;}
#menu-corpo{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 24px;}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:3px solid transparent;}
.menu-item:active{background:rgba(255,255,255,0.06);}
.menu-item.ativo{background:var(--azul-menu-ativo);border-left-color:var(--verde-claro);}
.menu-item-icone{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.menu-item-nome{font-size:13px;color:rgba(255,255,255,0.82);line-height:1.3;}
.menu-item.ativo .menu-item-nome{color:#fff;font-weight:600;}
.menu-grupo-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 14px;cursor:pointer;border:none;background:none;width:100%;}
.menu-grupo-header:active{background:rgba(255,255,255,0.04);}
.menu-grupo-header-esq{display:flex;align-items:center;gap:8px;}
.menu-grupo-icone{font-size:16px;width:22px;text-align:center;}
.menu-grupo-nome{font-size:11px;font-weight:700;color:var(--azul-menu-titulo);text-transform:uppercase;letter-spacing:0.8px;}
.menu-grupo-seta{font-size:10px;color:var(--azul-menu-titulo);transition:transform 0.2s;}
.menu-grupo-seta.aberto{transform:rotate(180deg);}
.menu-grupo-filhos{display:none;}
.menu-grupo-filhos.aberto{display:block;}
.menu-filho{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 36px;border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:3px solid transparent;}
.menu-filho:active{background:rgba(255,255,255,0.06);}
.menu-filho.ativo{background:var(--azul-menu-ativo);border-left-color:var(--verde-claro);}
.menu-filho-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;}
.menu-filho.ativo .menu-filho-dot{background:var(--verde-claro);}
.menu-filho-nome{font-size:13px;color:rgba(255,255,255,0.75);}
.menu-filho.ativo .menu-filho-nome{color:#fff;font-weight:600;}
.menu-sep{height:1px;background:rgba(255,255,255,0.07);margin:6px 16px;}
#conteudo{padding-top:var(--topo-h);min-height:100vh;}
#area-eq{padding:14px;padding-bottom:40px;}
#ecra-carregar{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--cinza-claro);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ecra-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--azul-menu);}
.login-card{background:var(--branco);border-radius:16px;box-shadow:var(--sombra-forte);padding:32px 24px;width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-nome{font-size:32px;font-weight:800;color:var(--azul-menu);letter-spacing:-0.5px;}
.login-logo-sub{font-size:11px;color:var(--cinza-medio);margin-top:4px;}
.campo-label{display:block;font-size:11px;font-weight:700;color:var(--cinza);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.campo-input{width:100%;padding:13px 14px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:17px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);outline:none;-webkit-appearance:none;text-transform:uppercase;letter-spacing:2px;}
.campo-input:focus{border-color:var(--verde-claro);}
.btn-primario{width:100%;background:var(--azul-menu);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;margin-top:18px;}
.erro-msg{color:var(--vermelho);font-size:13px;text-align:center;margin-top:12px;min-height:18px;}
/* DASHBOARD */
.dash-saudacao{background:var(--azul-menu);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;}
.dash-saud-hora{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px;}
.dash-saud-nome{font-size:20px;font-weight:800;color:#fff;}
.dash-saud-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px;}
.dash-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dash-card{background:var(--branco);border-radius:var(--radius);padding:14px;box-shadow:var(--sombra);cursor:pointer;}
.dash-card-val{font-size:28px;font-weight:800;color:var(--azul-menu);line-height:1;}
.dash-card-label{font-size:12px;color:var(--cinza-medio);margin-top:5px;line-height:1.3;}
.dash-card-icone{font-size:22px;margin-bottom:8px;}
.dash-card.alerta .dash-card-val{color:var(--vermelho);}
.dash-card.aviso .dash-card-val{color:var(--amarelo);}
.dash-card.ok .dash-card-val{color:var(--verde);}
.dash-secao-titulo{font-size:13px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;margin-top:6px;}
.dash-acesso-rapido{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dash-btn-eq{background:var(--branco);border-radius:var(--radius);padding:12px;box-shadow:var(--sombra);border:none;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;}
.dash-btn-eq:active{background:var(--fundo);}
.dash-btn-eq-icone{font-size:20px;flex-shrink:0;}
.dash-btn-eq-nome{font-size:12px;font-weight:600;color:var(--cinza-escuro);line-height:1.3;}
.dash-btn-eq-tipo{font-size:10px;color:var(--cinza-medio);margin-top:2px;}
.dash-alerta-item{background:var(--branco);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:7px;box-shadow:var(--sombra);display:flex;align-items:center;gap:10px;}
.dash-alerta-icone{font-size:18px;flex-shrink:0;}
.dash-alerta-txt{font-size:13px;color:var(--cinza-escuro);flex:1;line-height:1.3;}
.dash-alerta-sub{font-size:11px;color:var(--cinza-medio);margin-top:2px;}
.dash-alerta-item.urgente{border-left:3px solid var(--vermelho);}
.dash-alerta-item.aviso{border-left:3px solid var(--amarelo);}
.dash-alerta-item.info{border-left:3px solid var(--azul);}
.dash-reserva-item{background:var(--verde-pale);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.dash-reserva-nome{font-size:13px;font-weight:600;color:var(--cinza-escuro);}
.dash-reserva-hora{font-size:12px;color:var(--verde);font-weight:700;}
.dash-reserva-eq{font-size:11px;color:var(--cinza-medio);margin-top:2px;}
/* MÓDULOS */
.resp-card{background:var(--branco);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra);}
.resp-label{font-size:10px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.4px;}
.resp-nome{font-size:15px;font-weight:700;color:var(--cinza-escuro);margin-top:2px;}
.modulo-card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;}
.modulo-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.modulo-header-esq{display:flex;align-items:center;gap:10px;}
.modulo-icone{width:36px;height:36px;border-radius:9px;background:var(--fundo);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.modulo-nome{font-size:15px;font-weight:600;color:var(--cinza-escuro);}
.modulo-seta{font-size:12px;color:var(--cinza-medio);transition:transform 0.2s;flex-shrink:0;}
.modulo-seta.aberto{transform:rotate(180deg);}
.modulo-corpo{display:none;border-top:1.5px solid var(--cinza-claro);padding:14px;}
.modulo-corpo.aberto{display:block;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.subtabs::-webkit-scrollbar{display:none;}
.subtab-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:none;background:var(--cinza-claro);color:var(--cinza);white-space:nowrap;flex-shrink:0;}
.subtab-btn.ativo{background:var(--azul-menu);color:#fff;}
.escala-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.escala-sem-label{font-size:13px;font-weight:600;color:var(--cinza-escuro);}
.btn-nav{background:var(--cinza-claro);border:none;border-radius:7px;padding:7px 12px;font-size:13px;color:var(--cinza-escuro);font-weight:600;}
.escala-dia{background:var(--fundo);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.escala-dia-titulo{font-size:11px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.escala-turno{display:flex;justify-content:space-between;align-items:center;background:var(--branco);border-radius:7px;padding:8px 10px;margin-bottom:4px;}
.escala-turno-nome{font-size:13px;font-weight:500;}
.escala-turno-hora{font-size:12px;color:var(--cinza-medio);}
.escala-sem-turno{font-size:12px;color:var(--cinza-medio);text-align:center;padding:6px;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cinza-claro);}
.check-item:last-child{border-bottom:none;}
.check-box{width:24px;height:24px;border:2px solid var(--cinza-claro);border-radius:6px;background:var(--branco);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.check-box.marcado{background:var(--verde);border-color:var(--verde);color:#fff;}
.check-texto{font-size:14px;color:var(--cinza-escuro);flex:1;line-height:1.3;}
.agua-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.agua-row-label{flex:1;}
.agua-row-label-nome{font-size:13px;font-weight:600;}
.agua-row-label-range{font-size:11px;color:var(--cinza-medio);margin-top:1px;}
.agua-inp{width:90px;flex:none;padding:10px 12px;border:1.5px solid var(--cinza-claro);border-radius:8px;font-size:15px;font-family:var(--fonte);background:var(--fundo);-webkit-appearance:none;outline:none;text-align:center;}
.agua-inp:focus{border-color:var(--verde-claro);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-mes{font-size:15px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.cal-cab{text-align:center;font-size:10px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;padding:4px 0;}
.cal-dia{text-align:center;padding:8px 2px;border-radius:7px;font-size:14px;cursor:pointer;}
.cal-dia.vazio{pointer-events:none;}
.cal-dia.hoje{background:var(--azul-menu);color:#fff;font-weight:700;}
.cal-dia.tem-res{background:#2d6a4f;color:#fff;font-weight:700;}
.cal-dia:active{background:var(--cinza-claro);}
.dds-seccao{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;}
.dds-seccao-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.dds-seccao-nome{font-size:14px;font-weight:700;color:var(--cinza-escuro);flex:1;}
.dds-badge{background:var(--azul-menu);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 9px;margin-right:8px;}
.dds-seccao-corpo{display:none;border-top:1.5px solid var(--cinza-claro);padding:12px;}
.dds-seccao-corpo.aberto{display:block;}
.dds-card{background:var(--fundo);border-radius:9px;padding:12px;margin-bottom:8px;}
.dds-card-topo{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.dds-num{font-size:12px;font-weight:700;color:var(--cinza-medio);}
.dds-data{font-size:12px;color:var(--cinza-medio);}
.dds-desc{font-size:14px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:7px;}
.dds-rodape{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.dds-brigada{font-size:12px;color:var(--cinza-medio);}
.dds-dias{font-size:11px;font-weight:700;color:var(--amarelo);}
.dds-eq{font-size:11px;color:var(--cinza-medio);}
.memo-card{background:var(--fundo);border-radius:9px;padding:11px;margin-bottom:7px;}
.memo-topo{display:flex;justify-content:space-between;margin-bottom:5px;}
.memo-data-txt{font-size:12px;color:var(--cinza-medio);}
.memo-desc{font-size:13px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:5px;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px;}
.tag-verde{background:var(--verde-pale);color:var(--verde);}
.tag-cinza{background:var(--cinza-claro);color:var(--cinza);}
.tag-vermelho{background:var(--vermelho-pale);color:var(--vermelho);}
.tag-amarelo{background:var(--amarelo-pale);color:var(--amarelo);}
.tag-azul{background:var(--azul-pale);color:var(--azul);}
.btn-sm{display:inline-block;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;}
.btn-verde{background:var(--verde);color:#fff;}
.btn-azul{background:var(--azul-menu);color:#fff;}
.btn-cinza{background:var(--cinza-claro);color:var(--cinza-escuro);}
.btn-vermelho{background:var(--vermelho);color:#fff;}
.btn-bloco{width:100%;padding:12px;font-size:14px;}
.vazio{text-align:center;padding:24px 16px;color:var(--cinza-medio);font-size:14px;}
hr.sep{border:none;border-top:1.5px solid var(--cinza-claro);margin:12px 0;}
.campo-group{margin-bottom:12px;}
.campo-textarea{width:100%;padding:11px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;resize:vertical;min-height:72px;}
.campo-textarea:focus{border-color:var(--verde-claro);}
.campo-select{width:100%;padding:12px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;}
.campo-select:focus{border-color:var(--verde-claro);}
.campo-input-sm{width:100%;padding:11px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;}
.campo-input-sm:focus{border-color:var(--verde-claro);}
.form-card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);padding:14px;margin-bottom:12px;}
.form-titulo{font-size:14px;font-weight:700;color:var(--cinza-escuro);margin-bottom:12px;}
.row-btns{display:flex;gap:8px;margin-top:10px;}
.row-btns button{flex:1;}
.erro-inline{background:var(--vermelho-pale);color:var(--vermelho);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;}
</style>
</head>
<body>
<div id="diag"></div>
<div id="topo" style="display:none">
  <button id="btn-menu" onclick="abrirMenu()">&#9776;</button>
  <div id="topo-info">
    <div id="topo-eq-nome">GestEq</div>
    <div id="topo-eq-tipo">Cabeceiras de Basto</div>
  </div>
  <button id="btn-sair" onclick="fazerSair()">Sair</button>
</div>
<div id="menu-overlay" onclick="fecharMenu()"></div>
<div id="menu-lateral">
  <div id="menu-topo">
    <div id="menu-logo">GestEq</div>
    <div id="menu-logo-sub">GESTAO DE EQUIPAMENTOS - CABECEIRAS DE BASTO</div>
    <div id="menu-util">
      <div id="menu-util-avatar">?</div>
      <div><div id="menu-util-nome">-</div><div id="menu-util-perfil">-</div></div>
    </div>
  </div>
  <div id="menu-corpo"></div>
</div>
<div id="conteudo">
  <div id="ecra-carregar"><div class="spinner"></div><div style="color:var(--cinza-medio);font-size:14px">A carregar...</div></div>
  <div id="ecra-login">
    <div class="login-card">
      <div class="login-logo"><div class="login-logo-nome">GestEq</div><div class="login-logo-sub">Gestao de Equipamentos - Cabeceiras de Basto</div></div>
      <label class="campo-label" for="inp-codigo">Codigo de acesso</label>
      <input class="campo-input" id="inp-codigo" type="text" placeholder="XX-0000" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      <button class="btn-primario" onclick="fazerLogin()">Entrar</button>
      <div class="erro-msg" id="login-erro"></div>
    </div>

    {id:'aenviar',label:'A Enviar para os Servicos',filtro:function(m){return m.estado==='reforco_pedido'&&m.aprovado_dds;}},
    {id:'emcurso',label:'Enviados / Em Curso',filtro:function(m){return m.estado==='pendente'&&m.aprovado_dds;}},
    {id:'arquivo',label:'Arquivo',filtro:function(m){return m.estado==='concluido';}}
  ];
  var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';area.appendChild(load);
  sbGet('memorandos_dds','select=*,equipamentos(nome)&order=data.desc').then(function(todos){
    area.removeChild(load);
    if(!todos||todos.error){var err=document.createElement('div');err.className='erro-inline';err.textContent='Erro: '+JSON.stringify(todos);area.appendChild(err);return;}
    for(var s=0;s<seccoes.length;s++){(function(sec){var filtrados=[];for(var i=0;i<todos.length;i++)if(sec.filtro(todos[i]))filtrados.push(todos[i]);area.appendChild(criarSeccaoDDS(sec.id,sec.label,filtrados));})(seccoes[s]);}
  }).catch(function(){load.textContent='Erro.';});
}
function criarSeccaoDDS(id,label,memos){
  var sec=document.createElement('div');sec.className='dds-seccao';var hdr=document.createElement('div');hdr.className='dds-seccao-header';var nm=document.createElement('div');nm.className='dds-seccao-nome';nm.textContent=label;var badge=document.createElement('span');badge.className='dds-badge';badge.textContent=memos.length;var seta=document.createElement('div');seta.className='modulo-seta';seta.textContent='v';hdr.appendChild(nm);hdr.appendChild(badge);hdr.appendChild(seta);var corpo=document.createElement('div');corpo.className='dds-seccao-corpo';hdr.onclick=function(){var ab=corpo.classList.contains('aberto');if(ab){corpo.classList.remove('aberto');seta.classList.remove('aberto');}else{corpo.classList.add('aberto');seta.classList.add('aberto');}};if(!memos.length){var sem=document.createElement('div');sem.className='vazio';sem.style.padding='12px';sem.textContent='Sem memorandos.';corpo.appendChild(sem);}else{for(var i=0;i<memos.length;i++)corpo.appendChild(criarCardDDS(memos[i]));}sec.appendChild(hdr);sec.appendChild(corpo);return sec;
}
function criarCardDDS(memo){
  var card=document.createElement('div');card.className='dds-card';var topo=document.createElement('div');topo.className='dds-card-topo';var esq=document.createElement('div');var num=document.createElement('div');num.className='dds-num';num.textContent=memo.numero?'N. '+memo.numero:'-';var dat=document.createElement('div');dat.className='dds-data';dat.textContent=memo.data||'-';esq.appendChild(num);esq.appendChild(dat);var ec='tag-amarelo';if(memo.estado==='reforco_pedido')ec='tag-azul';if(memo.estado==='concluido')ec='tag-verde';var est=document.createElement('span');est.className='tag '+ec;var eTxts={'pendente':'Pendente','reforco_pedido':'Reforco','concluido':'Concluido'};est.textContent=eTxts[memo.estado]||memo.estado;topo.appendChild(esq);topo.appendChild(est);card.appendChild(topo);
  var desc=document.createElement('div');desc.className='dds-desc';desc.textContent=memo.descricao||'-';card.appendChild(desc);
  var rod=document.createElement('div');rod.className='dds-rodape';if(memo.brigada){var b=document.createElement('div');b.className='dds-brigada';b.textContent='Brigada: '+memo.brigada;rod.appendChild(b);}if(memo.equipamentos&&memo.equipamentos.nome){var en=document.createElement('div');en.className='dds-eq';en.textContent=memo.equipamentos.nome;rod.appendChild(en);}if(memo.estado!=='concluido'){var dr=memo.data?new Date(memo.data):(memo.created_at?new Date(memo.created_at):new Date());var dias=diasEntre(dr,new Date());if(dias>0){var dd=document.createElement('div');dd.className='dds-dias';dd.textContent=dias+(dias===1?' dia':' dias');rod.appendChild(dd);}}else if(memo.data_conclusao){var dc=document.createElement('div');dc.style.cssText='font-size:12px;color:var(--verde);';dc.textContent='Concluido: '+memo.data_conclusao;rod.appendChild(dc);}card.appendChild(rod);
  if(memo.observacoes){var obs2=document.createElement('div');obs2.style.cssText='font-size:12px;color:var(--cinza);margin-top:7px;font-style:italic;';obs2.textContent=memo.observacoes;card.appendChild(obs2);}return card;
}
function abrirFormDDS(area){
  var form=document.createElement('div');form.className='form-card';var ft=document.createElement('div');ft.className='form-titulo';ft.textContent='Novo Memorando DDS';form.appendChild(ft);
  var numEl=document.createElement('div');numEl.style.cssText='font-size:12px;color:var(--cinza-medio);margin-bottom:12px;background:var(--fundo);padding:8px 10px;border-radius:6px;';numEl.textContent='A gerar numero...';form.appendChild(numEl);
  function cSm2(lbl,ph,tipo){var g=document.createElement('div');g.className='campo-group';var l=document.createElement('label');l.className='campo-label';l.textContent=lbl;var i=document.createElement('input');i.type=tipo||'text';i.className='campo-input-sm';i.placeholder=ph;g.appendChild(l);g.appendChild(i);form.appendChild(g);return i;}
  var inpDat=cSm2('Data','','date');inpDat.value=dataISO(new Date());
  var gDesc=document.createElement('div');gDesc.className='campo-group';var lDesc=document.createElement('label');lDesc.className='campo-label';lDesc.textContent='Descricao';var desc=document.createElement('textarea');desc.className='campo-textarea';desc.rows=3;desc.placeholder='Descreve o pedido...';gDesc.appendChild(lDesc);gDesc.appendChild(desc);form.appendChild(gDesc);
  var inpBrig=cSm2('Brigada','Ex: Brigada de Manutencao');
  var gEq=document.createElement('div');gEq.className='campo-group';var lEq=document.createElement('label');lEq.className='campo-label';lEq.textContent='Equipamento (opcional)';var selEq=document.createElement('select');selEq.className='campo-select';var opV=document.createElement('option');opV.value='';opV.textContent='- Geral -';selEq.appendChild(opV);for(var ei=0;ei<app.equipamentos.length;ei++){var opE=document.createElement('option');opE.value=app.equipamentos[ei].id;opE.textContent=app.equipamentos[ei].nome;selEq.appendChild(opE);}gEq.appendChild(lEq);gEq.appendChild(selEq);form.appendChild(gEq);
  var gObs=document.createElement('div');gObs.className='campo-group';var lObs=document.createElement('label');lObs.className='campo-label';lObs.textContent='Observacoes';var obs=document.createElement('textarea');obs.className='campo-textarea';obs.rows=2;obs.placeholder='Notas...';gObs.appendChild(lObs);gObs.appendChild(obs);form.appendChild(gObs);
  var bts=document.createElement('div');bts.className='row-btns';var bc=document.createElement('button');bc.className='btn-sm btn-cinza';bc.textContent='Cancelar';bc.onclick=function(){area.removeChild(form);};
  var bg=document.createElement('button');bg.className='btn-sm btn-azul';bg.textContent='Guardar';
  bg.onclick=function(){if(!desc.value.trim()){alert('Introduz a descricao.');return;}bg.textContent='...';bg.disabled=true;gerarNumeroMemo().then(function(numero){return sbPost('memorandos_dds',{numero:numero,data:inpDat.value||dataISO(new Date()),descricao:desc.value.trim(),brigada:inpBrig.value.trim()||null,equipamento_id:selEq.value||null,observacoes:obs.value.trim()||null,estado:'pendente',aprovado_dds:false,criado_por:app.utilizador.id,criado_por_dds:true});}).then(function(){area.removeChild(form);renderDDS();}).catch(function(){bg.textContent='Erro';bg.disabled=false;});};
  bts.appendChild(bc);bts.appendChild(bg);form.appendChild(bts);area.insertBefore(form,area.firstChild);
  gerarNumeroMemo().then(function(n){numEl.textContent='Numero automatico: '+n;}).catch(function(){});
}
function renderPainelChecklists(){
  var area=document.getElementById('area-eq');area.innerHTML='';var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';area.appendChild(load);
  sbGet('checklists_registo','select=*,utilizadores(nome),equipamentos(nome),checklist_itens(descricao)&order=data_registo.desc&limit=50').then(function(regs){
    area.removeChild(load);if(!regs||!regs.length){var sem=document.createElement('div');sem.className='vazio';sem.textContent='Sem checklists registadas.';area.appendChild(sem);return;}
    var grupos=[];var mapa={};for(var i=0;i<regs.length;i++){var r=regs[i];var key=(r.equipamento_id||'')+'|'+(r.data_registo?r.data_registo.substring(0,10):'')+'|'+(r.momento||'')+'|'+(r.utilizador_id||'');if(!mapa[key]){mapa[key]={eqNome:r.equipamentos?r.equipamentos.nome:'-',utilNome:r.utilizadores?r.utilizadores.nome:'-',momento:r.momento||'-',data:r.data_registo?r.data_registo.substring(0,10):'-',itens:[]};grupos.push(mapa[key]);}mapa[key].itens.push(r);}
    for(var g=0;g<grupos.length;g++){(function(grp){var card=document.createElement('div');card.className='modulo-card';card.style.marginBottom='8px';var hdr=document.createElement('div');hdr.className='modulo-header';var esq=document.createElement('div');esq.className='modulo-header-esq';var ic=document.createElement('div');ic.className='modulo-icone';ic.textContent='OK';var info=document.createElement('div');var nm=document.createElement('div');nm.className='modulo-nome';nm.textContent=grp.eqNome;var sub=document.createElement('div');sub.style.cssText='font-size:12px;color:var(--cinza-medio);margin-top:2px;';sub.textContent=grp.utilNome+' - '+grp.momento+' - '+grp.data;info.appendChild(nm);info.appendChild(sub);esq.appendChild(ic);esq.appendChild(info);var seta=document.createElement('div');seta.className='modulo-seta';seta.textContent='v';hdr.appendChild(esq);hdr.appendChild(seta);var corpo=document.createElement('div');corpo.className='modulo-corpo';hdr.onclick=function(){var ab=corpo.classList.contains('aberto');if(ab){corpo.classList.remove('aberto');seta.classList.remove('aberto');}else{corpo.classList.add('aberto');seta.classList.add('aberto');}};for(var ii=0;ii<grp.itens.length;ii++){var item=grp.itens[ii];var linha=document.createElement('div');linha.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--cinza-claro);';var ck=document.createElement('div');ck.style.cssText='width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;';if(item.conforme){ck.style.background='var(--verde)';ck.style.color='#fff';ck.textContent='v';}else{ck.style.background='var(--vermelho-pale)';ck.style.color='var(--vermelho)';ck.textContent='x';}var tx=document.createElement('div');tx.style.cssText='font-size:13px;';tx.textContent=(item.checklist_itens&&item.checklist_itens.descricao)?item.checklist_itens.descricao:'-';linha.appendChild(ck);linha.appendChild(tx);corpo.appendChild(linha);}if(grp.itens[0]&&grp.itens[0].observacoes){var obsl=document.createElement('div');obsl.style.cssText='font-size:12px;color:var(--cinza);margin-top:8px;font-style:italic;';obsl.textContent='Obs: '+grp.itens[0].observacoes;corpo.appendChild(obsl);}card.appendChild(hdr);card.appendChild(corpo);area.appendChild(card);})(grupos[g]);}
  }).catch(function(){load.textContent='Erro.';});
}
function renderAdmin(sub){var area=document.getElementById('area-eq');area.innerHTML='';var msg=document.createElement('div');msg.className='vazio';msg.textContent='Administracao - '+sub+' - em desenvolvimento.';area.appendChild(msg);}
function fazerLogin(){var inp=document.getElementById('inp-codigo');var erro=document.getElementById('login-erro');var codigo=inp.value.trim().toUpperCase();erro.textContent='';if(!codigo){erro.textContent='Introduz o teu codigo de acesso.';return;}sbGet('utilizadores','codigo_visivel=eq.'+encodeURIComponent(codigo)+'&select=*').then(function(dados){if(!dados||!dados.length){erro.textContent='Codigo invalido.';return;}var u=dados[0];if(!u.ativo){erro.textContent='Conta inactiva.';return;}guardarSessao(u.id);app.utilizador=u;return carregarEquipamentos();}).catch(function(){erro.textContent='Erro de ligacao.';});}
function fazerSair(){limparSessao();app.utilizador=null;app.equipamentos=[];app.eqAtivo=null;fecharMenu();mostrarEcra('login');var inp=document.getElementById('inp-codigo');if(inp)inp.value='';}
document.getElementById('inp-codigo').addEventListener('keydown',function(e){if(e.key==='Enter'||e.keyCode===13)fazerLogin();});
iniciar();
</script>
