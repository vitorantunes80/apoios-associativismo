<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>GestEq</title>
<style>
:root{
  --verde:#2d6a4f;--verde2:#40916c;--verde-claro:#52b788;--verde-pale:#d8f3dc;
  --azul-menu:#1a2744;--azul-menu2:#243357;--azul-menu-ativo:#2e4278;--azul-menu-titulo:#8899bb;
  --cinza-escuro:#1a1a1a;--cinza:#444;--cinza-medio:#888;--cinza-claro:#e8e8e8;
  --fundo:#f4f6f4;--branco:#fff;
  --vermelho:#c0392b;--vermelho-pale:#fdecea;
  --amarelo:#e67e22;--amarelo-pale:#fef3e2;
  --azul:#2471a3;--azul-pale:#eaf4fb;
  --sombra:0 2px 10px rgba(0,0,0,0.09);--sombra-forte:0 4px 24px rgba(0,0,0,0.22);
  --radius:12px;--radius-sm:8px;
  --fonte:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --topo-h:54px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);font-size:15px;overflow-x:hidden;}
button{font-family:var(--fonte);cursor:pointer;-webkit-appearance:none;}
#topo{position:fixed;top:0;left:0;right:0;height:var(--topo-h);background:var(--azul-menu);display:flex;align-items:center;padding:0 14px;gap:12px;z-index:150;box-shadow:var(--sombra);}
#btn-menu{background:none;border:none;color:#fff;font-size:22px;padding:4px 6px;line-height:1;flex-shrink:0;}
#topo-info{flex:1;min-width:0;}
#topo-eq-nome{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#topo-eq-tipo{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px;}
#btn-sair{background:rgba(255,255,255,0.12);border:none;color:#fff;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;flex-shrink:0;}
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background 0.25s;}
#menu-overlay.visivel{background:rgba(0,0,0,0.5);pointer-events:all;}
#menu-lateral{position:fixed;top:0;left:0;bottom:0;width:286px;background:var(--azul-menu);z-index:201;transform:translateX(-100%);transition:transform 0.27s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden;}
#menu-lateral.aberto{transform:translateX(0);}
#menu-topo{padding:20px 16px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
#menu-logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
#menu-logo-sub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;letter-spacing:0.3px;}
#menu-util{margin-top:14px;background:rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
#menu-util-avatar{width:34px;height:34px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
#menu-util-nome{font-size:13px;font-weight:600;color:#fff;}
#menu-util-perfil{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;text-transform:capitalize;}
#menu-corpo{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 24px;}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:3px solid transparent;}
.menu-item:active{background:rgba(255,255,255,0.06);}
.menu-item.ativo{background:var(--azul-menu-ativo);border-left-color:var(--verde-claro);}
.menu-item-icone{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.menu-item-nome{font-size:13px;color:rgba(255,255,255,0.82);}
.menu-item.ativo .menu-item-nome{color:#fff;font-weight:600;}
.menu-grupo-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 10px 14px;cursor:pointer;border:none;background:none;width:100%;}
.menu-grupo-header:active{background:rgba(255,255,255,0.04);}
.menu-grupo-header-esq{display:flex;align-items:center;gap:8px;}
.menu-grupo-icone{font-size:16px;width:22px;text-align:center;}
.menu-grupo-nome{font-size:11px;font-weight:700;color:var(--azul-menu-titulo);text-transform:uppercase;letter-spacing:0.8px;}
.menu-grupo-seta{font-size:10px;color:var(--azul-menu-titulo);transition:transform 0.2s;}
.menu-grupo-seta.aberto{transform:rotate(180deg);}
.menu-grupo-filhos{display:none;}
.menu-grupo-filhos.aberto{display:block;}
.menu-filho{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 36px;border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:3px solid transparent;}
.menu-filho:active{background:rgba(255,255,255,0.06);}
.menu-filho.ativo{background:var(--azul-menu-ativo);border-left-color:var(--verde-claro);}
.menu-filho-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);flex-shrink:0;}
.menu-filho.ativo .menu-filho-dot{background:var(--verde-claro);}
.menu-filho-nome{font-size:13px;color:rgba(255,255,255,0.75);}
.menu-filho.ativo .menu-filho-nome{color:#fff;font-weight:600;}
.menu-sep{height:1px;background:rgba(255,255,255,0.07);margin:6px 16px;}
#conteudo{padding-top:var(--topo-h);min-height:100vh;}
#area-eq{padding:14px;padding-bottom:40px;}
#ecra-carregar{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--cinza-claro);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ecra-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--azul-menu);}
.login-card{background:var(--branco);border-radius:16px;box-shadow:var(--sombra-forte);padding:32px 24px;width:100%;max-width:360px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-nome{font-size:32px;font-weight:800;color:var(--azul-menu);letter-spacing:-0.5px;}
.login-logo-sub{font-size:11px;color:var(--cinza-medio);margin-top:4px;}
.campo-label{display:block;font-size:11px;font-weight:700;color:var(--cinza);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.campo-input{width:100%;padding:13px 14px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:17px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);outline:none;-webkit-appearance:none;text-transform:uppercase;letter-spacing:2px;}
.campo-input:focus{border-color:var(--verde-claro);}
.btn-primario{width:100%;background:var(--azul-menu);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;margin-top:18px;}
.erro-msg{color:var(--vermelho);font-size:13px;text-align:center;margin-top:12px;min-height:18px;}
.dash-saudacao{background:var(--azul-menu);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;}
.dash-saud-hora{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:4px;}
.dash-saud-nome{font-size:20px;font-weight:800;color:#fff;}
.dash-saud-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px;}
.dash-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dash-card{background:var(--branco);border-radius:var(--radius);padding:14px;box-shadow:var(--sombra);cursor:pointer;}
.dash-card-val{font-size:28px;font-weight:800;color:var(--azul-menu);line-height:1;}
.dash-card-label{font-size:12px;color:var(--cinza-medio);margin-top:5px;line-height:1.3;}
.dash-card-icone{font-size:22px;margin-bottom:8px;}
.dash-card.alerta .dash-card-val{color:var(--vermelho);}
.dash-card.aviso .dash-card-val{color:var(--amarelo);}
.dash-card.ok .dash-card-val{color:var(--verde);}
.dash-secao-titulo{font-size:13px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;margin-top:6px;}
.dash-acesso-rapido{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dash-btn-eq{background:var(--branco);border-radius:var(--radius);padding:12px;box-shadow:var(--sombra);border:none;text-align:left;cursor:pointer;display:flex;align-items:flex-start;gap:10px;width:100%;flex-direction:column;}
.dash-btn-eq:active{background:var(--fundo);}
.dash-btn-eq-row{display:flex;align-items:center;gap:8px;width:100%;}
.dash-btn-eq-icone{font-size:20px;flex-shrink:0;}
.dash-btn-eq-nome{font-size:12px;font-weight:600;color:var(--cinza-escuro);line-height:1.3;}
.dash-btn-eq-cnt{font-size:11px;color:var(--cinza-medio);}
.dash-alerta-item{background:var(--branco);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:7px;box-shadow:var(--sombra);display:flex;align-items:center;gap:10px;}
.dash-alerta-item.urgente{border-left:3px solid var(--vermelho);}
.dash-alerta-item.aviso{border-left:3px solid var(--amarelo);}
.dash-alerta-item.info{border-left:3px solid var(--azul);}
.dash-alerta-icone{font-size:18px;flex-shrink:0;}
.dash-alerta-txt{font-size:13px;color:var(--cinza-escuro);flex:1;line-height:1.3;}
.dash-alerta-sub{font-size:11px;color:var(--cinza-medio);margin-top:2px;}
.dash-reserva-item{background:var(--verde-pale);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.dash-reserva-nome{font-size:13px;font-weight:600;}
.dash-reserva-hora{font-size:12px;color:var(--verde);font-weight:700;}
.dash-reserva-eq{font-size:11px;color:var(--cinza-medio);margin-top:2px;}
.resp-card{background:var(--branco);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra);}
.resp-label{font-size:10px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.4px;}
.resp-nome{font-size:15px;font-weight:700;color:var(--cinza-escuro);margin-top:2px;}
.modulo-card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;}
.modulo-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.modulo-header-esq{display:flex;align-items:center;gap:10px;}
.modulo-icone{width:36px;height:36px;border-radius:9px;background:var(--fundo);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--azul-menu);flex-shrink:0;}
.modulo-nome{font-size:15px;font-weight:600;color:var(--cinza-escuro);}
.modulo-seta{font-size:12px;color:var(--cinza-medio);transition:transform 0.2s;flex-shrink:0;}
.modulo-seta.aberto{transform:rotate(180deg);}
.modulo-corpo{display:none;border-top:1.5px solid var(--cinza-claro);padding:14px;}
.modulo-corpo.aberto{display:block;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.subtabs::-webkit-scrollbar{display:none;}
.subtab-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:none;background:var(--cinza-claro);color:var(--cinza);white-space:nowrap;flex-shrink:0;}
.subtab-btn.ativo{background:var(--azul-menu);color:#fff;}
.escala-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.escala-sem-label{font-size:13px;font-weight:600;color:var(--cinza-escuro);text-align:center;flex:1;}
.btn-nav{background:var(--cinza-claro);border:none;border-radius:7px;padding:7px 12px;font-size:13px;color:var(--cinza-escuro);font-weight:600;}
.escala-dia{background:var(--fundo);border-radius:9px;padding:10px 12px;margin-bottom:7px;}
.escala-dia-titulo{font-size:11px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.escala-turno{display:flex;justify-content:space-between;align-items:center;background:var(--branco);border-radius:7px;padding:8px 10px;margin-bottom:4px;}
.escala-turno-nome{font-size:13px;font-weight:500;}
.escala-turno-hora{font-size:12px;color:var(--cinza-medio);}
.escala-sem-turno{font-size:12px;color:var(--cinza-medio);text-align:center;padding:6px;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cinza-claro);}
.check-item:last-child{border-bottom:none;}
.check-box{width:24px;height:24px;border:2px solid var(--cinza-claro);border-radius:6px;background:var(--branco);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.check-box.marcado{background:var(--verde);border-color:var(--verde);color:#fff;}
.check-texto{font-size:14px;color:var(--cinza-escuro);flex:1;line-height:1.3;}
.agua-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.agua-row-label{flex:1;}
.agua-row-label-nome{font-size:13px;font-weight:600;}
.agua-row-label-range{font-size:11px;color:var(--cinza-medio);margin-top:1px;}
.agua-inp{width:90px;flex:none;padding:10px 12px;border:1.5px solid var(--cinza-claro);border-radius:8px;font-size:15px;font-family:var(--fonte);background:var(--fundo);-webkit-appearance:none;outline:none;text-align:center;}
.agua-inp:focus{border-color:var(--verde-claro);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-mes{font-size:15px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.cal-cab{text-align:center;font-size:10px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;padding:4px 0;}
.cal-dia{text-align:center;padding:8px 2px;border-radius:7px;font-size:14px;cursor:pointer;}
.cal-dia.vazio{pointer-events:none;}
.cal-dia.hoje{background:var(--azul-menu);color:#fff;font-weight:700;}
.cal-dia.tem-res{background:#2d6a4f;color:#fff;font-weight:700;}
.cal-dia:active{background:var(--cinza-claro);}
.dds-seccao{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;}
.dds-seccao-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.dds-seccao-nome{font-size:14px;font-weight:700;color:var(--cinza-escuro);flex:1;}
.dds-badge{background:var(--azul-menu);color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 9px;margin-right:8px;}
.dds-seccao-corpo{display:none;border-top:1.5px solid var(--cinza-claro);padding:12px;}
.dds-seccao-corpo.aberto{display:block;}
.dds-card{background:var(--fundo);border-radius:9px;padding:12px;margin-bottom:8px;}
.dds-card-topo{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.dds-num{font-size:12px;font-weight:700;color:var(--cinza-medio);}
.dds-data{font-size:12px;color:var(--cinza-medio);}
.dds-desc{font-size:14px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:7px;}
.dds-rodape{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.dds-dias{font-size:11px;font-weight:700;color:var(--amarelo);}
.memo-card{background:var(--fundo);border-radius:9px;padding:11px;margin-bottom:7px;}
.memo-topo{display:flex;justify-content:space-between;margin-bottom:5px;}
.memo-data-txt{font-size:12px;color:var(--cinza-medio);}
.memo-desc{font-size:13px;color:var(--cinza-escuro);line-height:1.4;margin-bottom:5px;}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px;}
.tag-verde{background:var(--verde-pale);color:var(--verde);}
.tag-cinza{background:var(--cinza-claro);color:var(--cinza);}
.tag-vermelho{background:var(--vermelho-pale);color:var(--vermelho);}
.tag-amarelo{background:var(--amarelo-pale);color:var(--amarelo);}
.tag-azul{background:var(--azul-pale);color:var(--azul);}
.btn-sm{display:inline-block;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;border:none;}
.btn-verde{background:var(--verde);color:#fff;}
.btn-azul{background:var(--azul-menu);color:#fff;}
.btn-cinza{background:var(--cinza-claro);color:var(--cinza-escuro);}
.btn-vermelho{background:var(--vermelho);color:#fff;}
.btn-bloco{width:100%;padding:12px;font-size:14px;}
.vazio{text-align:center;padding:24px 16px;color:var(--cinza-medio);font-size:14px;}
hr.sep{border:none;border-top:1.5px solid var(--cinza-claro);margin:12px 0;}
.campo-group{margin-bottom:12px;}
.campo-textarea{width:100%;padding:11px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;resize:vertical;min-height:72px;}
.campo-textarea:focus{border-color:var(--verde-claro);}
.campo-select{width:100%;padding:12px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;}
.campo-select:focus{border-color:var(--verde-claro);}
.campo-input-sm{width:100%;padding:11px 13px;border:1.5px solid var(--cinza-claro);border-radius:var(--radius-sm);font-size:14px;font-family:var(--fonte);background:var(--fundo);color:var(--cinza-escuro);-webkit-appearance:none;outline:none;}
.campo-input-sm:focus{border-color:var(--verde-claro);}
.form-card{background:var(--branco);border-radius:var(--radius);box-shadow:var(--sombra);padding:14px;margin-bottom:12px;}
.form-titulo{font-size:14px;font-weight:700;color:var(--cinza-escuro);margin-bottom:12px;}
.row-btns{display:flex;gap:8px;margin-top:10px;}
.row-btns button{flex:1;}
.erro-inline{background:var(--vermelho-pale);color:var(--vermelho);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;}
.ficha-linha{padding:10px 0;border-bottom:1px solid var(--cinza-claro);display:flex;gap:10px;}
.ficha-lbl{font-size:11px;font-weight:700;color:var(--cinza-medio);text-transform:uppercase;width:100px;flex-shrink:0;padding-top:2px;}
.ficha-val{font-size:14px;color:var(--cinza-escuro);flex:1;line-height:1.4;}
.horario-dia{background:var(--fundo);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.horario-dia-topo{display:flex;align-items:center;gap:10px;}
.horario-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--cinza-claro);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;font-weight:700;}
.horario-chk.on{background:var(--verde);border-color:var(--verde);color:#fff;}
.horario-lbl{font-size:14px;font-weight:600;flex:1;}
.horario-extra{display:none;margin-top:10px;}
.horario-hora-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.horario-hora-lbl{font-size:12px;color:var(--cinza-medio);width:80px;flex-shrink:0;}
.horario-hora-inp{flex:1;padding:9px 12px;border:1.5px solid var(--cinza-claro);border-radius:8px;font-size:14px;font-family:var(--fonte);background:var(--fundo);-webkit-appearance:none;outline:none;}
.horario-hora-inp:focus{border-color:var(--verde-claro);}
.almoco-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;}
.almoco-chk{width:18px;height:18px;border-radius:4px;border:2px solid var(--cinza-claro);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700;}
.almoco-chk.on{background:var(--verde);border-color:var(--verde);color:#fff;}
.almoco-lbl{font-size:13px;color:var(--cinza);}
</style>
</head>
<body>
<div id="topo" style="display:none">

<script>

var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impwb2p5aHZvY3Nwa3N1bWxqc2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE3NDUsImV4cCI6MjA5NzQ0Nzc0NX0.qwAyl_zBx31Z6a3KbaHns8gWceRrjQPcdN3RDBTkGkA';

// ── API ───────────────────────────────────────────────────────────────────────
function sbGet(t,p){return fetch(SB_URL+'/rest/v1/'+t+'?'+(p||''),{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}}).then(function(r){return r.json();});}
function sbPost(t,c){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(c)}).then(function(r){return r.json();});}
function sbPatch(t,filtro,c){return fetch(SB_URL+'/rest/v1/'+t+'?'+filtro,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(c)}).then(function(r){return r.json();});}

// ── SESSAO ────────────────────────────────────────────────────────────────────
function guardarSessao(uid){try{localStorage.setItem('gestEqSessao',JSON.stringify({uid:uid,exp:new Date().getTime()+SESSAO_HORAS*3600000}));}catch(e){}}
function lerSessao(){try{var raw=localStorage.getItem('gestEqSessao');if(!raw)return null;var o=JSON.parse(raw);if(!o||!o.uid||!o.exp)return null;if(new Date().getTime()>o.exp){localStorage.removeItem('gestEqSessao');return null;}return o.uid;}catch(e){return null;}}
function limparSessao(){try{localStorage.removeItem('gestEqSessao');}catch(e){}}

// ── ECRAS ─────────────────────────────────────────────────────────────────────
function mostrarEcra(qual){document.getElementById('ecra-carregar').style.display='none';document.getElementById('ecra-login').style.display='none';document.getElementById('area-eq').style.display='none';document.getElementById('topo').style.display='none';if(qual==='carregar'){document.getElementById('ecra-carregar').style.display='flex';}else if(qual==='login'){document.getElementById('ecra-login').style.display='flex';}else if(qual==='principal'){document.getElementById('topo').style.display='flex';document.getElementById('area-eq').style.display='block';}}

// ── MENU ──────────────────────────────────────────────────────────────────────
function abrirMenu(){document.getElementById('menu-lateral').classList.add('aberto');document.getElementById('menu-overlay').classList.add('visivel');}
function fecharMenu(){document.getElementById('menu-lateral').classList.remove('aberto');document.getElementById('menu-overlay').classList.remove('visivel');}
function renderMenu(){
  var corpo=document.getElementById('menu-corpo');corpo.innerHTML='';
  var u=app.utilizador;
  document.getElementById('menu-util-avatar').textContent=(u.nome||u.codigo_visivel||'?').charAt(0).toUpperCase();
  document.getElementById('menu-util-nome').textContent=u.nome||u.codigo_visivel;
  document.getElementById('menu-util-perfil').textContent=u.perfil.replace(/_/g,' ');
  addMenuItem(corpo,'dashboard','H','Dashboard',function(){navDashboard();fecharMenu();});
  if(u.perfil!=='funcionario'){addSep(corpo);addMenuItem(corpo,'dds','D','Memorandos DDS',function(){navDDS();fecharMenu();});}
  addSep(corpo);
  for(var g=0;g<GRUPOS.length;g++){var grp=GRUPOS[g];var eqsG=filtrarEqGrupo(grp);if(!eqsG.length)continue;addGrupoMenu(corpo,grp,eqsG);}
  if(u.perfil==='admin'||u.perfil==='supervisor'){addSep(corpo);addMenuItem(corpo,'chk-painel','C','Painel de Checklists',function(){navPainelChk();fecharMenu();});}
  if(u.perfil==='admin'){addSep(corpo);addMenuItem(corpo,'adm-util','U','Utilizadores',function(){navAdmin('utilizadores');fecharMenu();});addMenuItem(corpo,'adm-eq','E','Equipamentos',function(){navAdmin('equipamentos');fecharMenu();});}
}
function filtrarEqGrupo(grp){var r=[];for(var i=0;i<app.equipamentos.length;i++){for(var t=0;t<grp.tipos.length;t++){if(app.equipamentos[i].tipo===grp.tipos[t]){r.push(app.equipamentos[i]);break;}}}return r;}
function addSep(pai){var s=document.createElement('div');s.className='menu-sep';pai.appendChild(s);}
function addMenuItem(pai,id,ic,txt,fn){var btn=document.createElement('button');btn.className='menu-item';btn.id='menu-item-'+id;var s1=document.createElement('span');s1.className='menu-item-icone';s1.textContent='['+ic+']';var s2=document.createElement('span');s2.className='menu-item-nome';s2.textContent=txt;btn.appendChild(s1);btn.appendChild(s2);btn.onclick=fn;pai.appendChild(btn);}
function addGrupoMenu(pai,grupo,eqs){
  var div=document.createElement('div');
  var hdr=document.createElement('button');hdr.className='menu-grupo-header';
  var esq=document.createElement('div');esq.className='menu-grupo-header-esq';
  var ic=document.createElement('span');ic.className='menu-grupo-icone';ic.textContent='>';
  var nm=document.createElement('span');nm.className='menu-grupo-nome';nm.textContent=grupo.nome;
  esq.appendChild(ic);esq.appendChild(nm);
  var seta=document.createElement('span');seta.className='menu-grupo-seta';seta.textContent='v';
  hdr.appendChild(esq);hdr.appendChild(seta);
  var filhos=document.createElement('div');filhos.className='menu-grupo-filhos';
  for(var j=0;j<eqs.length;j++){(function(eq){var item=document.createElement('button');item.className='menu-filho';item.id='menu-item-'+eq.id;var dot=document.createElement('span');dot.className='menu-filho-dot';var nome=document.createElement('span');nome.className='menu-filho-nome';nome.textContent=eq.nome;item.appendChild(dot);item.appendChild(nome);item.onclick=function(){navEq(eq.id);fecharMenu();};filhos.appendChild(item);})(eqs[j]);}
  hdr.onclick=function(){var ab=filhos.classList.contains('aberto');if(ab){filhos.classList.remove('aberto');seta.classList.remove('aberto');}else{filhos.classList.add('aberto');seta.classList.add('aberto');}};
  div.appendChild(hdr);div.appendChild(filhos);pai.appendChild(div);
}
function marcarMenuAtivo(id){var items=document.querySelectorAll('.menu-item,.menu-filho');for(var i=0;i<items.length;i++)items[i].classList.remove('ativo');var el=document.getElementById('menu-item-'+id);if(el){el.classList.add('ativo');var pai=el.parentElement;if(pai&&pai.classList.contains('menu-grupo-filhos')){pai.classList.add('aberto');var h=pai.previousSibling;if(h){var s=h.querySelector('.menu-grupo-seta');if(s)s.classList.add('aberto');}}}}
function definirTopo(nome,tipo){document.getElementById('topo-eq-nome').textContent=nome;document.getElementById('topo-eq-tipo').textContent=tipo||'';}

// ── INICIO ────────────────────────────────────────────────────────────────────
function iniciar(){mostrarEcra('carregar');var uid=lerSessao();if(!uid){mostrarEcra('login');return;}sbGet('utilizadores','id=eq.'+uid+'&select=*').then(function(d){if(!d||!d.length||!d[0].ativo){limparSessao();mostrarEcra('login');return;}app.utilizador=d[0];carregarEquipamentos();}).catch(function(){mostrarEcra('login');});}
function carregarEquipamentos(){var u=app.utilizador;if(u.perfil==='responsavel_dds'){app.equipamentos=[];arrancarApp();return;}if(u.perfil==='admin'||u.perfil==='supervisor'){sbGet('equipamentos','select=*&order=nome.asc').then(function(eqs){app.equipamentos=eqs||[];arrancarApp();}).catch(function(){mostrarEcra('login');});return;}sbGet('utilizador_equipamentos','utilizador_id=eq.'+u.id+'&ativo=eq.true&select=equipamentos(id,nome,tipo,responsavel)').then(function(rels){var eqs=[];if(rels)for(var i=0;i<rels.length;i++)if(rels[i].equipamentos)eqs.push(rels[i].equipamentos);app.equipamentos=eqs;arrancarApp();}).catch(function(){mostrarEcra('login');});}
function arrancarApp(){mostrarEcra('principal');renderMenu();if(app.utilizador.perfil==='responsavel_dds'){navDDS();return;}navDashboard();}

// ── UTEIS ─────────────────────────────────────────────────────────────────────
function dataISO(d){var mm=d.getMonth()+1;var dd=d.getDate();return d.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);}
function inicioSemana(d){var c=new Date(d);c.setHours(0,0,0,0);var dw=c.getDay();c.setDate(c.getDate()-(dw===0?6:dw-1));return c;}
function addDias(d,n){var c=new Date(d);c.setDate(c.getDate()+n);return c;}
function diasEntre(d1,d2){return Math.floor((d2-d1)/86400000);}
function area(){return document.getElementById('area-eq');}

// ── MODAL GENERICO ────────────────────────────────────────────────────────────
function criarModal(titulo,conteudo,fnFechar){
  var ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;';
  var md=document.createElement('div');md.style.cssText='background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 40px;box-shadow:0 -4px 24px rgba(0,0,0,0.18);';
  var top=document.createElement('div');top.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;';
  var tit=document.createElement('div');tit.style.cssText='font-size:16px;font-weight:800;color:var(--azul-menu);';tit.textContent=titulo;
  var bf=document.createElement('button');bf.style.cssText='background:var(--cinza-claro);border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;';bf.textContent='Fechar';bf.onclick=function(){document.body.removeChild(ov);if(fnFechar)fnFechar();};
  top.appendChild(tit);top.appendChild(bf);md.appendChild(top);
  if(typeof conteudo==='string'){var p=document.createElement('div');p.textContent=conteudo;md.appendChild(p);}else{md.appendChild(conteudo);}
  ov.appendChild(md);document.body.appendChild(ov);
  ov.onclick=function(e){if(e.target===ov){document.body.removeChild(ov);if(fnFechar)fnFechar();}};
  return {ov:ov,md:md,fechar:function(){if(document.body.contains(ov))document.body.removeChild(ov);}};
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function navDashboard(){
  app.vistaAtual='dashboard';definirTopo('Dashboard','Cabeceiras de Basto');marcarMenuAtivo('dashboard');
  var a=area();a.innerHTML='';
  var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';a.appendChild(load);
  var u=app.utilizador;var hoje=dataISO(new Date());var hora=new Date().getHours();
  var saud=hora<12?'Bom dia':(hora<19?'Boa tarde':'Boa noite');
  Promise.all([
    sbGet('memorandos_dds','estado=eq.pendente&select=id&limit=100').then(function(r){return{t:'dds',d:r||[]};}).catch(function(){return{t:'dds',d:[]}}),
    sbGet('checklists_registo','data_registo=gte.'+hoje+'T00:00:00&select=id&limit=50').then(function(r){return{t:'chk',d:r||[]};}).catch(function(){return{t:'chk',d:[]}}),
    sbGet('reservas','data=eq.'+hoje+'&select=*,equipamentos(nome)&order=hora_inicio.asc&limit=20').then(function(r){return{t:'res',d:r||[]};}).catch(function(){return{t:'res',d:[]}}),
    sbGet('memorandos_reparacao','estado=neq.concluido&select=id,urgencia&limit=100').then(function(r){return{t:'rep',d:r||[]};}).catch(function(){return{t:'rep',d:[]}})
  ]).then(function(rs){
    a.removeChild(load);
    var dds=[],chk=[],res=[],rep=[];
    for(var i=0;i<rs.length;i++){if(rs[i].t==='dds')dds=rs[i].d;if(rs[i].t==='chk')chk=rs[i].d;if(rs[i].t==='res')res=rs[i].d;if(rs[i].t==='rep')rep=rs[i].d;}
    var urg=0;for(var j=0;j<rep.length;j++)if(rep[j].urgencia==='urgente')urg++;
    // Saudacao
    var sd=document.createElement('div');sd.className='dash-saudacao';
    var sh=document.createElement('div');sh.className='dash-saud-hora';sh.textContent=new Date().toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
    var sn=document.createElement('div');sn.className='dash-saud-nome';sn.textContent=saud+', '+(u.nome||u.codigo_visivel);
    var ss=document.createElement('div');ss.className='dash-saud-sub';ss.textContent=app.equipamentos.length+' equipamento'+(app.equipamentos.length!==1?'s':'')+' atribuido'+(app.equipamentos.length!==1?'s':'');
    sd.appendChild(sh);sd.appendChild(sn);sd.appendChild(ss);a.appendChild(sd);
    // Cards
    var cg=document.createElement('div');cg.className='dash-cards';
    var cardsD=[{v:dds.length,l:'Memorandos DDS pendentes',ic:'M',cl:dds.length>0?'aviso':'ok',fn:navDDS},{v:chk.length>0?'Sim':'Nao',l:'Checklists feitas hoje',ic:'C',cl:chk.length>0?'ok':'aviso',fn:null},{v:res.length,l:'Reservas para hoje',ic:'R',cl:'ok',fn:null},{v:urg>0?urg:rep.length,l:urg>0?'Reparacoes urgentes':'Reparacoes em aberto',ic:'T',cl:urg>0?'alerta':(rep.length>0?'aviso':'ok'),fn:null}];
    for(var ci=0;ci<cardsD.length;ci++){(function(cd){var c=document.createElement('div');c.className='dash-card '+cd.cl;if(cd.fn)c.onclick=cd.fn;var ci2=document.createElement('div');ci2.className='dash-card-icone';ci2.textContent=cd.ic;var v=document.createElement('div');v.className='dash-card-val';v.textContent=cd.v;var l=document.createElement('div');l.className='dash-card-label';l.textContent=cd.l;c.appendChild(ci2);c.appendChild(v);c.appendChild(l);cg.appendChild(c);})(cardsD[ci]);}
    a.appendChild(cg);
    // Reservas hoje
    if(res.length){var rt=document.createElement('div');rt.className='dash-secao-titulo';rt.textContent='Reservas de hoje';a.appendChild(rt);for(var ri=0;ri<res.length;ri++){var r=res[ri];var ri2=document.createElement('div');ri2.className='dash-reserva-item';var re=document.createElement('div');var rn=document.createElement('div');rn.className='dash-reserva-nome';rn.textContent=r.entidade||'-';var req=document.createElement('div');req.className='dash-reserva-eq';req.textContent=(r.equipamentos&&r.equipamentos.nome)||'';re.appendChild(rn);re.appendChild(req);var rh=document.createElement('div');rh.className='dash-reserva-hora';rh.textContent=(r.hora_inicio||'')+(r.hora_fim?' - '+r.hora_fim:'');ri2.appendChild(re);ri2.appendChild(rh);a.appendChild(ri2);}}
    // Alertas
    var alertas=[];if(urg>0)alertas.push({cl:'urgente',ic:'!',tx:urg+' pedido'+(urg>1?'s':'')+' de reparacao urgente',sb:'Requerem atencao imediata'});if(dds.length>0)alertas.push({cl:'aviso',ic:'M',tx:dds.length+' memorando'+(dds.length>1?'s':'')+' DDS pendente'+(dds.length>1?'s':''),sb:'Aguardam aprovacao'});if(chk.length===0&&app.equipamentos.length>0)alertas.push({cl:'info',ic:'i',tx:'Sem checklists registadas hoje',sb:'Verifica os equipamentos'});
    if(alertas.length){var at=document.createElement('div');at.className='dash-secao-titulo';at.textContent='Alertas';a.appendChild(at);for(var ai=0;ai<alertas.length;ai++){(function(al){var ai2=document.createElement('div');ai2.className='dash-alerta-item '+al.cl;var aic=document.createElement('div');aic.className='dash-alerta-icone';aic.textContent=al.ic;var atx=document.createElement('div');var at2=document.createElement('div');at2.className='dash-alerta-txt';at2.textContent=al.tx;var as=document.createElement('div');as.className='dash-alerta-sub';as.textContent=al.sb;atx.appendChild(at2);atx.appendChild(as);ai2.appendChild(aic);ai2.appendChild(atx);a.appendChild(ai2);})(alertas[ai]);}}
    // Equipamentos por grupo
    if(app.equipamentos.length){var et=document.createElement('div');et.className='dash-secao-titulo';et.textContent='Equipamentos';a.appendChild(et);var eg=document.createElement('div');eg.className='dash-acesso-rapido';for(var gi=0;gi<GRUPOS.length;gi++){(function(grp){var eqsG=filtrarEqGrupo(grp);if(!eqsG.length)return;var btn=document.createElement('button');btn.className='dash-btn-eq';var row=document.createElement('div');row.className='dash-btn-eq-row';var bic=document.createElement('div');bic.className='dash-btn-eq-icone';bic.textContent=grp.nome.charAt(0);var bnm=document.createElement('div');bnm.className='dash-btn-eq-nome';bnm.textContent=grp.nome;row.appendChild(bic);row.appendChild(bnm);var bcnt=document.createElement('div');bcnt.className='dash-btn-eq-cnt';bcnt.textContent=eqsG.length+(eqsG.length===1?' equipamento':' equipamentos');btn.appendChild(row);btn.appendChild(bcnt);btn.onclick=function(){abrirModalGrupo(grp,eqsG);};eg.appendChild(btn);})(GRUPOS[gi]);}a.appendChild(eg);}
  }).catch(function(){load.textContent='Erro ao carregar dashboard.';});
}

// ── MODAL GRUPO ───────────────────────────────────────────────────────────────
function abrirModalGrupo(grp,eqs){
  var ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;';
  var md=document.createElement('div');md.style.cssText='background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 36px;box-shadow:0 -4px 24px rgba(0,0,0,0.18);';
  var tit=document.createElement('div');tit.style.cssText='font-size:16px;font-weight:800;color:var(--azul-menu);margin-bottom:4px;';tit.textContent=grp.nome;
  var sub=document.createElement('div');sub.style.cssText='font-size:12px;color:var(--cinza-medio);margin-bottom:16px;';sub.textContent='Escolhe o equipamento';
  md.appendChild(tit);md.appendChild(sub);
  for(var i=0;i<eqs.length;i++){(function(eq){var item=document.createElement('button');item.style.cssText='display:flex;align-items:center;gap:12px;width:100%;background:var(--fundo);border:none;border-radius:12px;padding:14px 16px;margin-bottom:8px;text-align:left;cursor:pointer;';
    var ic=document.createElement('div');ic.style.cssText='width:38px;height:38px;border-radius:10px;background:var(--azul-menu);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0;';ic.textContent=TIPO_ICONES[eq.tipo]||'E';
    var info=document.createElement('div');var nm=document.createElement('div');nm.style.cssText='font-size:14px;font-weight:600;color:var(--cinza-escuro);';nm.textContent=eq.nome;var tp=document.createElement('div');tp.style.cssText='font-size:11px;color:var(--cinza-medio);margin-top:2px;';tp.textContent=TIPO_LABELS[eq.tipo]||eq.tipo;info.appendChild(nm);info.appendChild(tp);

function gerarNumeroMemo(){
  var agora=new Date();var ano=agora.getFullYear();var mes=agora.getMonth()+1;var mesStr=mes<10?'0'+mes:''+mes;var prefixo=ano+'/'+mesStr+'/';
  return sbGet('memorandos_dds','numero=like.'+ano+'%2F'+mesStr+'%2F*&select=numero&order=numero.desc&limit=1').then(function(res){
    var seq=1;if(res&&res.length&&res[0].numero){var p=res[0].numero.split('/');if(p.length===3){var ul=parseInt(p[2],10);if(!isNaN(ul))seq=ul+1;}}
    var ss=seq<10?'00'+seq:(seq<100?'0'+seq:''+seq);return prefixo+ss;
  }).catch(function(){return prefixo+'001';});
}

function proximaQuarta(){
  var hoje=new Date();var dow=hoje.getDay();var diasAte=dow<=3?(3-dow):(10-dow);
  if(diasAte===0)diasAte=7;
  var q=new Date(hoje);q.setDate(hoje.getDate()+diasAte);return q;
}

function formatarDataPT(iso){if(!iso)return '-';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

function textoCopiarMemo(memo){
  var linhas=[];
  var nEnvios=(memo.num_reforcos||0)+1;
  if(nEnvios>1)linhas.push('*** REFORCO DE PEDIDO - '+(nEnvios)+'a vez ***');
  linhas.push('MEMORANDO N. '+(memo.numero||'-'));
  linhas.push('Data: '+formatarDataPT(memo.data));
  if(memo.brigada)linhas.push('Brigada: '+memo.brigada);
  if(memo.equipamentos&&memo.equipamentos.nome)linhas.push('Equipamento: '+memo.equipamentos.nome);
  linhas.push('');linhas.push(memo.descricao||'');
  if(memo.observacoes){linhas.push('');linhas.push('Observacoes: '+memo.observacoes);}
  if(nEnvios>1)linhas.push('');linhas.push('Este pedido foi enviado '+nEnvios+(nEnvios===1?' vez.':' vezes.'));
  return linhas.join('\n');
}

function copiarMemo(memo,btn){
  var txt=textoCopiarMemo(memo);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){btn.textContent='Copiado!';setTimeout(function(){btn.textContent='Copiar para Email';},2000);}).catch(function(){fallbackCopiar(txt,btn);});
  } else {fallbackCopiar(txt,btn);}
}

function fallbackCopiar(txt,btn){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');btn.textContent='Copiado!';}catch(e){btn.textContent='Erro';}
  setTimeout(function(){btn.textContent='Copiar para Email';},2000);document.body.removeChild(ta);
}

function estadoTag(memo){
  if(memo.estado==='concluido')return{cls:'tag-verde',txt:'Concluido'};
  if(memo.num_reforcos&&memo.num_reforcos>0&&memo.estado!=='concluido')return{cls:'tag-vermelho',txt:'Reforco '+(memo.num_reforcos+1)+'x'};
  if(memo.estado==='reforco_pedido'&&memo.aprovado_dds)return{cls:'tag-azul',txt:'A Enviar'};
  if(memo.estado==='pendente'&&memo.aprovado_dds)return{cls:'tag-verde',txt:'Enviado'};
  return{cls:'tag-amarelo',txt:'Pendente'};
}

function renderDDS(){
  var a=area();a.innerHTML='';
  var btnN=document.createElement('button');btnN.className='btn-sm btn-azul btn-bloco';btnN.style.marginBottom='10px';btnN.textContent='+ Novo Memorando';btnN.onclick=function(){formDDS(a);};a.appendChild(btnN);
  var btnAp=document.createElement('button');btnAp.className='btn-sm btn-cinza btn-bloco';btnAp.style.marginBottom='14px';btnAp.textContent='Apagar todos os memorandos';
  btnAp.onclick=function(){
    if(!confirm('Tens a certeza? Apaga todos os memorandos e a numeracao volta ao inicio.'))return;
    btnAp.textContent='...';btnAp.disabled=true;
    sbGet('memorandos_dds','select=id').then(function(todos){
      if(!todos||!todos.length){renderDDS();return;}
      var ids=[];for(var i=0;i<todos.length;i++)ids.push(todos[i].id);
      return fetch(SB_URL+'/rest/v1/memorandos_dds?id=in.('+ids.join(',')+')',{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}}).then(function(){renderDDS();});
    }).catch(function(){btnAp.textContent='Erro';btnAp.disabled=false;});
  };
  a.appendChild(btnAp);
  var load=document.createElement('div');load.className='vazio';load.textContent='A carregar...';a.appendChild(load);
  sbGet('memorandos_dds','select=*,equipamentos(nome)&order=data.desc').then(function(todos){
    a.removeChild(load);
    if(!todos||todos.error){var err=document.createElement('div');err.className='erro-inline';err.textContent='Erro ao carregar.';a.appendChild(err);return;}

    // Secção 1: Recebidos dos Equipamentos (criado_por_dds=false, nao concluido)
    var recebidos=[];for(var i=0;i<todos.length;i++)if(!todos[i].criado_por_dds&&todos[i].estado!=='concluido')recebidos.push(todos[i]);
    a.appendChild(buildSecDDS('recebidos','Recebidos dos Equipamentos',recebidos,null));

    // Secção 2: Criados por Mim (criado_por_dds=true, nao concluido)
    var criados=[];for(var i=0;i<todos.length;i++)if(todos[i].criado_por_dds&&todos[i].estado!=='concluido')criados.push(todos[i]);
    a.appendChild(buildSecDDS('criados','Criados por Mim',criados,null));

    // Secção 3: A Enviar (estado=reforco_pedido + aprovado_dds=true)
    var aEnviar=[];for(var i=0;i<todos.length;i++)if(todos[i].estado==='reforco_pedido'&&todos[i].aprovado_dds)aEnviar.push(todos[i]);
    var avisoQ=null;
    if(aEnviar.length>0){var q=proximaQuarta();var diff=Math.ceil((q-new Date())/86400000);var mm=q.getMonth()+1;avisoQ='Enviar ate quarta-feira '+q.getDate()+'/'+(mm<10?'0'+mm:mm)+' ('+diff+(diff===1?' dia':' dias')+')';}
    a.appendChild(buildSecDDS('aenviar','A Enviar para os Servicos',aEnviar,avisoQ));

    // Secção 4: Enviados/Em Curso (estado=pendente + aprovado_dds=true)
    var emCurso=[];for(var i=0;i<todos.length;i++)if(todos[i].estado==='pendente'&&todos[i].aprovado_dds)emCurso.push(todos[i]);
    a.appendChild(buildSecDDS('emcurso','Enviados / Em Curso',emCurso,null));

    // Secção 5: Arquivo
    var arquivo=[];for(var i=0;i<todos.length;i++)if(todos[i].estado==='concluido')arquivo.push(todos[i]);
    a.appendChild(buildSecDDS('arquivo','Arquivo',arquivo,null));

  }).catch(function(){load.textContent='Erro.';});
}

function buildSecDDS(id,label,memos,aviso){

function cardDDS(memo,secId){
  var card=document.createElement('div');card.className='dds-card';

  if(secId!=='arquivo'){var btnCop=document.createElement('button');btnCop.className='btn-sm btn-cinza';btnCop.style.fontSize='12px';btnCop.textContent='Copiar para Email';btnCop.onclick=function(){copiarMemo(memo,btnCop);};acoes.appendChild(btnCop);}
  // Mover para A Enviar (so nos recebidos ainda nao aprovados)
  if(secId==='recebidos'&&!memo.aprovado_dds){
    var btnApr=document.createElement('button');btnApr.className='btn-sm btn-azul';btnApr.style.fontSize='12px';btnApr.textContent='Mover para A Enviar';
    btnApr.onclick=function(){btnApr.textContent='...';btnApr.disabled=true;sbPatch('memorandos_dds','id=eq.'+memo.id,{estado:'reforco_pedido',aprovado_dds:true}).then(function(){renderDDS();}).catch(function(){btnApr.textContent='Erro';btnApr.disabled=false;});};
    acoes.appendChild(btnApr);
  }
  // Marcar como Enviado (na seccao A Enviar)
  if(secId==='aenviar'){
    var btnEnv=document.createElement('button');btnEnv.className='btn-sm btn-azul';btnEnv.style.fontSize='12px';btnEnv.textContent='Marcar como Enviado';
    btnEnv.onclick=function(){btnEnv.textContent='...';btnEnv.disabled=true;sbPatch('memorandos_dds','id=eq.'+memo.id,{estado:'pendente',aprovado_dds:true}).then(function(){renderDDS();}).catch(function(){btnEnv.textContent='Erro';btnEnv.disabled=false;});};
    acoes.appendChild(btnEnv);

  // Reforcar Pedido (em Enviados/Em Curso) - volta para A Enviar com contador incrementado
  if(secId==='emcurso'){
    var btnRef=document.createElement('button');btnRef.className='btn-sm btn-vermelho';btnRef.style.fontSize='12px';btnRef.textContent='Reforcar Pedido';

    acoes.appendChild(btnConc);
  }
  card.appendChild(acoes);return card;
}

tens[0]&&grp.itens[0].observacoes){var obsl=document.createElement('div');obsl.style.cssText='font-size:12px;color:var(--cinza);margin-top:8px;font-style:italic;';obsl.textContent='Obs: '+grp.itens[0].observacoes;corpo.appendChild(obsl);}card.appendChild(hdr);card.appendChild(corpo);a.appendChild(card);})(grupos[g]);}
  }).catch(function(){load.textContent='Erro.';});
}

function fazerLogin(){var inp=document.getElementById('inp-codigo');var erro=document.getElementById('login-erro');var codigo=inp.value.trim().toUpperCase();erro.textContent='';if(!codigo){erro.textContent='Introduz o teu codigo de acesso.';return;}sbGet('utilizadores','codigo_visivel=eq.'+encodeURIComponent(codigo)+'&select=*').then(function(d){if(!d||!d.length){erro.textContent='Codigo invalido.';return;}var u=d[0];if(!u.ativo){erro.textContent='Conta inactiva.';return;}guardarSessao(u.id);app.utilizador=u;carregarEquipamentos();}).catch(function(){erro.textContent='Erro de ligacao.';});}
function fazerSair(){limparSessao();app.utilizador=null;app.equipamentos=[];app.eqAtivo=null;fecharMenu();mostrarEcra('login');var inp=document.getElementById('inp-codigo');if(inp)inp.value='';}
document.getElementById('inp-codigo').addEventListener('keydown',function(e){if(e.key==='Enter'||e.keyCode===13)fazerLogin();});
